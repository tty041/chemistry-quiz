<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>河南中考化学 · 在线练习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --primary: #2d7a4e;
    --primary-light: #3c9d64;
    --primary-dark: #1e5a36;
    --accent: #f5a623;
    --bg: #f0f4f0;
    --card: #ffffff;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --danger: #e74c3c;
    --success: #27ae60;
    --border: #dce3dc;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 16px;
}
body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}
.hidden { display: none !important; }

/* ========== Header ========== */
.app-header {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
    padding: 16px 20px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.app-header h1 { font-size: 20px; font-weight: 700; }
.app-header .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }

/* ========== Container ========== */
.container { max-width: 800px; margin: 0 auto; padding: 16px; }

/* ========== Home Page ========== */
.home-grid { display: grid; gap: 12px; margin-top: 16px; }
.home-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 2px solid transparent;
}
.home-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
.home-card:active { transform: scale(0.98); }
.home-card .icon { font-size: 28px; margin-bottom: 8px; }
.home-card h3 { font-size: 17px; margin-bottom: 4px; }
.home-card p { font-size: 13px; color: var(--text-light); line-height: 1.5; }
.home-card .tag {
    display: inline-block;
    margin-top: 8px;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    background: var(--bg);
    color: var(--text-light);
}
.card-exam { border-color: var(--danger); }
.card-chapter { border-color: var(--primary); }
.card-random { border-color: var(--accent); }

/* ========== Chapter List ========== */
.chapter-list { display: grid; gap: 10px; margin-top: 12px; }
.chapter-item {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: transform 0.1s;
}
.chapter-item:active { transform: scale(0.98); }
.chapter-item .name { font-size: 15px; font-weight: 500; }
.chapter-item .count { font-size: 12px; color: var(--text-light); background: var(--bg); padding: 2px 10px; border-radius: 10px; }
.chapter-item .done { color: var(--success); }

/* ========== Quiz Page ========== */
.quiz-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding: 12px 0;
}
.quiz-header .back {
    background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px 8px;
    color: var(--text); border-radius: 8px;
}
.quiz-header .back:hover { background: var(--bg); }
.quiz-progress {
    font-size: 14px; font-weight: 600; color: var(--primary);
}
.quiz-timer {
    font-size: 14px; font-weight: 600; color: var(--accent);
}
.quiz-timer.warning { color: var(--danger); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

/* ========== Question Card ========== */
.question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
}
.q-number {
    font-size: 12px; color: var(--primary); font-weight: 600;
    background: #e8f5e9; padding: 2px 10px; border-radius: 10px; display: inline-block; margin-bottom: 12px;
}
.q-type {
    font-size: 12px; color: var(--accent); font-weight: 600;
    background: #fff8e1; padding: 2px 10px; border-radius: 10px; display: inline-block; margin-left: 6px;
}
.q-chapter {
    font-size: 12px; color: #666;
    background: #f5f5f5; padding: 2px 10px; border-radius: 10px; display: inline-block; margin-left: 6px;
}
.q-text {
    font-size: 16px; line-height: 1.8; margin: 12px 0 16px;
}
.q-text .highlight { color: var(--primary); font-weight: 600; }

.options { display: flex; flex-direction: column; gap: 10px; }
.option {
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 15px;
    line-height: 1.6;
    background: #fafcfa;
}
.option:hover { border-color: var(--primary-light); background: #f0faf3; }
.option.selected { border-color: var(--primary); background: #e8f5e9; }
.option.correct { border-color: var(--success); background: #e8f8f0; }
.option.wrong { border-color: var(--danger); background: #fdecea; }
.option.disabled { pointer-events: none; opacity: 0.7; }
.option .label {
    display: inline-block; font-weight: 700; margin-right: 8px; color: var(--primary);
}

/* ========== Fill Blank ========== */
.fill-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
}
.fill-input:focus { border-color: var(--primary); }
.fill-input.correct { border-color: var(--success); background: #e8f8f0; }
.fill-input.wrong { border-color: var(--danger); background: #fdecea; }

/* ========== Explanation ========== */
.explanation {
    background: #f8f9fa;
    border-left: 4px solid var(--primary);
    padding: 14px 16px;
    border-radius: 0 12px 12px 0;
    margin-top: 14px;
    font-size: 14px;
    line-height: 1.7;
    color: #444;
}
.explanation strong { color: var(--primary-dark); }

/* ========== Buttons ========== */
.btn-row {
    display: flex; gap: 10px; margin-top: 16px;
}
.btn {
    flex: 1;
    padding: 14px;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-primary:disabled { background: #bdc3c7; cursor: not-allowed; }
.btn-outline {
    background: white; color: var(--primary); border: 2px solid var(--primary);
}
.btn-outline:hover { background: #f0faf3; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #c0392b; }
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { background: #e6951f; }

/* ========== Result ========== */
.result-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px 24px;
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 16px;
}
.result-score {
    font-size: 56px; font-weight: 800; color: var(--primary);
    line-height: 1;
}
.result-score .total { font-size: 24px; color: var(--text-light); }
.result-label { font-size: 14px; color: var(--text-light); margin: 8px 0 16px; }
.result-stats {
    display: flex; justify-content: center; gap: 24px; margin: 16px 0;
}
.stat-item { text-align: center; }
.stat-item .num { font-size: 22px; font-weight: 700; }
.stat-item .label { font-size: 12px; color: var(--text-light); }
.stat-correct .num { color: var(--success); }
.stat-wrong .num { color: var(--danger); }
.stat-skip .num { color: var(--text-light); }

.result-detail-list { margin-top: 16px; }
.result-detail-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
}
.result-detail-item:hover { background: #f8f9fa; }
.result-detail-item .r { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.result-detail-item .r-c { background: #e8f8f0; color: var(--success); }
.result-detail-item .r-w { background: #fdecea; color: var(--danger); }
.result-detail-item .r-s { background: #f5f5f5; color: #999; }
.result-detail-item .q { font-size: 13px; color: var(--text); }

/* ========== Review ========== */
.review-section { margin-top: 12px; }

/* ========== Badge ========== */
.badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
}
.badge-primary { background: #e8f5e9; color: var(--primary); }
.badge-accent { background: #fff8e1; color: var(--accent); }

/* ========== Progress Bar ========== */
.progress-bar {
    height: 6px; background: var(--border); border-radius: 3px; margin: 8px 0 16px; overflow: hidden;
}
.progress-bar .fill {
    height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light));
    border-radius: 3px; transition: width 0.3s;
}

/* ========== Responsive ========== */
@media (max-width: 480px) {
    .container { padding: 12px; }
    .question-card { padding: 16px; border-radius: 12px; }
    .q-text { font-size: 15px; }
    .option { padding: 12px; font-size: 14px; }
    .result-score { font-size: 42px; }
}
</style>
</head>
<body>

<div class="app-header">
    <h1>🧪 河南中考化学 · 在线练习</h1>
    <div class="sub">涵盖河南省中考化学历年真题 · 全部知识模块</div>
</div>

<div class="container" id="app">

    <!-- ======== Home ======== -->
    <div id="pageHome">
        <div class="home-grid">
            <div class="home-card card-chapter" onclick="showChapterList()">
                <div class="icon">📖</div>
                <h3>按章节练习</h3>
                <p>按知识模块分类练习，逐一攻破每个考点</p>
                <span class="tag">共 6 大模块 · 60 道题</span>
            </div>
            <div class="home-card card-exam" onclick="startExam()">
                <div class="icon">📝</div>
                <h3>模拟考试</h3>
                <p>25 道题限时 40 分钟，模拟真实中考场景</p>
                <span class="tag">随机抽题 · 限时挑战</span>
            </div>
            <div class="home-card card-random" onclick="startRandom(10)">
                <div class="icon">🎲</div>
                <h3>随机 10 题</h3>
                <p>从全部题库随机抽取，快速检验掌握程度</p>
                <span class="tag">不限时 · 轻松练习</span>
            </div>
            <div class="home-card" style="border-color:#9b59b6;" onclick="showReview()">
                <div class="icon">📋</div>
                <h3>错题回顾</h3>
                <p>复习做错的题目，巩固薄弱知识点</p>
                <span class="tag" id="wrongTag">暂无错题</span>
            </div>
        </div>
        <div style="text-align:center;margin-top:24px;font-size:12px;color:#aaa;">
            题目来源：河南省中考化学历年真题及各地市模拟题汇编
        </div>
    </div>

    <!-- ======== Chapter List ======== -->
    <div id="pageChapter" class="hidden">
        <div class="quiz-header">
            <button class="back" onclick="showHome()">&larr;</button>
            <span style="font-weight:600;">选择章节</span>
            <span></span>
        </div>
        <div class="chapter-list" id="chapterList"></div>
    </div>

    <!-- ======== Quiz ======== -->
    <div id="pageQuiz" class="hidden">
        <div class="quiz-header">
            <button class="back" onclick="confirmExit()">&larr;</button>
            <span class="quiz-progress" id="quizProgress"></span>
            <span class="quiz-timer hidden" id="quizTimer">⏱ 40:00</span>
        </div>
        <div class="progress-bar" id="progressBarWrapper">
            <div class="fill" id="progressFill" style="width:0%"></div>
        </div>
        <div id="questionArea"></div>
    </div>

    <!-- ======== Result ======== -->
    <div id="pageResult" class="hidden">
        <div class="result-card" id="resultCard"></div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="showReviewResult()">查看详细解析</button>
            <button class="btn btn-outline" onclick="showHome()">返回首页</button>
        </div>
        <div id="resultReview" class="hidden review-section"></div>
    </div>

</div>

<script>
// ====================================================================
//  问 题 库  —— 河南中考化学真题风格，涵盖全部知识模块
// ====================================================================
const QUESTION_BANK = [
    // ---------- 模块 1：物质的化学变化 ----------
    {
        id: 'c1_01', type: 'choice', chapter: '物质的化学变化', chapterIdx: 0,
        question: '下列变化中，属于物理变化的是',
        options: ['A. 铁生锈', 'B. 食物腐烂', 'C. 酒精挥发', 'D. 木炭燃烧'],
        answer: 2,
        explanation: '酒精挥发是状态改变，没有新物质生成，属于物理变化。铁生锈、食物腐烂、木炭燃烧都有新物质生成，属于化学变化。'
    },
    {
        id: 'c1_02', type: 'choice', chapter: '物质的化学变化', chapterIdx: 0,
        question: '下列变化中，前者是物理变化，后者是化学变化的是',
        options: ['A. 干冰升华，钢铁生锈', 'B. 牛奶变酸，蜡烛燃烧', 'C. 酒精挥发，石油分馏', 'D. 冰雪融化，矿石粉碎'],
        answer: 0,
        explanation: '干冰升华是物理变化，钢铁生锈是化学变化。B中牛奶变酸是化学变化；C中石油分馏是物理变化；D中矿石粉碎是物理变化。'
    },
    {
        id: 'c1_03', type: 'choice', chapter: '物质的化学变化', chapterIdx: 0,
        question: '在化学反应前后，一定不变的是<br>①原子种类 ②分子种类 ③原子数目 ④分子数目 ⑤元素种类 ⑥物质种类',
        options: ['A. ①②③', 'B. ①③⑤', 'C. ②④⑥', 'D. ③④⑤'],
        answer: 1,
        explanation: '质量守恒定律：化学反应前后，原子种类、原子数目、元素种类一定不变。分子种类和物质种类一定改变，分子数目可能改变。'
    },
    {
        id: 'c1_04', type: 'choice', chapter: '物质的化学变化', chapterIdx: 0,
        question: '下列化学方程式书写正确的是',
        options: [
            'A. 4Fe + 3O₂ ⟶ 2Fe₂O₃',
            'B. H₂ + O₂ ⟶ H₂O',
            'C. 2Mg + O₂ ⟶ 2MgO（点燃）',
            'D. 2KClO₃ ⟶ 2KCl + 3O₂↑'
        ],
        answer: 2,
        explanation: 'A错误：铁在氧气中燃烧生成Fe₃O₄而不是Fe₂O₃；B错误：没配平；D错误：缺少催化剂MnO₂和加热条件。'
    },
    {
        id: 'c1_05', type: 'choice', chapter: '物质的化学变化', chapterIdx: 0,
        question: '在一个密闭容器中，有甲、乙、丙、丁四种物质在一定条件下充分反应，测得反应前后各物质的质量如下：甲反应前10g反应后5g，乙反应前5g反应后20g，丙反应前2g反应后2g，丁反应前10g反应后？。下列说法不正确的是',
        options: [
            'A. 丁反应后的质量为 0g',
            'B. 该反应中甲和乙的质量变化比为 1:3',
            'C. 该反应属于分解反应',
            'D. 乙一定是化合物'
        ],
        answer: 2,
        explanation: '由质量守恒：反应前总质量=10+5+2+10=27g。反应后丙质量不变（2g），则丁质量=27-5-20-2=0g，A正确。甲减少5g为反应物，乙增加15g为生成物，甲:乙=5:15=1:3，B正确。该反应是甲+丁→乙（两种物质生成一种物质），属于化合反应，C错误。乙由甲和丁反应生成，所以乙一定是化合物，D正确。'
    },
    {
        id: 'c1_06', type: 'choice', chapter: '物质的化学变化', chapterIdx: 0,
        question: '下列现象能用质量守恒定律解释的是',
        options: [
            'A. 10g 水受热变成 10g 水蒸气',
            'B. 蜡烛燃烧后质量变小',
            'C. 100mL 水和 100mL 酒精混合总体积小于 200mL',
            'D. 湿衣服晾干后质量减小'
        ],
        answer: 1,
        explanation: '质量守恒定律适用于化学变化。蜡烛燃烧是化学变化，生成CO₂和水蒸气逸散，所以质量减小。A、D是物理变化，C是物理变化中分子间间隔变化。'
    },
    {
        id: 'c1_07', type: 'choice', chapter: '物质的化学变化', chapterIdx: 0,
        question: '碳在氧气中燃烧，下列说法符合质量守恒定律的是',
        options: [
            'A. 3g C 和 8g O₂ 反应生成 11g CO₂',
            'B. 6g C 和 8g O₂ 反应生成 14g CO₂',
            'C. 3g C 和 10g O₂ 反应生成 13g CO₂',
            'D. 6g C 和 16g O₂ 反应生成 22g CO₂'
        ],
        answer: 0,
        explanation: 'C + O₂ ⟶ CO₂，质量比 12:32=3:8。3g C恰好与8g O₂完全反应生成11g CO₂。B中碳过量，C和D中氧气过量，都只能按比例生成。A正确。'
    },

    // ---------- 模块 2：身边的化学物质 ----------
    {
        id: 'c2_01', type: 'choice', chapter: '身边的化学物质', chapterIdx: 1,
        question: '空气中含量最多的气体是',
        options: ['A. 氧气', 'B. 氮气', 'C. 二氧化碳', 'D. 稀有气体'],
        answer: 1,
        explanation: '空气中氮气约占78%，氧气约占21%，二氧化碳约占0.03%，稀有气体约占0.94%。'
    },
    {
        id: 'c2_02', type: 'choice', chapter: '身边的化学物质', chapterIdx: 1,
        question: '下列物质在空气中燃烧，产生大量白烟的是',
        options: ['A. 木炭', 'B. 硫', 'C. 红磷', 'D. 铁丝'],
        answer: 2,
        explanation: '红磷在空气中燃烧生成五氧化二磷固体颗粒，产生大量白烟。木炭燃烧生成CO₂无色气体；硫燃烧生成SO₂有刺激性气味；铁丝在空气中不能燃烧。'
    },
    {
        id: 'c2_03', type: 'choice', chapter: '身边的化学物质', chapterIdx: 1,
        question: '下列有关水的说法正确的是',
        options: [
            'A. 纯净水是纯净物',
            'B. 水是由氢气和氧气组成的',
            'C. 活性炭在净水过程中发生了化学变化',
            'D. 用过滤的方法可将海水转化为淡水'
        ],
        answer: 0,
        explanation: 'A正确：纯净水是H₂O一种物质。B错误：水是由氢元素和氧元素组成的。C错误：活性炭吸附是物理变化。D错误：过滤只能除去不溶性杂质，不能将海水淡化。'
    },
    {
        id: 'c2_04', type: 'choice', chapter: '身边的化学物质', chapterIdx: 1,
        question: '下列关于氧气性质的说法正确的是',
        options: [
            'A. 氧气是一种常见的燃料',
            'B. 氧气不易溶于水',
            'C. 液态氧是无色的',
            'D. 氧气具有可燃性'
        ],
        answer: 1,
        explanation: 'A错误：氧气支持燃烧但本身不能燃烧，不是燃料。B正确：氧气不易溶于水（1L水约溶解30mL氧气）。C错误：液态氧是淡蓝色的。D错误：氧气具有助燃性，不具有可燃性。'
    },
    {
        id: 'c2_05', type: 'choice', chapter: '身边的化学物质', chapterIdx: 1,
        question: '实验室用高锰酸钾制取氧气，下列操作不正确的是',
        options: [
            'A. 试管口略向下倾斜',

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function $(id) { return document.getElementById(id); }

function getWrongIds() {
    try {
        return new Set(JSON.parse(localStorage.getItem('chem_wrong') || '[]'));
    } catch { return new Set(); }
}

function saveWrongIds(set) {
    localStorage.setItem('chem_wrong', JSON.stringify([...set]));
}

function updateWrongTag() {
    const w = getWrongIds();
    const tag = $('wrongTag');
    tag.textContent = w.size ? `共 ${w.size} 道错题` : '暂无错题';
    tag.style.color = w.size ? '#e74c3c' : '#aaa';
}

//  页 面 切 换
// ====================================================================
function showHome() {
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    state.mode = '';
    $('pageHome').classList.remove('hidden');
    $('pageChapter').classList.add('hidden');
    $('pageQuiz').classList.add('hidden');
    $('pageResult').classList.add('hidden');
    updateWrongTag();
}

function showChapterList() {
    $('pageHome').classList.add('hidden');
    $('pageChapter').classList.remove('hidden');
    $('pageQuiz').classList.add('hidden');
    $('pageResult').classList.add('hidden');
    renderChapterList();
}

function confirmExit() {
    if (state.answers.some(a => a !== null && a !== undefined && a !== '')) {
        if (!confirm('确定退出当前练习吗？进度将不会保存。')) return;
    }
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    showHome();
}

    '化学计算',
    '综合'
];

function renderChapterList() {
    const el = $('chapterList');
    const wrongIds = getWrongIds();
    el.innerHTML = CHAPTERS.map((ch, idx) => {
        const count = QUESTION_BANK.filter(q => q.chapterIdx === idx).length;
        return `<div class="chapter-item" onclick="startChapter(${idx})">
            <span class="name">${ch}</span>
            <span><span class="count">${count} 题</span></span>
        </div>`;
    }).join('');
}

// ====================================================================
//  启 动 测 试
// ====================================================================
function startChapter(idx) {
    state.mode = 'chapter';
    state.chapterIdx = idx;
    state.questions = QUESTION_BANK.filter(q => q.chapterIdx === idx);
    state.shuffled = true;
    shuffle(state.questions);
    state.current = 0;
    state.answers = new Array(state.questions.length).fill(null);
    state.correct = new Array(state.questions.length).fill(null);
    state.timeLeft = 0;
    enterQuiz(`${CHAPTERS[idx]} · 章节练习`);
}

function startExam() {
    state.mode = 'exam';
    state.questions = shuffle([...QUESTION_BANK]).slice(0, 25);
    state.shuffled = true;
    state.current = 0;
    state.answers = new Array(state.questions.length).fill(null);
    state.correct = new Array(state.questions.length).fill(null);
    state.timeLeft = 40 * 60;
    enterQuiz('模拟考试 · 25题 · 40分钟', true);
}

function startRandom(n) {
    state.mode = 'random';
    state.questions = shuffle([...QUESTION_BANK]).slice(0, n);
    state.shuffled = true;
    state.current = 0;
    state.answers = new Array(state.questions.length).fill(null);
    state.correct = new Array(state.questions.length).fill(null);
    state.timeLeft = 0;
    enterQuiz(`随机 ${n} 题`);
}

function enterQuiz(title, hasTimer) {
    $('pageHome').classList.add('hidden');
    $('pageChapter').classList.add('hidden');
    $('pageQuiz').classList.remove('hidden');
    $('pageResult').classList.add('hidden');

    const timerEl = $('quizTimer');
    if (hasTimer) {
        timerEl.classList.remove('hidden');
        if (state.timer) clearInterval(state.timer);
        state.timer = setInterval(() => {
            state.timeLeft--;
            if (state.timeLeft <= 0) {
                clearInterval(state.timer);
                state.timer = null;
                finishQuiz();
                return;
            }
            renderTimer();
        }, 1000);
    } else {
        timerEl.classList.add('hidden');
    }

    renderQuestion();
}

// ====================================================================
//  计 时 器
// ====================================================================
function renderTimer() {
    const el = $('quizTimer');
    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;
    el.textContent = `⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.classList.toggle('warning', state.timeLeft <= 60);
}

// ====================================================================
//  渲 染 题 目
// ====================================================================
function renderQuestion() {
    const qs = state.questions;
    const idx = state.current;
    const q = qs[idx];
    const total = qs.length;
    const answered = state.answers.filter(a => a !== null && a !== undefined && a !== '').length;

    $('quizProgress').textContent = `${idx + 1} / ${total}`;
    $('progressFill').style.width = `${((answered) / total) * 100}%`;

    const area = $('questionArea');
    const ans = state.answers[idx];
    const isChoice = q.type === 'choice';

    let html = `<div class="question-card">
        <div>
            <span class="q-number">第 ${idx + 1} 题</span>
            <span class="q-type">${isChoice ? '选择题' : '填空题'}</span>
            <span class="q-chapter">${q.chapter}</span>
        </div>
        <div class="q-text">${q.question}</div>`;

    if (isChoice) {
        html += `<div class="options">`;
        q.options.forEach((opt, oi) => {
            const cls = ['option'];
            if (ans === oi) cls.push('selected');
            // 如果已经提交且显示解析
            if (state.correct[idx] !== null) {
                cls.push('disabled');
                if (oi === q.answer) cls.push('correct');
                if (ans === oi && oi !== q.answer) cls.push('wrong');
            }
            html += `<div class="${cls.join(' ')}" data-oi="${oi}" onclick="selectOption(${oi})">${opt}</div>`;
        });
        html += `</div>`;
    } else {
        const val = ans || '';
        const cls = ['fill-input'];
        if (state.correct[idx] === true) cls.push('correct');
        else if (state.correct[idx] === false) cls.push('wrong');
        html += `<input class="${cls.join(' ')}" type="text" id="fillInput" value="${val}" placeholder="请输入答案..." oninput="fillInputChanged(this.value)">`;
    }

    // 解析
    if (state.correct[idx] !== null) {
        html += `<div class="explanation"><strong>📖 解析：</strong>${q.explanation}</div>`;
    }

    html += `</div>`;

    // 按钮
    html += `<div class="btn-row">`;
    if (isChoice && state.correct[idx] === null) {
        html += `<button class="btn btn-primary" id="btnConfirm" onclick="confirmAnswer()">确认答案</button>`;
    }
    if (!isChoice && state.correct[idx] === null) {
        html += `<button class="btn btn-primary" id="btnConfirm" onclick="confirmAnswer()">确认答案</button>`;
    }
    if (state.correct[idx] !== null) {
        if (idx < total - 1) {
            html += `<button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button>`;
        } else {
            html += `<button class="btn btn-accent" onclick="finishQuiz()">查看结果</button>`;
        }
    }
    html += `</div>`;

    // 底部分页
    if (total > 1) {
        html += `<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:16px;">`;
        for (let i = 0; i < total; i++) {
            let cls = 'badge';
            if (i === idx) cls += ' badge-primary';
            else if (state.correct[i] === true) { cls += ''; html += `<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#e8f8f0;color:#27ae60;font-size:12px;font-weight:700;cursor:pointer;" onclick="jumpTo(${i})">${i+1}</span>`; continue; }
            else if (state.correct[i] === false) { cls += ''; html += `<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#fdecea;color:#e74c3c;font-size:12px;font-weight:700;cursor:pointer;" onclick="jumpTo(${i})">${i+1}</span>`; continue; }
            else { cls += ''; html += `<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#f5f5f5;color:#999;font-size:12px;cursor:pointer;" onclick="jumpTo(${i})">${i+1}</span>`; continue; }
            html += `</span>`;
        }
        html += `</div>`;
    }

    area.innerHTML = html;

    // 如果是填空题，聚焦输入框
    if (!isChoice && state.correct[idx] === null) {
        const inp = $('fillInput');
        if (inp) inp.focus();
    }
}

// ====================================================================
//  交 互
// ====================================================================
function selectOption(oi) {
    const idx = state.current;
    if (state.correct[idx] !== null) return;
    state.answers[idx] = oi;
    renderQuestion();
}

function fillInputChanged(val) {
    const idx = state.current;
    state.answers[idx] = val || null;
}

function confirmAnswer() {
    const idx = state.current;
    const q = state.questions[idx];
    const ans = state.answers[idx];

    if (ans === null || ans === undefined || ans === '') {
        // 没作答时，选择题默认选第一个
        if (q.type === 'choice') {
            state.answers[idx] = 0;
        } else {
            alert('请先填写答案再确认！');
            return;
        }
    }

    const finalAns = state.answers[idx];
    if (q.type === 'choice') {
        state.correct[idx] = (finalAns === q.answer);
    } else {
        // 填空题：模糊匹配
        const userAns = String(finalAns || '').trim().replace(/\s+/g, '');
        const answers = q.answer.map(a => String(a).trim().replace(/\s+/g, ''));
        const acceptable = (q.acceptable || []).map(a => String(a).trim().replace(/\s+/g, ''));
        const all = [...answers, ...acceptable];
        state.correct[idx] = all.some(a => a.toLowerCase() === userAns.toLowerCase());
    }

    // 记录错题
    if (!state.correct[idx]) {
        const wrong = getWrongIds();
        wrong.add(q.id);
        saveWrongIds(wrong);
        updateWrongTag();
    } else {
        // 如果答对了，从错题本移除
        const wrong = getWrongIds();
        if (wrong.has(q.id)) {
            wrong.delete(q.id);
            saveWrongIds(wrong);
            updateWrongTag();
        }
    }

    renderQuestion();
}

function nextQuestion() {
    if (state.current < state.questions.length - 1) {
        state.current++;
        renderQuestion();
    }
}

function jumpTo(i) {
    if (i >= 0 && i < state.questions.length) {
        state.current = i;
        renderQuestion();
    }
}

// ====================================================================
//  完 成 测 试
// ====================================================================
function finishQuiz() {
    if (state.timer) { clearInterval(state.timer); state.timer = null; }

    // 把所有没答的标记为错误
    const qs = state.questions;
    for (let i = 0; i < qs.length; i++) {
        if (state.correct[i] === null) {
            const q = qs[i];
            const ans = state.answers[i];
            if (q.type === 'choice') {
                state.correct[i] = (ans === q.answer);
                if (!state.correct[i] && ans !== null) {
                    const wrong = getWrongIds();
                    wrong.add(q.id);
                    saveWrongIds(wrong);
                }
            } else {
                if (ans && String(ans).trim()) {
                    const userAns = String(ans).trim().replace(/\s+/g, '');
                    const answers = q.answer.map(a => String(a).trim().replace(/\s+/g, ''));
                    const acceptable = (q.acceptable || []).map(a => String(a).trim().replace(/\s+/g, ''));
                    const all = [...answers, ...acceptable];
                    state.correct[i] = all.some(a => a.toLowerCase() === userAns.toLowerCase());
                    if (!state.correct[i]) {
                        const wrong = getWrongIds();
                        wrong.add(q.id);
                        saveWrongIds(wrong);
                    }
                } else {
                    state.correct[i] = false;
                    // 未作答不算错题（不加入错题本）
                }
            }
            // 如果没选任何答案
            if (state.correct[i] === null) state.correct[i] = false;
        }
    }

    updateWrongTag();
    showResult();
}

function showResult() {
    $('pageHome').classList.add('hidden');
    $('pageChapter').classList.add('hidden');
    $('pageQuiz').classList.add('hidden');
    $('pageResult').classList.remove('hidden');
    $('resultReview').classList.add('hidden');

    const qs = state.questions;
    const total = qs.length;
    const correct = state.correct.filter(c => c === true).length;
    const wrong = state.correct.filter(c => c === false).length;
    const score = Math.round((correct / total) * 100);

    let grade = '继续加油！';
    let gradeColor = '#7f8c8d';
    if (score >= 90) { grade = '优秀！🌟'; gradeColor = '#27ae60'; }
    else if (score >= 70) { grade = '良好！👍'; gradeColor = '#2d7a4e'; }
    else if (score >= 60) { grade = '及格！💪'; gradeColor = '#f5a623'; }

    let modeLabel = { 'chapter': '章节练习', 'exam': '模拟考试', 'random': '随机练习' }[state.mode] || '练习';

    const card = $('resultCard');
    card.innerHTML = `
        <div style="font-size:14px;color:#aaa;margin-bottom:8px;">${modeLabel}</div>
        <div class="result-score">${score}<span class="total"> / 100</span></div>
        <div class="result-label" style="color:${gradeColor};font-size:20px;font-weight:700;">${grade}</div>
        <div class="result-stats">
            <div class="stat-item stat-correct"><div class="num">${correct}</div><div class="label">正确</div></div>
            <div class="stat-item stat-wrong"><div class="num">${wrong}</div><div class="label">错误</div></div>
            <div class="stat-item"><div class="num">${total}</div><div class="label">总题</div></div>
        </div>
        <div style="font-size:13px;color:#aaa;margin-top:8px;">
            ${state.timeLeft > 0 ? `用时 ${Math.floor((40*60 - state.timeLeft) / 60)} 分 ${(40*60 - state.timeLeft) % 60} 秒` : ''}
        </div>
    `;
}

function showReviewResult() {
    const section = $('resultReview');
    section.classList.toggle('hidden');

    if (!section.classList.contains('hidden')) {
        let html = '<div style="margin-top:16px;"><h3 style="margin-bottom:12px;">📋 详细解析</h3></div>';
        state.questions.forEach((q, i) => {
            const isCorrect = state.correct[i];
            const ans = state.answers[i];
            const icon = isCorrect ? '✅' : '❌';
            const color = isCorrect ? 'var(--success)' : 'var(--danger)';
            html += `<div class="question-card" style="border-left: 4px solid ${color};">
                <div style="font-size:12px;color:${color};font-weight:600;margin-bottom:8px;">${icon} 第 ${i+1} 题 · ${q.type === 'choice' ? '选择题' : '填空题'}</div>
                <div class="q-text">${q.question}</div>`;
            if (q.type === 'choice') {
                html += `<div style="font-size:14px;margin-bottom:8px;">`;
                q.options.forEach((opt, oi) => {
                    const c = [];
                    if (oi === q.answer) c.push('color:var(--success);font-weight:600;');
                    if (ans === oi && oi !== q.answer) c.push('color:var(--danger);');
                    html += `<div style="${c.join('')}">${opt}${oi === q.answer ? ' ✓' : ''}</div>`;
                });
                html += `</div>`;
            } else {
                html += `<div style="font-size:14px;margin-bottom:8px;">
                    <span>你的答案：<span style="color:${color};font-weight:600;">${ans || '（未作答）'}</span></span>
                    <span style="margin-left:16px;">正确答案：<span style="color:var(--success);font-weight:600;">${q.answer.join('、')}</span></span>
                </div>`;
            }
            html += `<div class="explanation"><strong>📖 解析：</strong>${q.explanation}</div>`;
            html += `</div>`;
        });
        section.innerHTML = html;
    }
}

// ====================================================================
//  错 题 回 顾
// ====================================================================
function showReview() {
    const wrongIds = getWrongIds();
    if (wrongIds.size === 0) {
        alert('暂无错题，继续练习吧！🎉');
        return;
    }

    const wrongQuestions = QUESTION_BANK.filter(q => wrongIds.has(q.id));
    if (wrongQuestions.length === 0) {
        // 可能题目已不在题库中
        alert('暂无错题记录。');
        return;
    }

    state.mode = 'review';
    state.questions = shuffle([...wrongQuestions]);
    state.shuffled = true;
    state.current = 0;
    state.answers = new Array(state.questions.length).fill(null);
    state.correct = new Array(state.questions.length).fill(null);
    state.timeLeft = 0;
    enterQuiz(`错题回顾 · ${state.questions.length} 题`);
}

// ====================================================================
//  初 始 化
// ====================================================================
updateWrongTag();

// 键盘快捷键
document.addEventListener('keydown', (e) => {
    if ($('pageQuiz').classList.contains('hidden')) return;
    const qs = state.questions;
    if (!qs || qs.length === 0) return;
    const idx = state.current;
    const q = qs[idx];

    if (q.type === 'choice' && state.correct[idx] === null) {
        if (e.key >= '1' && e.key <= '4') {
            selectOption(parseInt(e.key) - 1);
            e.preventDefault();
        } else if (e.key === 'a' || e.key === 'A') { selectOption(0); e.preventDefault(); }
        else if (e.key === 'b' || e.key === 'B') { selectOption(1); e.preventDefault(); }
        else if (e.key === 'c' || e.key === 'C') { selectOption(2); e.preventDefault(); }
        else if (e.key === 'd' || e.key === 'D') { selectOption(3); e.preventDefault(); }
    }

    if (e.key === 'Enter' && state.correct[idx] === null) {
        const btn = document.querySelector('#btnConfirm');
        if (btn) { btn.click(); e.preventDefault(); }
    }

    if (e.key === 'ArrowRight' || e.key === ' ') {
        if (state.correct[idx] !== null && idx < qs.length - 1) {
            nextQuestion(); e.preventDefault();
        }
    }
});

console.log('🧪 河南中考化学练习系统已加载！');
console.log(`📚 题库共 ${QUESTION_BANK.length} 道题，覆盖 6 大知识模块`);
</script>
