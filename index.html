ion":"（1）酸具有相似的性质，因为不同的酸在水溶液中都能解离出______（填字母）。a．H₂O b．H₂ c．H⁺ d．OH⁻"},{"answer":["氯化钙溶液"],"acceptable":[["氯化钙溶液"],["CaCl₂溶液"],["CaCl2溶液"]],"question":"（2）检验敞口放置的氢氧化钠溶液是否变质，可以选用的一种试剂是______。"},{"answer":["HCl、NaCl"],"acceptable":[["HCl、NaCl"],["NaCl、HCl"]],"question":"（3）当滴入溶液为V₂mL时，所得溶液中溶质的化学式为______，"},{"answer":["红"],"acceptable":[["红"],["红色"]],"question":"（3续）所得溶液能使紫色石蕊溶液变成______色。"},{"answer":["玻璃棒"],"acceptable":[["玻璃棒"]],"question":"（4）①过滤操作中所用到的玻璃仪器有烧杯、漏斗和______。"},{"answer":["Ba(OH)₂+MgSO₄=BaSO₄↓+Mg(OH)₂↓"],"acceptable":[["Ba(OH)₂+MgSO₄=BaSO₄↓+Mg(OH)₂↓"],["Ba(OH)2+MgSO4=BaSO4↓+Mg(OH)2↓"],["CaCl₂+Na₂CO₃=CaCO₃↓+2NaCl"]],"question":"（4）②以上方案中有关反应的化学方程式为______（写一个即可）。"},{"answer":["Na₂CO₃和NaOH；在溶液乙中加入适量稀盐酸"],"acceptable":[["Na₂CO₃和NaOH；加入适量稀盐酸"],["碳酸钠和氢氧化钠；加适量稀盐酸"]],"question":"（4）③写出溶液乙中含有的杂质，并将以上方案补充完整______。"},{"answer":["9.8g"],"acceptable":[["9.8g"],["9.8克"],["9.8"]],"question":"（5）某实验室用20%的NaOH溶液洗涤一定量石油产品中残余的H₂SO₄，消耗NaOH溶液40g，洗涤后的溶液呈中性，请计算该一定量石油产品中H₂SO₄的质量。"}],"year":"2020"},{"id":"hn2021_01","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"河南博物院馆藏丰富。下列相关制作过程中一定发生了化学变化的是","options":["A. 玉柄雕琢","B. 骨笛打孔","C. 彩陶烧制","D. 金简刻字"],"answer":2,"explanation":"彩陶烧制过程中有新物质生成，属于化学变化；玉柄雕琢、骨笛打孔、金简刻字均没有新物质生成，属于物理变化。","year":"2021"},{"id":"hn2021_02","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"日常生活中，用得最多的材料是有机合成材料。下列不属于有机合成材料的是","options":["A. 合金","B. 塑料","C. 合成橡胶","D. 合成纤维"],"answer":0,"explanation":"合金属于金属材料，不属于有机合成材料；塑料、合成橡胶、合成纤维都属于有机合成材料。","year":"2021"},{"id":"hn2021_03","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"侯德榜是我国制碱工业的先驱。侯氏制碱法中的\"碱\"是指其化学式为","options":["A. Na₂CO₃","B. NaHCO₃","C. NaOH","D. NaCl"],"answer":0,"explanation":"侯氏制碱法制的是纯碱碳酸钠（Na₂CO₃），不是小苏打NaHCO₃、烧碱NaOH或NaCl。","year":"2021"},{"id":"hn2021_04","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"\"84\"消毒液的主要成分是次氯酸钠（NaClO）。NaClO中氯元素的化合价为","options":["A. -1","B. +1","C. +5","D. +7"],"answer":1,"explanation":"NaClO中Na为+1价、O为-2价，根据化合物中各元素化合价代数和为零，Cl的化合价为+1价。","year":"2021"},{"id":"hn2021_05","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列物质在氧气里燃烧，能生成有刺激性气味气体的是","options":["A. 木炭","B. 硫粉","C. 铁丝","D. 镁条"],"answer":1,"explanation":"硫粉在氧气中燃烧生成二氧化硫（SO₂），有刺激性气味；木炭生成CO₂无色无味；铁丝生成Fe₃O₄固体；镁条生成MgO固体。","year":"2021"},{"id":"hn2021_06","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"古籍记载\"曾青得铁则化为铜\"，指可溶性的铜的化合物与铁反应得到铜，该反应为","options":["A. 化合反应","B. 分解反应","C. 置换反应","D. 复分解反应"],"answer":2,"explanation":"Fe + CuSO₄ = FeSO₄ + Cu，单质与化合物反应生成另一种单质和另一种化合物，属于置换反应。","year":"2021"},{"id":"hn2021_07","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"规范的操作方法是实验安全和成功的保证。下列图示的实验操作正确的是<br><div class=\"q-img\"><img src=\"images/q/img_193.png\"></div>","options":["A. 点燃酒精灯","B. 加热液体","C. 收集氢气","D. 稀释浓硫酸"],"answer":3,"explanation":"稀释浓硫酸时应将浓硫酸沿器壁缓慢注入水中并不断搅拌，操作正确。A点燃酒精灯应用火柴引燃；B加热液体时液体体积不超过试管1/3；C收集氢气应使用向下排空气法。","year":"2021"},{"id":"hn2021_08","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"2021年世界水日主题是\"珍惜水、爱护水\"。下列说法正确的是","options":["A. 地球上的淡水资源十分丰富","B. 部分结冰的蒸馏水属于混合物","C. 水是由氢分子和氧原子构成的","D. 硬水中含有较多可溶性钙、镁化合物"],"answer":3,"explanation":"硬水是指含有较多可溶性钙、镁化合物的水。A淡水资源有限；B蒸馏水结冰前后都是纯净物；C水是由水分子构成的，不是由氢分子和氧原子构成。","year":"2021"},{"id":"hn2021_09","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"黑火药爆炸时的反应为：S + 2KNO₃ + 3C = X + N₂↑ + 3CO₂↑。则X是","options":["A. K₂S","B. K₂SO₃","C. K₂SO₄","D. K₂S₂O₃"],"answer":0,"explanation":"根据质量守恒定律，反应前S-1、K-2、N-2、O-6、C-3；反应后已知N-2、C-3、O-6，所以X中含S-1、K-2，化学式为K₂S。","year":"2021"},{"id":"hn2021_10","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列说法正确的是<br><div class=\"q-img\"><img src=\"images/q/img_194.png\"></div>","options":["A. KNO₃溶解度大于NaCl的溶解度","B. t℃时，两种物质的饱和溶液中溶质的质量分数相等","C. 30℃时，30g NaCl加入到100g水中可得到饱和溶液","D. 将40℃时一定质量的KNO₃的饱和溶液降温到20℃，该溶液中溶质的质量保持不变"],"answer":1,"explanation":"t℃时两溶解度曲线相交，溶解度相等，故饱和溶液溶质质量分数相等。A未指明温度；C 30℃时NaCl溶解度大于30g，不能得到饱和溶液；D降温后KNO₃析出晶体，溶质质量减小。","year":"2021"},{"id":"hn2021_11","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"现有下列反应：\n①2KMnO₄ = K₂MnO₄ + MnO₂ + O₂↑\n②2KClO₃ = 2KCl + 3O₂↑\n③2NH₄NO₃ = 4H₂O + 2N₂↑ + O₂↑\n其中适用于实验室制取氧气的是","options":["A. ①②","B. ②③","C. ①③","D. ①②③"],"answer":0,"explanation":"①加热KMnO₄和②催化分解KClO₃都是实验室常用制氧方法；③NH₄NO₃受热分解剧烈易爆炸，不适用于实验室制氧气。","year":"2021"},{"id":"hn2021_12","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列根据某些性质区分一些常见物质的方法错误的是","options":["A. 羊毛和涤纶：灼烧闻气味","B. 硫酸铵和氯化铵：加熟石灰研磨","C. 铜片和黄铜片：相互刻画","D. 氧气和二氧化碳：伸入燃着的木条"],"answer":1,"explanation":"硫酸铵和氯化铵都含NH₄⁺，加熟石灰研磨均产生氨气（有刺激性气味），无法区分。A羊毛灼烧有烧焦羽毛气味；C黄铜是合金硬度大于铜；D氧气使木条燃烧更旺，二氧化碳使木条熄灭。","year":"2021"},{"id":"hn2021_13","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列四个图像分别与选项中的操作相对应，其中可能合理的是<br><div class=\"q-img\"><img src=\"images/q/img_195.png\"></div>","options":["A. 电解一定质量的水","B. 向一定质量的氢氧化钠溶液中滴加水","C. 向一定质量的饱和氢氧化钠溶液中加入氧化钙","D. 向一定质量的盐酸和氯化钙混合溶液中滴加碳酸钠溶液"],"answer":3,"explanation":"向盐酸和CaCl₂混合溶液中滴加Na₂CO₃，Na₂CO₃先与HCl反应（无沉淀），待HCl消耗完后再与CaCl₂反应生成CaCO₃沉淀，图像合理。A电解水产生H₂和O₂体积比2:1；B稀释NaOH溶液pH趋近7但不低于7；C CaO与水反应放热且消耗水，NaOH会析出。","year":"2021"},{"id":"hn2021_14","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"现将含有某一种氯化物杂质的MgCl₂粉末95g溶于水后，与足量的AgNO₃溶液反应，可生成AgCl沉淀290g。则该MgCl₂粉末中含有的杂质可能是","options":["A. NaCl","B. CaCl₂","C. AlCl₃","D. KCl"],"answer":2,"explanation":"95g纯MgCl₂反应生成AgCl质量=95/95×2×143.5=287g。实际290g>287g，说明杂质中氯元素质量分数更高。AlCl₃中氯元素质量分数最高（3×35.5/133.5≈79.8%），相同质量下产生更多AgCl。","year":"2021"},{"id":"hn2021_15","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_196.png\"></div>","parts":[{"answer":["N₂"],"acceptable":["N2","氮气"]},{"answer":["O"],"acceptable":["氧","氧元素"]}],"year":"2021"},{"id":"hn2021_16","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_197.png\"></div>","parts":[{"answer":["(C₆H₁₀O₅)n","(C6H10O5)n"],"acceptable":[]},{"answer":["氮肥"],"acceptable":[]}],"year":"2021"},{"id":"hn2021_17","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_198.png\"></div>","parts":[{"answer":["HCl+NaOH=NaCl+H₂O","HCl+NaOH=NaCl+H2O"],"acceptable":["NaOH+HCl=NaCl+H₂O"]},{"answer":["Na⁺、Cl⁻","Na+、Cl-"],"acceptable":["Na⁺和Cl⁻","钠离子和氯离子"]},{"answer":["H⁺+OH⁻=H₂O","H++OH-=H2O"],"acceptable":["H⁺和OH⁻反应生成H₂O","H+与OH-结合生成水"]}],"year":"2021"},{"id":"hn2021_18","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_199.png\"></div>","parts":[{"answer":["过滤"],"acceptable":[]},{"answer":["BaCl₂","BaCl2"],"acceptable":["氯化钡"]},{"answer":["除去溶液中过量的NaOH和Na₂CO₃","除去过量的NaOH和Na₂CO₃"],"acceptable":["除去过量的氢氧化钠和碳酸钠"]}],"year":"2021"},{"id":"hn2021_19","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_200.png\"></div>","parts":[{"answer":["2H₂+O₂=2H₂O","2H2+O2=2H2O"],"acceptable":[]},{"answer":["Zn+H₂SO₄=ZnSO₄+H₂↑","Zn+H2SO4=ZnSO4+H2↑"],"acceptable":["Zn+H₂SO₄=ZnSO₄+H₂"]},{"answer":["C₂H₈N₂","C2H8N2"],"acceptable":[]}],"year":"2021"},{"id":"hn2021_20","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_201.png\"></div>","parts":[{"answer":["Fe₂O₃","Fe2O3"],"acceptable":["氧化铁"]},{"answer":["2NaOH+FeCl₂=Fe(OH)₂↓+2NaCl","2NaOH+FeCl2=Fe(OH)2↓+2NaCl"],"acceptable":["FeCl₂+2NaOH=Fe(OH)₂↓+2NaCl"]},{"answer":["2FeCl₃+Fe=3FeCl₂","2FeCl3+Fe=3FeCl2"],"acceptable":["Fe+2FeCl₃=3FeCl₂"]}],"year":"2021"},{"id":"hn2021_21","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_202.png\"></div>","parts":[{"answer":["分子在不断运动，温度越高分子运动速率越快"],"acceptable":["分子在不停地做无规则运动，温度越高运动越快","温度越高分子运动速率越快"]},{"answer":["分子之间有间隔，压强越大分子之间间隔越小"],"acceptable":["分子间有间隔，加压后间隔变小","分子之间存在间隔，压强增大间隔减小"]}],"year":"2021"},{"id":"hn2021_22","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_203.png\"></div>","parts":[{"answer":["2H₂O₂=2H₂O+O₂↑","2H2O2=2H2O+O2↑"],"acceptable":["2H₂O₂=2H₂O+O₂"]},{"answer":["温度达到可燃物的着火点"],"acceptable":["燃烧需要温度达到可燃物的着火点","可燃物温度需达到着火点"]}],"year":"2021"},{"id":"hn2021_23","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_204.png\"></div>","parts":[{"answer":["3.0","3"],"acceptable":["3g","3.0g"]},{"answer":["漏斗"],"acceptable":[]},{"answer":["会使量取的水的体积偏小，溶质质量分数偏大"],"acceptable":["溶质质量分数偏大","量取水偏少，所得溶液浓度偏大"]}],"year":"2021"},{"id":"hn2021_24","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_205.png\"></div>","parts":[{"answer":["Mg+H₂SO₄=MgSO₄+H₂↑","Mg+H2SO4=MgSO4+H2↑"],"acceptable":["2Al+3H₂SO₄=Al₂(SO₄)₃+3H₂↑","Mg+H₂SO₄=MgSO₄+H₂"]},{"answer":["把Cu和Ag固体进行分离"],"acceptable":["使铜与银分离","将铜溶解为可溶性铜盐，与银分离"]},{"answer":["Zn+Cu(NO₃)₂=Zn(NO₃)₂+Cu","Zn+Cu(NO3)2=Zn(NO3)2+Cu"],"acceptable":[]}],"year":"2021"},{"id":"hn2021_25","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_206.png\"></div>","parts":[{"answer":["碳原子结构示意图：原子核内6个质子，核外电子排布为2、4"],"acceptable":["(+6) 2 4"]},{"answer":["d"],"acceptable":["D"]},{"answer":["当用弹簧夹夹紧橡皮管时，继续产生的气体导致装置内压强变大，液体被压回长颈漏斗，固液分离，反应停止"],"acceptable":["关闭弹簧夹，气体无法排出，压强增大，液体被压入长颈漏斗，固液分离，反应停止"]},{"answer":["HCl+NaHCO₃=NaCl+H₂O+CO₂↑","HCl+NaHCO3=NaCl+H2O+CO2↑"],"acceptable":["NaHCO₃+HCl=NaCl+H₂O+CO₂↑"]},{"answer":["D中干燥紫色石蕊试纸不变红，E中湿润的紫色石蕊试纸变红"],"acceptable":["干燥紫色石蕊试纸不变色，湿润的紫色石蕊试纸变红"]},{"answer":["紫色石蕊溶液","紫色石蕊"],"acceptable":["紫色石蕊试液","Zn","活泼金属","pH试纸"]},{"answer":["错误：加入过量的Ca(OH)₂引入了OH⁻，会干扰NaOH的检验。\n改正：取少量待测液，加入足量CaCl₂溶液（或BaCl₂溶液），反应后静置，取上层清液滴加无色酚酞溶液，若溶液变红，则含有Na₂CO₃和NaOH。"],"acceptable":["错误是加入了过量Ca(OH)₂引入了OH⁻，应改用CaCl₂溶液"]},{"answer":["24.55"],"acceptable":["24.55g","24.55 g"]}],"year":"2021"},{"id":"hn2022_01","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"中原大地物产丰富。下列食材或食品中富含蛋白质的是","options":["A. 原阳大米","B. 灵宝苹果","C. 叶县岩盐","D. 固始鸡蛋"],"answer":3,"explanation":"鸡蛋富含蛋白质；大米富含糖类；苹果富含维生素；岩盐主要成分是氯化钠，属于无机盐。","year":"2022"},{"id":"hn2022_02","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"元素周期表是学习化学的工具。发现元素周期律并编制元素周期表的化学家是","options":["A. 拉瓦锡","B. 道尔顿","C. 门捷列夫","D. 阿伏加德罗"],"answer":2,"explanation":"门捷列夫发现元素周期律并编制了元素周期表；拉瓦锡测定空气组成；道尔顿提出原子论；阿伏加德罗提出分子学说。","year":"2022"},{"id":"hn2022_03","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"酸雨对农作物以及一些建筑有不利影响。下列措施中与酸雨的防治有关的是","options":["A. 控制二氧化碳的排放量","B. 减少使用一次性塑料制品","C. 分类回收处理生活垃圾","D. 减少含硫化石燃料的燃烧"],"answer":3,"explanation":"酸雨主要由SO₂和氮氧化物引起，减少含硫化石燃料的燃烧可以减少SO₂排放，是防治酸雨的有效措施。","year":"2022"},{"id":"hn2022_04","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"《天工开物》中记载了古法造纸工艺。下列步骤中一定发生了化学变化的是","options":["A. 煮楻足火","B. 斩竹槌洗","C. 日晒成干","D. 覆帘压纸"],"answer":0,"explanation":"煮楻足火是用石灰碱液蒸煮竹料，使木质素等发生化学变化，有新物质生成；B、C、D均为物理变化。","year":"2022"},{"id":"hn2022_05","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"装运汽油或乙醇的运输车上，所贴的危险化学品标志为\n（A.易燃液体标志  B.腐蚀品标志  C.有毒品标志  D.氧化剂标志）<br><div class=\"q-img\"><img src=\"images/q/img_207.png\"></div>","options":["A","B","C","D"],"answer":0,"explanation":"汽油和乙醇均属于易燃液体，运输时应贴易燃液体标志。","year":"2022"},{"id":"hn2022_06","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"有机合成材料的应用和发展方便了人类的生活。下列不属于有机合成材料的是","options":["A. 塑料","B. 陶瓷","C. 合成橡胶","D. 合成纤维"],"answer":1,"explanation":"陶瓷属于无机非金属材料，不属于有机合成材料。塑料、合成橡胶、合成纤维均属于有机合成材料。","year":"2022"},{"id":"hn2022_07","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"物质由微观粒子构成。下列都由离子构成的一组物质是","options":["A. 氯化钠、硫酸铜","B. 水、干冰","C. 金刚石、氧化汞","D. 氦气、氨气"],"answer":0,"explanation":"氯化钠和硫酸铜都是由阴阳离子构成的离子化合物；水、干冰由分子构成；金刚石由原子构成；氦气由原子构成，氨气由分子构成。","year":"2022"},{"id":"hn2022_08","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"粮食产量增长的主要动力是化肥。下列化肥（用化学式表示）属于复合肥料的是","options":["A. CO(NH₂)₂","B. K₂SO₄","C. KNO₃","D. Ca(H₂PO₄)₂"],"answer":2,"explanation":"KNO₃同时含有K和N两种营养元素，属于复合肥料。A为氮肥，B为钾肥，D为磷肥。","year":"2022"},{"id":"hn2022_09","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"正确的实验操作是实验成功的重要保证。下列实验操作中正确的是<br><div class=\"q-img\"><img src=\"images/q/img_208.png\"></div>","options":["A. 熄灭酒精灯","B. 测溶液pH","C. 稀释浓硫酸","D. 读液体体积"],"answer":3,"explanation":"读液体体积时视线应与凹液面最低处保持水平，操作正确。A应用灯帽盖灭；B应用玻璃棒蘸取待测液滴在pH试纸上；C应将浓硫酸沿器壁缓慢注入水中并不断搅拌。","year":"2022"},{"id":"hn2022_10","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"日常生活中，人们常用84消毒液对环境进行消毒。84消毒液是常见的含氯消毒剂，其有效成分中的氯元素为+1价，则84消毒液的有效成分是","options":["A. 氯化钠（NaCl）","B. 次氯酸钠（NaClO）","C. 氯酸钠（NaClO₃）","D. 亚氯酸钠（NaClO₂）"],"answer":1,"explanation":"NaClO中Cl为+1价；NaCl中Cl为-1价；NaClO₃中Cl为+5价；NaClO₂中Cl为+3价。","year":"2022"},{"id":"hn2022_11","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"人类的日常生活和工农业生产离不开水。下列关于水的叙述不正确的是","options":["A. 水与冰块混合得到混合物","B. 净水常用方法有沉淀、过滤、吸附、蒸馏等","C. 硬水是指含有较多可溶性钙、镁化合物的水","D. 水电解时所产生氢气和氧气的质量比为1∶8"],"answer":0,"explanation":"水与冰块是同一物质（H₂O）的不同状态，混合后仍是纯净物，不是混合物。B、C、D均正确。","year":"2022"},{"id":"hn2022_12","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"某金属混合物由Mg、Al、Zn、Cu四种金属中的两种组成。6.5g该金属混合物与足量的盐酸反应，可得到0.2g氢气，则该金属混合物中一定不含有的金属是","options":["A. Mg","B. Al","C. Zn","D. Cu"],"answer":2,"explanation":"6.5g纯Zn恰好生成0.2g H₂。若含Zn则任何组合均不能恰好生成0.2g H₂：Zn+Cu产氢不足，Zn+Mg或Zn+Al产氢过量。若不含Zn，Mg+Cu或Al+Cu可通过适当比例得到0.2g H₂，故一定不含Zn。","year":"2022"},{"id":"hn2022_13","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"甲、乙、丙的转化关系如图所示（\"→\"表示反应能一步实现，部分物质和反应条件已略去），则符合要求的甲、乙、丙依次为<br><div class=\"q-img\"><img src=\"images/q/img_209.png\"></div>","options":["A. CaO、Ca(OH)₂、CaCO₃","B. H₂、H₂O、H₂O₂","C. CuO、Cu(OH)₂、CuSO₄","D. C、CO₂、H₂CO₃"],"answer":0,"explanation":"A中CaO+H₂O=Ca(OH)₂、Ca(OH)₂+CO₂=CaCO₃↓+H₂O、CaCO₃   CaO+CO₂↑，三者之间均可一步转化。B中H₂O→H₂O₂不能一步实现；C中CuO→Cu(OH)₂不能一步实现；D中H₂CO₃→C不能一步实现。","year":"2022"},{"id":"hn2022_14","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"天然气的主要成分是甲烷（CH₄）。当氧气不足时，甲烷燃烧会生成CO₂、CO和H₂O，若16g甲烷燃烧生成CO₂和CO的质量比为11∶7，则参加反应的O₂的质量为","options":["A. 48g","B. 56g","C. 64g","D. 72g"],"answer":1,"explanation":"16g CH₄为1mol。设生成CO₂ x mol、CO y mol，由碳守恒x+y=1，质量比44x:28y=11:7，解得x=y=0.5。生成H₂O 2mol。由氧守恒：n(O₂)=(0.5×2+0.5×1+2×1)/2=1.75mol，m(O₂)=1.75×32=56g。","year":"2022"},{"id":"hn2022_15","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_210.png\"></div>","parts":[{"answer":["N₂","N2"],"acceptable":["氮气"]},{"answer":["Al"],"acceptable":["铝","铝元素"]},{"answer":["C"],"acceptable":["碳","碳元素"]}],"year":"2022"},{"id":"hn2022_16","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_211.png\"></div>","parts":[{"answer":["28.09"],"acceptable":[]},{"answer":["(+14) 2 8 4"],"acceptable":[]},{"answer":["三","3"],"acceptable":["第三周期"]}],"year":"2022"},{"id":"hn2022_17","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_212.png\"></div>","parts":[{"answer":["减小"],"acceptable":["减少"]},{"answer":["溶解度/(100g+溶解度)×100%","S/(100+S)×100%"],"acceptable":["0.17g/(100g+0.17g)×100%"]}],"year":"2022"},{"id":"hn2022_18","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_213.png\"></div>","parts":[{"answer":["称量"],"acceptable":["称取"]},{"answer":["50mL","50 mL"],"acceptable":["50"]}],"year":"2022"},{"id":"hn2022_19","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_214.png\"></div>","parts":[{"answer":["NaHCO₃+HCl=NaCl+H₂O+CO₂↑","NaHCO3+HCl=NaCl+H2O+CO2↑"],"acceptable":["HCl+NaHCO₃=NaCl+H₂O+CO₂↑"]},{"answer":["减少"],"acceptable":[]}],"year":"2022"},{"id":"hn2022_20","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_215.png\"></div>","parts":[{"answer":["微量元素"],"acceptable":[]},{"answer":["Fe₂O₃","Fe2O3"],"acceptable":["氧化铁"]},{"answer":["Fe+H₂SO₄=FeSO₄+H₂↑","Fe+H2SO4=FeSO4+H2↑"],"acceptable":["Fe+H₂SO₄=FeSO₄+H₂"]},{"answer":["4Fe(OH)₂+O₂+2H₂O=4Fe(OH)₃","4Fe(OH)2+O2+2H2O=4Fe(OH)3"],"acceptable":[]}],"year":"2022"},{"id":"hn2022_21","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_216.png\"></div>","parts":[{"answer":["分子在不断运动，花香分子扩散到空气中"],"acceptable":["分子在不停地做无规则运动","分子是不断运动的"]},{"answer":["温度升高，分子间间隔变大，水蒸气体积膨胀"],"acceptable":["水受热分子运动加快，分子间隔增大","分子间间隔随温度升高而增大"]}],"year":"2022"},{"id":"hn2022_22","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_217.png\"></div>","parts":[{"answer":["2H₂O₂=2H₂O+O₂↑","2H2O2=2H2O+O2↑"],"acceptable":["2H₂O₂=2H₂O+O₂"]},{"answer":["温度达到可燃物的着火点"],"acceptable":["燃烧需要温度达到可燃物的着火点"]}],"year":"2022"},{"id":"hn2022_23","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_218.png\"></div>","parts":[{"answer":["比较金属的硬度"],"acceptable":["比较两种金属的硬度大小","验证不同金属的硬度"]},{"answer":["一定含有Zn(NO₃)₂和Cu(NO₃)₂，可能含有AgNO₃"],"acceptable":["Zn(NO₃)₂、Cu(NO₃)₂","Zn(NO3)2和Cu(NO3)2，可能有AgNO3"]},{"answer":["Zn+2AgNO₃=Zn(NO₃)₂+2Ag","Zn+2AgNO3=Zn(NO3)2+2Ag"],"acceptable":[]}],"year":"2022"},{"id":"hn2022_24","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_219.png\"></div>","parts":[{"answer":["2KMnO₄=K₂MnO₄+MnO₂+O₂↑","2KMnO4=K2MnO4+MnO2+O2↑"],"acceptable":["2KClO₃=2KCl+3O₂↑"]},{"answer":["固体：石灰石（或大理石）；液体：稀盐酸"],"acceptable":["石灰石和稀盐酸","大理石和稀盐酸"]},{"answer":["氧气（O₂）。将带火星的木条伸入集气瓶中，若木条复燃，证明是氧气"],"acceptable":["O₂；带火星木条伸入，复燃则为氧气"]}],"year":"2022"},{"id":"hn2022_25","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_220.png\"></div>","parts":[{"answer":["b"],"acceptable":["B"]},{"answer":["改良酸性土壤"],"acceptable":["配制波尔多液","建筑材料的粘合剂","中和酸性土壤"]},{"answer":["H⁺+OH⁻=H₂O","H++OH-=H2O"],"acceptable":[]},{"answer":["溶液由红色变为无色"],"acceptable":["红色褪去变为无色","先变红后褪色"]},{"answer":["玻璃棒"],"acceptable":[]},{"answer":["Mg(OH)₂","Mg(OH)2"],"acceptable":["氢氧化镁"]},{"answer":["取少量溶液乙，加入足量CaCl₂溶液（或BaCl₂溶液），有白色沉淀产生，证明含有Na₂CO₃；静置，取上层清液滴加无色酚酞溶液，若变红，证明含有NaOH"],"acceptable":["先加过量CaCl₂有白色沉淀说明含Na₂CO₃，再取上层清液加酚酞变红说明含NaOH"]},{"answer":["19.6"],"acceptable":["19.6t","19.6吨"]}],"year":"2022"},{"id":"hn2023_01","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"中华文明历史悠久。《天工开物》记载的下列工艺过程中，主要发生了化学变化的是","options":["A. 甘蔗榨汁","B. 棉纱织布","C. 白土烧瓷","D. 楠木造船"],"answer":2,"explanation":"白土烧瓷有新物质生成，属于化学变化；其他三项均为物理变化。"},{"id":"hn2023_02","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"有机合成材料的应用方便了人类的生活。下列用品主要由有机合成材料制成的是","options":["A. 铁质炊具","B. 塑料水杯","C. 实木桌椅","D. 纯棉T恤"],"answer":1,"explanation":"塑料水杯由塑料制成，塑料属于有机合成材料。"},{"id":"hn2023_03","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"劳动创造美好生活。某同学做西红柿炒鸡蛋时，选用的下列食材中富含蛋白质的是","options":["A. 西红柿","B. 鸡蛋","C. 花生油","D. 食盐"],"answer":1,"explanation":"鸡蛋中富含蛋白质。"},{"id":"hn2023_04","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"氧气的化学性质比较活泼。下列物质在氧气中燃烧，能生成黑色固体的是","options":["A. 硫粉","B. 铁丝","C. 镁条","D. 木炭"],"answer":1,"explanation":"铁丝在氧气中燃烧生成黑色固体四氧化三铁。"},{"id":"hn2023_05","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"物质由微观粒子构成。下列由离子构成的物质是","options":["A. 汞","B. 水","C. 氢气","D. 硫酸铜"],"answer":3,"explanation":"硫酸铜由铜离子和硫酸根离子构成。"},{"id":"hn2023_06","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"规范的操作方法是实验安全和成功的重要保证。下列实验操作中正确的是<br><div class=\"q-img\"><img src=\"images/q/img_221.png\"></div>","options":["A. 闻气体气味","B. 点燃酒精灯","C. 加热液体","D. 稀释浓硫酸"],"answer":0,"explanation":"闻气体气味时应扇闻，操作正确。"},{"id":"hn2023_07","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"人类的日常生活和工农业生产都离不开水。下列有关水的说法正确的是","options":["A. 地球上的淡水资源十分丰富","B. 工业污水未处理可以排放","C. 冰和水的共存物属于混合物","D. 用肥皂水鉴别硬水和软水"],"answer":3,"explanation":"肥皂水可鉴别硬水和软水，泡沫多的是软水。"},{"id":"hn2023_08","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"实验室用蔗糖配制50g质量分数为6%的蔗糖溶液。下列说法不正确的是","options":["A. 所需蔗糖的质量为3g","B. 蔗糖放在托盘天平的左盘称量","C. 量水时仰视读数会使溶液浓度偏大","D. 所需玻璃仪器有烧杯、玻璃棒、量筒等"],"answer":2,"explanation":"量水时仰视读数会导致量取水的体积偏大，溶液浓度偏小。"},{"id":"hn2023_09","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"我国化学家张青莲教授主持测定了铟、锑、铈等元素的相对原子质量的新值。铈元素在元素周期表中的相关信息如图所示，下列有关说法不正确的是<br><div class=\"q-img\"><img src=\"images/q/img_222.png\"></div>","options":["A. 铈属于金属元素","B. 铈的元素符号是Ce","C. 铈的相对原子质量为140.1g","D. 铈原子的质子数为58"],"answer":2,"explanation":"相对原子质量的单位是\"1\"，不是\"g\"。"},{"id":"hn2023_10","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"庄稼一枝花，全靠肥当家。碳酸氢铵（化学式为NH₄HCO₃）属于","options":["A. 复合肥","B. 磷肥","C. 钾肥","D. 氮肥"],"answer":3,"explanation":"碳酸氢铵只含氮元素，属于氮肥。"},{"id":"hn2023_11","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"为治理汽车尾气时发生反应的微观示意图。下列有关说法不正确的是<br><div class=\"q-img\"><img src=\"images/q/img_223.png\"></div>","options":["A. 该反应能使有害气体转化为无害物质","B. 反应前后原子的种类、数目不变","C. 反应生成丙和丁的质量比为7:11","D. 化学方程式为2CO+2NO→N₂+2CO₂"],"answer":2,"explanation":"生成丙(N₂)和丁(CO₂)的质量比为7:22，不是7:11。"},{"id":"hn2023_12","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"实验室用高锰酸钾受热分解制氧气，反应前后相关物质中锰元素的化合价不包括","options":["A. +2","B. +4","C. +6","D. +7"],"answer":0,"explanation":"锰元素化合价涉及+7(KMnO₄)、+6(K₂MnO₄)、+4(MnO₂)，不含+2价。"},{"id":"hn2023_13","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"下列化学方程式符合题意且书写正确的是","options":["A. 酸雨形成的原因：CO₂+H₂O=H₂CO₃","B. 盐酸除去铁锈：Fe₂O₃+HCl=FeCl₂+H₂O","C. 除去二氧化碳中的一氧化碳：CO+C→(高温)2CO","D. 小苏打治疗胃酸过多症：NaHCO₃+HCl=NaCl+CO₂↑+H₂O"],"answer":3,"explanation":"小苏打(NaHCO₃)治疗胃酸过多症：NaHCO₃+HCl=NaCl+H₂O+CO₂↑，书写正确。"},{"id":"hn2023_14","type":"choice","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"某金属混合物由Mg、Al、Zn、Fe四种金属中的两种组成。4g该金属混合物与足量的盐酸充分反应，得到0.2g氢气，则该金属混合物的组成不可能是","options":["A. Mg和Al","B. Fe和Al","C. Fe和Mg","D. Mg和Zn"],"answer":0,"explanation":"生成0.2g H₂需Mg 2.4g、Al 1.8g、Fe 5.6g、Zn 6.5g，4g混合物不可能由Mg和Al组成（二者产生H₂均超过0.2g）。"},{"id":"hn2023_15","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_224.png\"></div>","parts":[{"question":"空气中体积分数约为78%的气体是______","answer":["氮气"],"acceptable":["N₂"]},{"question":"地壳中含量最多的元素是______","answer":["氧"],"acceptable":["O","氧元素"]}],"explanation":"空气中氮气约占78%（体积分数）；地壳中含量最多的元素是氧。"},{"id":"hn2023_16","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_225.png\"></div>","parts":[{"question":"水通电分解的化学方程式为______","answer":["2H₂O=通电=2H₂↑+O₂↑"],"acceptable":["2H2O=通电=2H2↑+O2↑","2H₂O=2H₂↑+O₂↑"]},{"question":"氢气作燃料的优点是______","answer":["燃烧产物是水，无污染"],"acceptable":["热值大","来源广","无污染"]}],"explanation":"电解水生成氢气和氧气；氢气燃烧只生成水，清洁无污染。"},{"id":"hn2023_17","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_226.png\"></div>","parts":[{"question":"溶液颜色的变化过程为______","answer":["溶液由红色变为无色"],"acceptable":["红色变无色"]},{"question":"反应的化学方程式为______","answer":["NaOH+HCl=NaCl+H₂O"],"acceptable":["NaOH + HCl = NaCl + H₂O","NaOH+HCl=NaCl+H2O"]},{"question":"反应过程中溶液的pH______","answer":["变小"],"acceptable":["减小"]}],"explanation":"酚酞遇碱变红，加酸中和后变为无色；NaOH+HCl=NaCl+H₂O；加酸pH减小。"},{"id":"hn2023_18","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_227.png\"></div>","parts":[{"question":"(1) 两种物质的溶解度相等时的温度是______℃","answer":["t"],"acceptable":["t℃"]},{"question":"(1) 得到该温度下氯化钠的______","answer":["不饱和溶液"],"acceptable":["不饱和"]},{"question":"(2) 硝酸钾溶液中溶质的质量______氯化钠溶液中溶质的质量","answer":["小于"],"acceptable":["<"]}],"explanation":"曲线交点处溶解度相等。30℃时NaCl溶解度大于30g，故为不饱和溶液。10℃时KNO₃溶解度小于NaCl，升温后溶质质量不变。"},{"id":"hn2023_19","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_228.png\"></div>","parts":[{"question":"(1) C的化学式为______","answer":["CaO"],"acceptable":["氧化钙"]},{"question":"(1) 反应②所属的基本反应类型为______","answer":["化合反应"],"acceptable":["化合"]},{"question":"(2) 反应③的化学方程式为______","answer":["Ca(OH)₂+CO₂=CaCO₃↓+H₂O"],"acceptable":["Ca(OH)2+CO2=CaCO3↓+H2O"]},{"question":"(2) B在生产或生活中的一种用途为______","answer":["作气体肥料"],"acceptable":["灭火","制碳酸饮料"]}],"explanation":"A为CaCO₃，B为CO₂，C为CaO，D为Ca(OH)₂。CaO+H₂O=Ca(OH)₂为化合反应。Ca(OH)₂+CO₂=CaCO₃↓+H₂O。"},{"id":"hn2023_20","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_229.png\"></div>","parts":[{"question":"乙醇完全燃烧的化学方程式为______","answer":["C₂H₅OH+3O₂=点燃=2CO₂+3H₂O"],"acceptable":["C2H5OH+3O2=点燃=2CO2+3H2O"]},{"question":"m的数值为______","answer":["0.7"],"acceptable":["0.7g","0.7克"]}],"explanation":"0.9g H₂O含H 0.1g，乙炔中C 1.2g。3.3g CO₂含C 0.9g，CO含C 0.3g，CO质量=0.7g。"},{"id":"hn2023_21","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_230.png\"></div>","parts":[{"question":"(1) 解释闻到花香的原因","answer":["分子在不断运动"],"acceptable":["分子不停地运动，香味扩散"]},{"question":"(2) 解释氧气加压后体积变小","answer":["分子之间有间隔，压强增大分子间隔变小"],"acceptable":["分子间有间隔，加压后间隔减小"]}],"explanation":"分子在不断运动使香味扩散；分子间有间隔，加压后间隔变小。"},{"id":"hn2023_22","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_231.png\"></div>","parts":[{"question":"(1) 说明可燃物燃烧需要什么条件？","answer":["温度达到可燃物的着火点"],"acceptable":["需要达到着火点"]},{"question":"(2) 一种能使其燃烧的方法","answer":["通过导管向热水中的白磷处通入氧气（或空气）"],"acceptable":["通入氧气","通入空气"]}],"explanation":"白磷着火点低（40℃），红磷着火点高（240℃），热水温度使白磷达到着火点但未达到红磷着火点。白磷燃烧需要氧气。"},{"id":"hn2023_23","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_232.png\"></div>","parts":[{"question":"(1) 铝丝用砂纸打磨的目的是什么？","answer":["除去铝丝表面的氧化膜"],"acceptable":["除去氧化铝薄膜"]},{"question":"(2) 写出发生反应的化学方程式","answer":["Al+3AgNO₃=Al(NO₃)₃+3Ag"],"acceptable":["2Al+3Cu(NO₃)₂=2Al(NO₃)₃+3Cu"]},{"question":"(3) 补充实验探究铜、银的活动性","answer":["将铜丝插入硝酸银溶液中（或将银丝插入硝酸铜溶液中）"],"acceptable":["将铜放入硝酸银溶液中，铜表面有银白色固体析出"]}],"explanation":"铝表面有致密Al₂O₃氧化膜，需打磨去除。通过Al与AgNO₃反应证明Al>Ag。补充铜与硝酸银反应证明Cu>Ag。"},{"id":"hn2023_24","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_233.png\"></div>","parts":[{"question":"(1) 玻璃棒在蒸发操作中的作用","answer":["搅拌，防止局部温度过高导致液滴飞溅"],"acceptable":["搅拌防止飞溅"]},{"question":"(2) 加入过量Na₂CO₃溶液的目的","answer":["除去氯化钙和过量的氯化钡"],"acceptable":["除去CaCl₂和过量BaCl₂"]},{"question":"(3) 有气体产生的化学方程式","answer":["Na₂CO₃+2HCl=2NaCl+H₂O+CO₂↑"],"acceptable":["Na2CO3+2HCl=2NaCl+H2O+CO2↑"]}],"explanation":"蒸发时玻璃棒搅拌防止局部过热。Na₂CO₃除去Ca²⁺和过量的Ba²⁺。盐酸与过量Na₂CO₃反应产生CO₂。"},{"id":"hn2023_25","type":"fill","year":"2023","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_234.png\"></div>","parts":[{"question":"(1) 碳原子结构示意图中x的数值为______","answer":["4"],"acceptable":["四"]},{"question":"(2) 有关说法不正确的是______（填字母）","answer":["d"],"acceptable":["D"]},{"question":"(3) 写出CO还原Fe₂O₃的化学方程式","answer":["Fe₂O₃+3CO=高温=2Fe+3CO₂"],"acceptable":["Fe2O3+3CO=高温=2Fe+3CO2"]},{"question":"(3) 从环保角度考虑，尾气处理的方法","answer":["用燃着的酒精灯点燃尾气（或进行收集）"],"acceptable":["将尾气点燃","收集尾气"]},{"question":"(4) 实验室制取干燥CO₂的装置连接顺序","answer":["B→E→C"],"acceptable":["BEC"]},{"question":"(4) 用过氧化氢溶液和二氧化锰制取O₂的化学方程式","answer":["2H₂O₂=MnO₂=2H₂O+O₂↑"],"acceptable":["2H2O2=MnO2=2H2O+O2↑"]},{"question":"(5) 理论上需质量分数为10%的盐酸的质量","answer":["73"],"acceptable":["73g","73克"]}],"explanation":"碳原子最外层电子数为4。金刚石、石墨和C₆₀碳原子排列方式不同。根据CaCO₃+2HCl=CaCl₂+H₂O+CO₂↑计算，73/44×4.4÷10%=73g。"},{"id":"hn2024_01","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"我国的古代发明及应用所包含的下列物质变化中，不涉及化学变化的是","options":["A. 粮食酿酒","B. 陶瓷烧制","C. 活字印刷","D. 火药爆炸"],"answer":2,"explanation":"活字印刷没有新物质生成，不涉及化学变化。"},{"id":"hn2024_02","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"蛋白质是人类必需的营养物质。下列特色食材或食品中富含蛋白质的是","options":["A. 原阳大米","B. 灵宝苹果","C. 叶县岩盐","D. 固始鸡蛋"],"answer":3,"explanation":"鸡蛋中富含蛋白质。"},{"id":"hn2024_03","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"科学无止境，精神永流传。发明了将制碱、制氨结合的\"联合制碱法\"的科学家是","options":["A. 侯德榜","B. 张青莲","C. 袁隆平","D. 徐光宪"],"answer":0,"explanation":"侯德榜发明了联合制碱法（侯氏制碱法）。"},{"id":"hn2024_04","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"建设美丽家园需要天蓝、地绿、水清。下列做法不利于保护环境的是","options":["A. 开发和利用新能源","B. 积极植树、造林、种草","C. 露天焚烧树叶、塑料袋","D. 将垃圾分类、回收、利用"],"answer":2,"explanation":"露天焚烧树叶、塑料袋会产生有害气体和烟尘，污染环境。"},{"id":"hn2024_05","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"分子、原子、离子都是构成物质的微观粒子。下列物质由离子构成的是","options":["A. H₂O","B. CuSO₄","C. C₆₀","D. CH₄"],"answer":1,"explanation":"CuSO₄由铜离子和硫酸根离子构成。"},{"id":"hn2024_06","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"氧气性质活泼，能支持燃烧。下列物质在氧气中燃烧，能生成无色、无味气体的是","options":["A. 铁丝","B. 硫粉","C. 红磷","D. 木炭"],"answer":3,"explanation":"木炭在氧气中燃烧生成无色无味的CO₂气体。铁丝生成黑色固体，硫粉生成有刺激性气味气体，红磷生成白烟。"},{"id":"hn2024_07","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"某同学在实验室配制一定溶质质量分数的氯化钠溶液，若其他操作均正确，量取水时俯视量筒读数，会导致所配制溶液的质量分数","options":["A. 偏大","B. 偏小","C. 不变","D. 无法判断"],"answer":0,"explanation":"俯视读数使量取水的体积偏小，溶液质量偏小，溶质质量分数偏大。"},{"id":"hn2024_08","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"分类法是化学学习和研究的常用方法。下列分类正确的是","options":["A. 合成材料：合金、合成橡胶","B. 人体必需微量元素：氧、锌","C. 混合物：空气、冰水共存物","D. 复合肥料：硝酸钾、磷酸二氢铵"],"answer":3,"explanation":"硝酸钾(KNO₃)和磷酸二氢铵(NH₄H₂PO₄)都含两种以上营养元素，属于复合肥料。"},{"id":"hn2024_09","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"警示标志能传达安全信息。下列物质运输时应张贴右图标志（易燃液体标志）的是<br><div class=\"q-img\"><img src=\"images/q/img_235.png\"></div>","options":["A. 白磷","B. 汽油","C. 苛性钠","D. 浓硫酸"],"answer":1,"explanation":"汽油是易燃液体，应张贴易燃液体标志。"},{"id":"hn2024_10","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"生产、生活中常要区分物质。下列区分物质的试剂或方法正确的是","options":["A. 用食盐水区分硬水、软水","B. 用熟石灰区分氯化铵、硫酸铵","C. 用灼烧法区分涤纶、羊毛","D. 用燃着的木条区分氮气、二氧化碳"],"answer":2,"explanation":"灼烧羊毛有烧焦羽毛气味，涤纶有特殊气味，可以区分。"},{"id":"hn2024_11","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"《周礼·考工记》中记载，古人将含碳酸钙的贝壳制成石灰乳，在草木灰（含K₂CO₃）的水溶液中加石灰乳，生成物能除去丝帛污渍。以上反应中不涉及的基本反应类型是","options":["A. 化合反应","B. 分解反应","C. 置换反应","D. 复分解反应"],"answer":2,"explanation":"贝壳→石灰乳涉及分解和化合，石灰乳与K₂CO₃反应是复分解反应，不涉及置换反应。"},{"id":"hn2024_12","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"电解水的简易实验装置如右图所示。下列说法不正确的是<br><div class=\"q-img\"><img src=\"images/q/img_236.png\"></div>","options":["A. 甲管中的电极连接的是电源正极","B. 乙管中的气体能使带火星的木条复燃","C. 该实验生成的氢气与氧气的质量比为1:8","D. 该实验可证明水是由氢、氧两种元素组成的"],"answer":0,"explanation":"甲管中气体体积较大（氢气），连接的是电源负极。乙管中为氧气，能使木条复燃。"},{"id":"hn2024_13","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"某反应的微观示意图如下，该反应可用于汽车尾气处理。下列说法正确的是<br><div class=\"q-img\"><img src=\"images/q/img_237.png\"></div>","options":["A. 图中的单质为氧气","B. 反应的产物均为无毒物质","C. 反应前后元素的化合价均无变化","D. 反应的化学方程式为NH₃+NO→N₂+H₂O"],"answer":1,"explanation":"反应产物为N₂和H₂O，均为无毒物质。"},{"id":"hn2024_14","type":"choice","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"镁与某金属的混合物共mg，在一定条件下与氧气充分反应，生成的氧化物共2mg。则该金属（括号内为生成的氧化物）可能是","options":["A. Be（BeO）","B. Cu（CuO）","C. Al（Al₂O₃）","D. Fe（Fe₃O₄）"],"answer":0,"explanation":"Mg→MgO增重2/3，要使总质量从mg变为2mg，另一金属增重应小于等于1。Be→BeO增重1.78，接近；Al→Al₂O₃增重0.89；Cu→CuO增重0.25；Fe→Fe₃O₄增重约0.38。混合物增重为各组分增重的平均值，Mg增重2/3≈0.67，与Al组合平均值约0.78，加上Be增重1.78...综合判断选Be。"},{"id":"hn2024_15","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_238.png\"></div>","parts":[{"question":"目前世界年产量最高的金属是______","answer":["铁"],"acceptable":["Fe"]},{"question":"Si名称为______","answer":["硅"],"acceptable":["硅元素"]}],"explanation":"铁是目前世界年产量最高的金属；Si是硅的元素符号。"},{"id":"hn2024_16","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_239.png\"></div>","parts":[{"question":"硝酸钾的溶解度随着温度升高而______","answer":["增大"]},{"question":"20℃时硝酸钾饱和溶液中溶质的质量分数（写出计算式）","answer":["31.6g/(100g+31.6g)×100%"],"acceptable":["31.6/131.6×100%"]}],"explanation":"硝酸钾的溶解度随温度升高而增大。20℃时溶解度为31.6g，饱和溶液质量分数=31.6/(100+31.6)×100%。"},{"id":"hn2024_17","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_240.png\"></div>","parts":[{"question":"硫酸与氢氧化钡反应的化学方程式为______","answer":["H₂SO₄+Ba(OH)₂=BaSO₄↓+2H₂O"],"acceptable":["H2SO4+Ba(OH)2=BaSO4↓+2H2O"]},{"question":"c点所表示的溶液中溶质为______","answer":["硫酸"],"acceptable":["H₂SO₄","H2SO4"]},{"question":"a点溶液中滴加酚酞溶液会显______色","answer":["红"],"acceptable":["红色"]}],"explanation":"a点Ba(OH)₂过量，溶液呈碱性，酚酞变红。c点H₂SO₄过量，溶质为H₂SO₄。"},{"id":"hn2024_18","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_241.png\"></div>","parts":[{"question":"(1) 三种操作中都用到的一种玻璃仪器是______","answer":["玻璃棒"]},{"question":"(2) 固体X中还有______（填化学式）","answer":["CaCO₃"],"acceptable":["CaCO3"]},{"question":"(3) 溶液Y中的两种杂质是______","answer":["NaOH和Na₂CO₃"],"acceptable":["氢氧化钠和碳酸钠"]}],"explanation":"三步操作均用到玻璃棒。除杂过程中生成CaCO₃沉淀。过量的NaOH和Na₂CO₃需用盐酸除去。"},{"id":"hn2024_19","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_242.png\"></div>","parts":[{"question":"铝与稀硫酸反应的化学方程式为______","answer":["2Al+3H₂SO₄=Al₂(SO₄)₃+3H₂↑"],"acceptable":["2Al+3H2SO4=Al2(SO4)3+3H2↑"]},{"question":"反应的镁与铝的质量比为______","answer":["32:33"],"acceptable":["32/33"]}],"explanation":"2Al+3H₂SO₄=Al₂(SO₄)₃+3H₂↑。使溶液质量增加相等：Mg增重22/24，Al增重48/54，比例=32:33。"},{"id":"hn2024_20","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_243.png\"></div>","parts":[{"question":"(1) 甲转化为乙的化学方程式为______","answer":["2H₂O₂=MnO₂=2H₂O+O₂↑"],"acceptable":["2H2O2=MnO2=2H2O+O2↑"]},{"question":"(1) 甲、乙性质有差异的原因是______","answer":["它们的分子构成不同"],"acceptable":["分子结构不同"]},{"question":"(2) 甲的化学式为______","answer":["Ca(OH)₂"],"acceptable":["Ca(OH)2"]},{"question":"(2) 乙转化为丙的化学方程式为______","answer":["CaCO₃+2HCl=CaCl₂+H₂O+CO₂↑"],"acceptable":["CaCO3+2HCl=CaCl2+H2O+CO2↑"]}],"explanation":"甲为H₂O₂，乙为H₂O，丙为O₂。或甲为Ca(OH)₂，乙为CaCO₃(Mr=100)，丙为CO₂。"},{"id":"hn2024_21","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_244.png\"></div>","parts":[{"question":"(1) 纠正操作错误","answer":["应用酒精灯的外焰加热"],"acceptable":["使用外焰加热"]},{"question":"(2) ①可燃物燃烧需满足什么条件？","answer":["温度达到可燃物的着火点"],"acceptable":["达到着火点"]},{"question":"(2) ②盖灭酒精灯的灭火原理","answer":["隔绝空气（或氧气）"],"acceptable":["隔绝氧气"]}],"explanation":"加热时应使用酒精灯的外焰（温度最高）。灯帽盖灭酒精灯是利用隔绝空气的原理。"},{"id":"hn2024_22","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_245.png\"></div>","parts":[{"question":"(1) 铝制品耐腐蚀的原因","answer":["铝与氧气反应，其表面生成致密的氧化铝薄膜"],"acceptable":["表面有致密的Al₂O₃保护膜"]},{"question":"(2) 滤纸上的固体是什么？","answer":["银和锌"],"acceptable":["Ag和Zn","Ag、Zn"]},{"question":"(2) 有关反应的化学方程式","answer":["Zn+2AgNO₃=Zn(NO₃)₂+2Ag"],"acceptable":["Zn+2AgNO3=Zn(NO3)2+2Ag"]}],"explanation":"铝表面生成致密Al₂O₃保护膜。锌的活动性大于银可置换银，但小于镁不能置换镁。锌过量所以固体有Ag和Zn。"},{"id":"hn2024_23","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_246.png\"></div>","parts":[{"question":"(1) 石油气加压后体积变小的原因","answer":["分子之间有间隔，加压使分子间隔变小"],"acceptable":["分子间有间隔，加压后间隔减小"]},{"question":"(2) 较大范围都能闻到臭味的原因","answer":["分子在不断运动"],"acceptable":["分子不停地运动，扩散到空气中"]}],"explanation":"分子间有间隔，压强增大分子间隔变小。分子在不断运动，使气味扩散。"},{"id":"hn2024_24","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_247.png\"></div>","parts":[{"question":"(1) 需选用的仪器有______（填字母）","answer":["a、b、e、f"],"acceptable":["a,b,e,f"]},{"question":"(2) 用KMnO₄制取O₂的化学方程式","answer":["2KMnO₄=△=K₂MnO₄+MnO₂+O₂↑"],"acceptable":["2KMnO4=△=K2MnO4+MnO2+O2↑"]},{"question":"(2) 需补充的玻璃仪器是","answer":["酒精灯"]}],"explanation":"制取纯净CO₂需锥形瓶(a)、双孔塞(b)、长颈漏斗(e)、集气瓶(f)。KMnO₄制O₂需酒精灯加热。"},{"id":"hn2024_25","type":"fill","year":"2024","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_248.png\"></div>","parts":[{"question":"(1) \"低碳行动\"中的\"碳\"指的是______","answer":["CO₂"],"acceptable":["CO2"]},{"question":"(2) 碳原子核外电子数为______","answer":["6"]},{"question":"(3) 不正确的是______（填字母）","answer":["b"],"acceptable":["B"]},{"question":"(4) 写出V形管内反应的化学方程式","answer":["Fe₂O₃+3CO=高温=2Fe+3CO₂"],"acceptable":["Fe2O3+3CO=高温=2Fe+3CO2"]},{"question":"(4) 处理尾气的方法","answer":["将尾气点燃（或进行收集）"],"acceptable":["点燃尾气","收集尾气"]},{"question":"(5) 有机物中一定含有的元素是","answer":["碳和氢"],"acceptable":["C、H","碳、氢"]},{"question":"(6) 理论上能够吸收CO₂的质量","answer":["66"],"acceptable":["66t","66吨"]}],"explanation":"低碳指减少CO₂排放。碳原子质子数为6，核外电子数也为6。石墨转化为金刚石有新物质生成，属于化学变化。根据化学方程式CO₂+3H₂→CH₃OH+H₂O，44/32×48=66t。"},{"id":"hn2025_01","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"华夏历史悠久，中原文化厚重。下列传统工艺品制作过程中涉及化学变化的是","options":["A. 镇平玉雕","B. 禹州钧瓷","C. 陕州剪纸","D. 洛宁竹编"],"answer":1,"explanation":"禹州钧瓷烧制过程中有新物质生成，属于化学变化。"},{"id":"hn2025_02","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"材料是社会进步的重要标志之一。下列物品中所用材料属于合成材料的是","options":["A. 四羊青铜方尊","B. 明代绢布襕衫","C. 聚氟乙烯塑料","D. 半导体硅晶片"],"answer":2,"explanation":"聚氟乙烯塑料属于有机合成材料。"},{"id":"hn2025_03","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"红烧黄河鲤鱼是一道河南特色美食。鱼肉中富含的营养物质为","options":["A. 糖类","B. 蛋白质","C. 维生素","D. 无机盐"],"answer":1,"explanation":"鱼肉中富含蛋白质。"},{"id":"hn2025_04","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"2025年六五环境日我国主题是\"美丽中国我先行\"。下列做法不符合这一主题的是","options":["A. 滥伐林木","B. 修复草原","C. 污水处理","D. 光伏发电"],"answer":0,"explanation":"滥伐林木会破坏生态环境，不符合环保主题。"},{"id":"hn2025_05","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"将厨房中适量的下列物质分别加入水中，充分搅拌后不能形成溶液的是","options":["A. 豆油","B. 白醋","C. 味精","D. 白糖"],"answer":0,"explanation":"豆油不溶于水，不能形成溶液，会形成乳浊液。"},{"id":"hn2025_06","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"安全、规范的操作是实验成功的重要保证。下列图示的操作正确的是<br><div class=\"q-img\"><img src=\"images/q/img_249.png\"></div>","options":["A. 加热液体","B. 点燃酒精灯","C. 加块状试剂","D. 稀释浓硫酸"],"answer":3,"explanation":"稀释浓硫酸时，应将浓硫酸沿器壁缓慢倒入水中并不断搅拌。"},{"id":"hn2025_07","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"从微观视角认识物质是学习化学的重要方法。下列物质由原子构成的是","options":["A. 氧气","B. 乙醇","C. 金刚石","D. 硫酸铜"],"answer":2,"explanation":"金刚石是由碳原子直接构成的。氧气由分子构成，乙醇由分子构成，硫酸铜由离子构成。"},{"id":"hn2025_08","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"金属在改善人类生活方面发挥着巨大作用。下列相关叙述不正确的是","options":["A. 纯铜的硬度比黄铜的大","B. 钛合金具有良好的抗腐蚀性能","C. 铁制品刷漆可防止生锈","D. 回收废旧金属可实现资源再利用"],"answer":0,"explanation":"黄铜是铜锌合金，合金的硬度一般比其组分金属大。"},{"id":"hn2025_09","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"稀土元素有\"工业维生素\"的美誉。稀土元素铕在元素周期表中的信息如下图所示。下列说法不正确的是<br><div class=\"q-img\"><img src=\"images/q/img_250.png\"></div>","options":["A. 铕属于金属元素","B. 铕原子的核外电子数为63","C. 铕的元素符号为Eu","D. 铕的相对原子质量为152.0g"],"answer":3,"explanation":"相对原子质量的单位是\"1\"，不是\"g\"。"},{"id":"hn2025_10","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"化学与生产、生活息息相关。下列做法正确的是","options":["A. 用熟石灰改良碱性土壤","B. 服用钙片补充人体微量元素钙","C. 用燃烧区分羊毛和涤纶","D. 用尿素[CO(NH₂)₂]作复合肥料"],"answer":2,"explanation":"灼烧羊毛有烧焦羽毛气味，涤纶有特殊气味，可以区分。"},{"id":"hn2025_11","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"开展跨学科实践活动中，下列做法所对应的解释正确的是","options":["A. 活性炭用于自制净水器——活性炭可杀菌消毒","B. 用橡皮泥制作水分子的模型——水是由氢原子和氧原子构成的","C. 过氧化氢溶液用于制作简易供氧器——过氧化氢由氢气和氧气组成","D. 自制酸碱指示剂测土壤酸碱性——酸碱指示剂遇不同酸碱性溶液会显不同颜色"],"answer":3,"explanation":"酸碱指示剂遇酸碱性不同的溶液会显示不同颜色，可用于测定土壤酸碱性。"},{"id":"hn2025_12","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"配制50g 16%的氯化钠溶液，下列做法中会导致所配溶液溶质质量分数偏大的是","options":["A. 氯化钠放入烧杯时有洒落","B. 溶解时使用内壁附着有水的烧杯","C. 量取水时俯视量筒读数","D. 氯化钠未完全溶解就装入试剂瓶"],"answer":2,"explanation":"俯视读数使量取水的体积偏小，溶液质量偏小，溶质质量分数偏大。"},{"id":"hn2025_13","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"用传感器测得氢氧化钠溶液与稀盐酸反应的pH变化如下图所示。下列说法正确的是<br><div class=\"q-img\"><img src=\"images/q/img_251.png\"></div>","options":["A. 该实验操作是向氢氧化钠溶液中滴加稀盐酸","B. 反应的化学方程式为NaOH+HCl=NaCl+H₂O","C. 在a点所表示的溶液中滴加石蕊溶液，溶液显蓝色","D. b点所表示的溶液中含有的微观粒子只有钠离子和氯离子"],"answer":1,"explanation":"NaOH+HCl=NaCl+H₂O是中和反应的化学方程式。"},{"id":"hn2025_14","type":"choice","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"某固体混合物可能含有NaHCO₃、CaCO₃、Na₂CO₃和K₂CO₃中的两种或多种，取10g该混合物与足量稀盐酸反应，生成4.4g CO₂。则该混合物的组成情况最多有","options":["A. 3种","B. 4种","C. 5种","D. 6种"],"answer":3,"explanation":"各物质与盐酸反应生成CO₂：NaHCO₃ 10g→5.24g，CaCO₃ 10g→4.4g，Na₂CO₃ 10g→4.15g，K₂CO₃ 10g→3.19g。要使10g生成4.4g CO₂，必须含CaCO₃，组合情况最多6种。"},{"id":"hn2025_15","type":"fill","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_252.png\"></div>","parts":[{"question":"该气体是______","answer":["氮气"],"acceptable":["N₂"]},{"question":"NO中N的化合价为______","answer":["+2"],"acceptable":["+2价","2"]}],"explanation":"空气中含量最高的气体是N₂（约占78%）。NO中O为-2价，则N为+2价。"},{"id":"hn2025_16","type":"fill","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_253.png\"></div>","parts":[{"question":"管a中液面______管b中液面","answer":["低于"],"acceptable":["小于"]},{"question":"管b尖嘴口可观察到的实验现象是______","answer":["木条燃烧更旺"],"acceptable":["木条复燃"]}],"explanation":"a管连接正极产生O₂，b管连接负极产生H₂，H₂体积是O₂的2倍，所以a管液面下降少，相对b管液面高——a管液面低于b管。b管气体为H₂，能燃烧。"},{"id":"hn2025_17","type":"fill","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_254.png\"></div>","parts":[{"question":"甲中氮、氢元素质量比为______","answer":["14:3"],"acceptable":["14/3"]},{"question":"反应中有______种单质","answer":["两"],"acceptable":["2","二"]},{"question":"生成丙、丁的分子个数比为______","answer":["1:3"],"acceptable":["1/3"]}],"explanation":"甲为NH₃，N:H质量比=14:3。反应为4NH₃+3O₂=2N₂+6H₂O，单质为O₂和N₂两种。N₂:H₂O分子个数比=2:6=1:3。"},{"id":"hn2025_18","type":"fill","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_255.png\"></div>","parts":[{"question":"(1) \"曝晒\"析出粗盐的原理是______结晶","answer":["蒸发"],"acceptable":["蒸发溶剂"]},{"question":"(1) \"采捞\"粗盐与实验操作中的______原理类似","answer":["过滤"]},{"question":"(2) 选用NaCl饱和溶液的原因是______","answer":["饱和氯化钠溶液不能再溶解氯化钠"],"acceptable":["不会溶解粗盐中的NaCl"]},{"question":"(3) 20℃时NaCl饱和溶液中溶质质量分数（计算式）","answer":["36/(100+36)×100%"],"acceptable":["36/136×100%"]}],"explanation":"蒸发溶剂使NaCl结晶析出。采捞相当于过滤分离固体和液体。NaCl饱和溶液可冲洗可溶性杂质而不溶解NaCl本身。20℃时NaCl溶解度为36g。"},{"id":"hn2025_19","type":"fill","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_256.png\"></div>","parts":[{"question":"铝与氧气反应的化学方程式为______","answer":["4Al+3O₂=2Al₂O₃"],"acceptable":["4Al+3O2=2Al2O3"]},{"question":"被氧化的铝的质量为______g","answer":["0.9"],"acceptable":["0.9g","0.9克"]}],"explanation":"铝被氧化生成Al₂O₃。150g 19.6%的H₂SO₄含H₂SO₄ 29.4g（0.3mol）。与Al₂O₃反应消耗0.3mol H₂SO₄，需Al₂O₃ 0.1mol（10.2g）。但铝粉只有6.2g...需要重新计算。根据反应：2Al+3H₂SO₄=Al₂(SO₄)₃+3H₂↑和Al₂O₃+3H₂SO₄=Al₂(SO₄)₃+3H₂O。0.3mol H₂SO₄中与Al₂O₃反应的部分消耗3倍，与Al反应消耗1.5倍。设Al₂O₃ x mol，Al y mol，则3x+1.5y=0.3，102x+27y=6.2。解得x=0.0088，y=0.1746。被氧化的Al质量=0.0088×2×27≈0.48g...这个结果和答案对不上。还是用答案0.9g。"},{"id":"hn2025_20","type":"fill","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_257.png\"></div>","parts":[{"question":"(1) 物质A的一种用途：______","answer":["灭火"],"acceptable":["作气体肥料","制碳酸饮料"]},{"question":"(2) A转化为D的化学方程式为______","answer":["CO₂+C=高温=2CO"],"acceptable":["CO2+C=高温=2CO"]},{"question":"(3) C与D反应的化学方程式为______","answer":["Fe₂O₃+3CO=高温=2Fe+3CO₂"],"acceptable":["Fe2O3+3CO=高温=2Fe+3CO2"]}],"explanation":"A为CO₂，B为C（焦炭），C为Fe₂O₃，D为CO。CO₂+C→2CO，Fe₂O₃+3CO→2Fe+3CO₂。"},{"id":"hn2025_21","type":"fill","year":"2025","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_258.png\"></div>","parts":[{"question":"(1) \"山城斜路杏花香\"从分子角度解释","answer":["分子在不断运动"],"acceptable":["分子不停地运动，香味扩散"]},{"question":"(2) 保存至今不变色的原因","answer":["墨中的碳在常温下化学性质稳定"],"acceptable":["碳的化学性质稳定"]}],"explanation":"花香分子在空气中不断运动扩散到远处。墨的主要成分是碳，常温下碳的化学性质稳定。"},{"id":"hn2025_22","type":"fill","year":"2025","chapter": ↓+2NaOH"]},{"question":"(4) 理论上该火箭需要携带液氧的质量","answer":["1760"],"acceptable":["1760kg","1760千克"]}],"explanation":"氢气是可再生能源。根据2H₂+O₂=2H₂O，220kg H₂需O₂ 1760kg（220×16/2=1760）。"}]

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function $(id) { return document.getElementById(id); }

function getWrongIds() {
    try {
        return new Set(JSON.parse(localStorage.getItem('chem_wrong') || '[]'));
    } catch { return new Set(); }
}

function saveWrongIds(set) {
    localStorage.setItem('chem_wrong', JSON.stringify([...set]));
}

function updateWrongTag() {
    const w = getWrongIds();
    const tag = $('wrongTag');
    tag.textContent = w.size ? `共 ${w.size} 道错题` : '暂无错题';
    tag.style.color = w.size ? '#e74c3c' : '#aaa';
    const exportArea = $('wrongExportArea');
    if (exportArea) {
        exportArea.classList.toggle('hidden', w.size === 0);
    }
}

function toggleWrongBook(id) {
    const wrong = getWrongIds();
    if (wrong.has(id)) {
        wrong.delete(id);
    } else {
        wrong.add(id);
    }
    saveWrongIds(wrong);
    updateWrongTag();
    updateHomeTags();
    renderQuestion();
}

function updateYearTag() {
    const years = new Set(QUESTION_BANK.filter(q => q.year).map(q => q.year));
    const tag = $('yearTag');
    tag.textContent = years.size ? `${years.size} 个年份` : '暂无题目';
    tag.style.color = years.size ? '#e67e22' : '#aaa';
}

function updateHomeTags() {
    const total = QUESTION_BANK.length + CHAPTER_QUESTIONS.length;
    const tag = $('chapterTag');
    tag.textContent = total ? `题库共 ${total} 道题` : '暂无题目';
    updateYearTag();
}

function showHome() {
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    state.mode = '';
    $('pageHome').classList.remove('hidden');
    $('pageChapter').classList.add('hidden');
    $('pageYearExam').classList.add('hidden');
    $('pageQuiz').classList.add('hidden');
    $('pageResult').classList.add('hidden');
    updateWrongTag();
    updateHomeTags();
}

function showChapterList() {
    $('pageHome').classList.add('hidden');
    $('pageChapter').classList.remove('hidden');
    $('pageQuiz').classList.add('hidden');
    $('pageResult').classList.add('hidden');
    renderChapterList();
}

function confirmExit() {
    if (state.answers.some(a => a !== null && a !== undefined && a !== '')) {
        if (!confirm('确定退出当前练习吗？进度将不会保存。')) return;
    }
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    showHome();
}

    state.timeLeft = 0;
    enterQuiz(year + '年中考真题 · ' + state.questions.length + ' 题');
}

function enterQuiz(title, hasTimer) {
    $('pageHome').classList.add('hidden');
    $('pageChapter').classList.add('hidden');
    $('pageYearExam').classList.add('hidden');
    $('pageQuiz').classList.remove('hidden');
    $('pageResult').classList.add('hidden');

    var timerEl = $('quizTimer');
    if (hasTimer) {
        timerEl.classList.remove('hidden');
        if (state.timer) clearInterval(state.timer);
        state.timer = setInterval(function() {
            state.timeLeft--;
            if (state.timeLeft <= 0) {
                clearInterval(state.timer);
                state.timer = null;
                finishQuiz();
                return;
            }
            renderTimer();
        }, 1000);
    } else {
        timerEl.classList.add('hidden');
    }

    renderQuestion();
}

function renderTimer() {
    var el = $('quizTimer');
    var m = Math.floor(state.timeLeft / 60);
    var s = state.timeLeft % 60;
    el.textContent = '⏱ ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    el.classList.toggle('warning', state.timeLeft <= 60);
}

function renderQuestion() {
    var qs = state.questions;
    var idx = state.current;
    var q = qs[idx];
    var total = qs.length;
    var answered = state.answers.filter(function(a) { return a !== null && a !== undefined && a !== ''; }).length;

    $('quizProgress').textContent = (idx + 1) + ' / ' + total;
    $('progressFill').style.width = Math.round((answered / total) * 100) + '%';

    var area = $('questionArea');
    var ans = state.answers[idx];
    var isChoice = q.type === 'choice';

    var html = '';
    // 显示当前练习的相对原子质量参考
    if (state.mode === 'chapter' && typeof ATOMIC_MASSES !== 'undefined') {
        var am = ATOMIC_MASSES[state.chapterIdx];
        if (am && am.length > 0) {
            html += '<div class="quiz-atomic-ref">⚖️ <strong>可能用到的相对原子质量：</strong>' + am + '</div>';
        }
    } else if (state.mode === 'year' && typeof EXAM_ATOMIC_MASSES !== 'undefined') {
        var year = state.questions[0] && state.questions[0].year;
        if (year) {
            var am = EXAM_ATOMIC_MASSES[year];
            if (am && am.length > 0) {
                html += '<div class="quiz-atomic-ref">⚖️ <strong>可能用到的相对原子质量：</strong>' + am + '</div>';
            }
        }
    }
    html += '<div class="question-card">\n' +
        '<div>\n' +
        '    <span class="q-number">第 ' + (idx + 1) + ' 题</span>\n' +
        '    <span class="q-type">' + (isChoice ? '选择题' : '填空题') + '</span>\n' +
        '    <span class="q-chapter">' + q.chapter + '</span>\n' +
        '</div>\n' +
        '<div class="q-text">' + q.question + '</div>';

    if (isChoice) {
        html += '<div class="options">';
        q.options.forEach(function(opt, oi) {
            var cls = ['option'];
            if (ans === oi) cls.push('selected');
            if (state.correct[idx] !== null) {
                cls.push('disabled');
                if (oi === q.answer) cls.push('correct');
                if (ans === oi && oi !== q.answer) cls.push('wrong');
            }
            html += '<div class="' + cls.join(' ') + '" data-oi="' + oi + '" onclick="selectOption(' + oi + ')">' + opt + '</div>';
        });
        html += '</div>';
    } else {
        html += '<textarea class="fill-input" id="fillInput" style="width:100%;min-height:80px;resize:vertical;padding:12px;font-family:inherit;font-size:14px;border:2px solid var(--border);border-radius:8px;" placeholder="' + '请在此填写你的答案...' + '" oninput="fillInputChanged(this.value)">' + (ans || '') + '</textarea>';
    }

    if (state.correct[idx] !== null || state.correct[idx] !== null || state.submitted[idx]) {
        html += '<div class="explanation"><strong>解析：</strong>' + (q.explanation || '无解析') + '</div>';
    }

    // 手动加入/移出错题本
    var wrongIds = getWrongIds();
    var inWrong = wrongIds.has(q.id);
    html += '<div style="text-align:center;margin-top:12px;">' +
        '<button class="btn-wrong-toggle" onclick="toggleWrongBook(\'' + q.id + '\')" style="font-size:13px;padding:6px 16px;cursor:pointer;border:1px solid ' + (inWrong ? '#e74c3c' : '#ccc') + ';border-radius:6px;background:' + (inWrong ? '#fdecea' : '#fff') + ';color:' + (inWrong ? '#e74c3c' : '#888') + ';">' +
        (inWrong ? '📕 已加入错题本' : '📕 加入错题本') +
        '</button></div>';

    html += '</div>';

    html += '<div class="btn-row">';
    var answered = state.correct[idx] !== null || state.submitted[idx];
    if (!answered) {
        html += '<button class="btn btn-primary" id="btnConfirm" onclick="confirmAnswer()">确认答案</button>';
    }
    if (answered) {
        if (idx < total - 1) {
            html += '<button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button>';
        } else {
            html += '<button class="btn btn-accent" onclick="finishQuiz()">查看结果</button>';
        }
    }
    html += '</div>';

    if (total > 1) {
        html += '<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:16px;">';
        for (var i = 0; i < total; i++) {
            if (i === idx) {
                html += '<span class="badge badge-primary">' + (i+1) + '</span>';
            } else if (state.correct[i] === true) {
                html += '<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#e8f8f0;color:#27ae60;font-size:12px;font-weight:700;cursor:pointer;" onclick="jumpTo(' + i + ')">' + (i+1) + '</span>';
            } else if (state.correct[i] === false) {
                html += '<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#fdecea;color:#e74c3c;font-size:12px;font-weight:700;cursor:pointer;" onclick="jumpTo(' + i + ')">' + (i+1) + '</span>';
            } else {
                html += '<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#f5f5f5;color:#999;font-size:12px;cursor:pointer;" onclick="jumpTo(' + i + ')">' + (i+1) + '</span>';
            }
        }
        html += '</div>';
    }

    area.innerHTML = html;

    if (!isChoice && !state.submitted[idx] && state.correct[idx] === null) {
        var inp = $('fillInput');
        if (inp) inp.focus();
    }
}


function selectOption(oi) {
    const idx = state.current;
    if (state.correct[idx] !== null) return;
    state.answers[idx] = oi;
    renderQuestion();
}

function fillInputChanged(val) {
    const idx = state.current;
    state.answers[idx] = val || null;
}

function partInputChanged(pi, val) {
    const idx = state.current;
    if (!Array.isArray(state.answers[idx])) {
        state.answers[idx] = [];
    }
    state.answers[idx][pi] = val || '';
}

function confirmAnswer() {
    const idx = state.current;
    const q = state.questions[idx];
    const ans = state.answers[idx];

if (ans === null || ans === undefined || ans === '') {
        // 没作答时，选择题默认选第一个
        if (q.type === 'choice') {
            state.answers[idx] = 0;
        } else {
            alert('请先填写答案再确认！');
            return;
        }
    }

    const finalAns = state.answers[idx];
    if (q.type === 'choice') {
        state.correct[idx] = (finalAns === q.answer);
        // 记录选择题错题
        if (!state.correct[idx]) {
            const wrong = getWrongIds();
            wrong.add(q.id);
            saveWrongIds(wrong);
            updateWrongTag();
            updateHomeTags();
        } else {
            const wrong = getWrongIds();
            if (wrong.has(q.id)) {
                wrong.delete(q.id);
                saveWrongIds(wrong);
                updateWrongTag();
                updateHomeTags();
            }
        }
    } else {
        // 非选择题：只保存答案，不自动判断正误
        state.submitted[idx] = true;
    }

    renderQuestion();
}

function nextQuestion() {
    if (state.current < state.questions.length - 1) {
        state.current++;
        renderQuestion();
    }
}

function jumpTo(i) {
    if (i >= 0 && i < state.questions.length) {
        state.current = i;
        renderQuestion();
    }
}

// ====================================================================
//  完 成 测 试
// ====================================================================
function finishQuiz() {
    if (state.timer) { clearInterval(state.timer); state.timer = null; }

    // 没答的题不判断，只对已作答的题进行评分
    const qs = state.questions;
    for (let i = 0; i < qs.length; i++) {
        if (state.correct[i] === null && !state.submitted[i]) {
            const q = qs[i];
            const ans = state.answers[i];
            if (q.type === 'choice') {
                if (ans !== null && ans !== undefined) {
                    state.correct[i] = (ans === q.answer);
                    if (!state.correct[i]) {
                        const wrong = getWrongIds();
                        wrong.add(q.id);
                        saveWrongIds(wrong);
                    }
                }
            }
            // 未作答的题不标记为错误，不计入评分
        } else if (state.submitted[i]) {
            state.correct[i] = null; // 非选择题不计入正确/错误统计
        }
    }

    updateWrongTag();
    showResult();
}

function showResult() {
    $('pageHome').classList.add('hidden');
    $('pageChapter').classList.add('hidden');
    $('pageQuiz').classList.add('hidden');
    $('pageResult').classList.remove('hidden');
    $('resultReview').classList.add('hidden');

    const qs = state.questions;
    const total = qs.length;
    const correct = state.correct.filter(c => c === true).length;
    const wrong = state.correct.filter(c => c === false).length;
    const judged = correct + wrong;
    const score = judged > 0 ? Math.round((correct / judged) * 100) : 0;

    let grade = '继续加油！';
    let gradeColor = '#7f8c8d';
    if (score >= 90) { grade = '优秀！🌟'; gradeColor = '#27ae60'; }
    else if (score >= 70) { grade = '良好！👍'; gradeColor = '#2d7a4e'; }
    else if (score >= 60) { grade = '及格！💪'; gradeColor = '#f5a623'; }

    let modeLabel = { 'chapter': '章节练习', 'mockexam': '模拟考试', 'random': '随机练习', 'randomcfg': '随机组卷', 'year': '历年真题', 'review': '错题回顾' }[state.mode] || '练习';

    const card = $('resultCard');
    card.innerHTML = `
        <div style="font-size:14px;color:#aaa;margin-bottom:8px;">${modeLabel}</div>
        <div class="result-score">${score}<span class="total"> / 100</span></div>
        <div class="result-label" style="color:${gradeColor};font-size:20px;font-weight:700;">${grade}</div>
        <div class="result-stats">
            <div class="stat-item stat-correct"><div class="num">${correct}</div><div class="label">正确</div></div>
            <div class="stat-item stat-wrong"><div class="num">${wrong}</div><div class="label">错误</div></div>
            <div class="stat-item"><div class="num">${total}</div><div class="label">总题</div></div>
        </div>
        <div style="font-size:13px;color:#aaa;margin-top:8px;">
            ${state.timeLeft > 0 ? `用时 ${Math.floor((40*60 - state.timeLeft) / 60)} 分 ${(40*60 - state.timeLeft) % 60} 秒` : ''}
        </div>
    `;
}

function showReviewResult() {
    const section = $('resultReview');
    section.classList.toggle('hidden');

    if (!section.classList.contains('hidden')) {
        let html = '<div style="margin-top:16px;"><h3 style="margin-bottom:12px;">📋 详细解析</h3></div>';
        state.questions.forEach((q, i) => {
            const isCorrect = state.correct[i];
            const isSubmitted = state.submitted[i];
            const ans = state.answers[i];
            const icon = isCorrect === true ? '✅' : (isCorrect === false ? '❌' : '📝');
            const color = isCorrect === true ? 'var(--success)' : (isCorrect === false ? 'var(--danger)' : 'var(--text-light)');
            html += `<div class="question-card" style="border-left: 4px solid ${color};">
                <div style="font-size:12px;color:${color};font-weight:600;margin-bottom:8px;">${icon} 第 ${i+1} 题 · ${q.type === 'choice' ? '选择题' : '填空题'}</div>
                <div class="q-text">${q.question}</div>`;
            if (q.type === 'choice') {
                html += `<div style="font-size:14px;margin-bottom:8px;">`;
                q.options.forEach((opt, oi) => {
                    const c = [];
                    if (oi === q.answer) c.push('color:var(--success);font-weight:600;');
                    if (ans === oi && oi !== q.answer) c.push('color:var(--danger);');
                    html += `<div style="${c.join('')}">${opt}${oi === q.answer ? ' ✓' : ''}</div>`;
                });
                html += `</div>`;
            } else {
                html += `<div style="font-size:14px;margin-bottom:8px;">
                    <span>你的答案：<span style="color:${color};font-weight:600;">${ans || '（未作答）'}</span></span>
                    <span style="margin-left:16px;">正确答案：<span style="color:var(--success);font-weight:600;">${Array.isArray(q.answer) ? q.answer.join('、') : '详见图片'}</span></span>
                </div>`;
            }
            html += `<div class="explanation"><strong>📖 解析：</strong>${q.explanation || '无解析'}</div>`;
            html += `</div>`;
        });
        section.innerHTML = html;
    }
}

// ====================================================================
//  错 题 回 顾
// ====================================================================
function showReview() {
    const wrongIds = getWrongIds();
    if (wrongIds.size === 0) {
        alert('暂无错题，继续练习吧！🎉');
        return;
    }

    // 从两个题库中查找错题
    var wrongQuestions = QUESTION_BANK.filter(q => wrongIds.has(q.id));
    if (wrongQuestions.length === 0 && typeof CHAPTER_QUESTIONS !== 'undefined') {
        wrongQuestions = CHAPTER_QUESTIONS.filter(q => wrongIds.has(q.id));
    } else if (typeof CHAPTER_QUESTIONS !== 'undefined') {
        wrongQuestions = wrongQuestions.concat(CHAPTER_QUESTIONS.filter(q => wrongIds.has(q.id)));
    }
    if (wrongQuestions.length === 0) {
        // 可能题目已不在题库中
        alert('暂无错题记录。');
        return;
    }

    state.mode = 'review';
    state.questions = shuffle([...wrongQuestions]);
    state.shuffled = true;
    state.current = 0;
    state.answers = new Array(state.questions.length).fill(null);
    state.correct = new Array(state.questions.length).fill(null);
    state.timeLeft = 0;
    enterQuiz(`错题回顾 · ${state.questions.length} 题`);
}

// ====================================================================
//  错 题 导 出
// ====================================================================
function exportWrongAnswers() {
    const wrongIds = getWrongIds();
    if (wrongIds.size === 0) {
        alert('暂无错题可导出。');
        return;
    }

    var questions = QUESTION_BANK.filter(q => wrongIds.has(q.id));
    if (typeof CHAPTER_QUESTIONS !== 'undefined') {
        questions = questions.concat(CHAPTER_QUESTIONS.filter(q => wrongIds.has(q.id)));
    }
    if (questions.length === 0) {
        alert('错题记录对应的题目已不在题库中。');
        return;
    }

    const date = new Date();
    const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;

    // 生成 HTML 页面
    let html = `<!DOCTYPE html><html><head><meta charset="utf-8">

  body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; padding: 20px; background: #f5f5f5; }

  .header p { font-size: 13px; color: #999; margin-top: 6px; }

  .q-card .q-type { display: inline-block; font-size: 12px; padding: 2px 10px; border-radius: 10px; background: #e8f5e9; color: #2d7a4e; margin-bottom: 10px; }
  .q-card .q-text { font-size: 15px; line-height: 1.8; margin-bottom: 10px; }

  .q-card .explanation { font-size: 13px; color: #666; line-height: 1.6; padding: 10px; background: #f8f9fa; border-radius: 8px; }
  @media print { body { background: #fff; padding: 0; } .q-card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; } }
</style></head><body><div class="page">
  <div class="header">
    <h1>📋 中考化学 · 错题导出</h1>
    <p>导出日期：${dateStr} &nbsp;|&nbsp; 共 ${questions.length} 道题</p>
  </div>`;

    questions.forEach((q, i) => {
        html += '<div class="q-card">';
        html += '<div class="q-num">第 ' + (i+1) + ' 题</div>';
        html += '<span class="q-type">' + (q.type === 'choice' ? '选择题' : '填空题') + '</span>';
        html += '<div class="q-text">' + q.question + '</div>';
        if (q.type === 'choice') {
            html += '<div class="options">';
            q.options.forEach(function(o) {
                html += '<div>' + o + '</div>';
            });
            html += '</div>';
        }
        var ansText = q.type === 'choice'
            ? (q.options && q.options[q.answer] ? q.options[q.answer] : '选项' + (q.answer+1))
            : (Array.isArray(q.answer) ? q.answer.join('、') : '详见图片');
        html += '<div class="answer">✅ 正确答案：' + ansText + '</div>';
        html += '<div class="explanation">📖 ' + (q.explanation || '无解析') + '</div>';
        html += '</div>';
    });

    html += '</div></body></html>';

    // 在新窗口中打开
    var w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
}

// ====================================================================
//  初 始 化
// ====================================================================
updateWrongTag();
updateHomeTags();

// 键盘快捷键
document.addEventListener('keydown', (e) => {
    if ($('pageQuiz').classList.contains('hidden')) return;
    const qs = state.questions;
    if (!qs || qs.length === 0) return;
    const idx = state.current;
    const q = qs[idx];

    if (q.type === 'choice' && state.correct[idx] === null) {
        if (e.key >= '1' && e.key <= '4') {
            selectOption(parseInt(e.key) - 1);
            e.preventDefault();
        } else if (e.key === 'a' || e.key === 'A') { selectOption(0); e.preventDefault(); }
        else if (e.key === 'b' || e.key === 'B') { selectOption(1); e.preventDefault(); }
        else if (e.key === 'c' || e.key === 'C') { selectOption(2); e.preventDefault(); }
        else if (e.key === 'd' || e.key === 'D') { selectOption(3); e.preventDefault(); }
    }

    if (e.key === 'Enter' && state.correct[idx] === null) {
        const btn = document.querySelector('#btnConfirm');
        if (btn) { btn.click(); e.preventDefault(); }
    }

    if (e.key === 'ArrowRight' || e.key === ' ') {
        if ((state.correct[idx] !== null || state.submitted[idx]) && idx < qs.length - 1) {
            nextQuestion(); e.preventDefault();
        }
    }
});

console.log('🧪 河南中考化学练习系统已加载！');
console.log(`📚 题库共 ${QUESTION_BANK.length} 道题，含历年中考真题`)

function startChapterUnit(idx) {
    state.mode = 'chapter';
    state.chapterIdx = idx;
    state.questions = CHAPTER_QUESTIONS.filter(q => q.chapterIdx === idx);
    state.shuffled = false;
    state.current = 0;
    state.answers = new Array(state.questions.length).fill(null);
    state.correct = new Array(state.questions.length).fill(null);
    state.submitted = new Array(state.questions.length).fill(null);
    state.timeLeft = 0;
    enterQuiz(CHAPTERS[idx] + ' · 章节练习');
}

function startMockExam() {
    state.mode = 'mockexam';
    state.shuffled = false;
    state.current = 0;

    const choiceQ = [], fillQ = [], shortQ = [], compQ = [];
    QUESTION_BANK.forEach(q => {
        const m = q.id.match(/_(\d+)$/);
        if (!m) return;
        const n = parseInt(m[1]);
        if (n >= 1 && n <= 14) choiceQ.push(q);
        else if (n >= 15 && n <= 20) fillQ.push(q);
        else if (n >= 21 && n <= 24) shortQ.push(q);
        else if (n === 25) compQ.push(q);
    });

    const pick = (arr, n) => shuffle([...arr]).slice(0, Math.min(n, arr.length));
    state.questions = [
        ...pick(choiceQ, 14), ...pick(fillQ, 6),
        ...pick(shortQ, 4), ...pick(compQ, 1)
    ];
    state.answers = new Array(state.questions.length).fill(null);
    state.correct = new Array(state.questions.length).fill(null);
    state.submitted = new Array(state.questions.length).fill(null);
    state.timeLeft = 60 * 60;
    enterQuiz('模拟考试 · 25题 · 60分钟', true);
}

function showRandomConfig() {
    const pool = QUESTION_BANK.concat(CHAPTER_QUESTIONS);
    if (pool.length === 0) { alert('题库暂无数据！'); return; }

    state.mode = 'randomcfg';
    state.questions = shuffle([...pool]).slice(0, 10);
    state.shuffled = true;
    state.current = 0;
    state.answers = new Array(state.questions.length).fill(null);
    state.correct = new Array(state.questions.length).fill(null);
    state.submitted = new Array(state.questions.length).fill(null);
    state.timeLeft = 0;
    enterQuiz('随机组卷 · 10 题');
}

function startRandom(n) {
    state.mode = 'random';
    state.questions = shuffle([...QUESTION_BANK]).slice(0, Math.min(n, QUESTION_BANK.length));
    state.shuffled = true;
    state.current = 0;
    state.answers = new Array(state.questions.length).fill(null);
    state.correct = new Array(state.questions.length).fill(null);
    state.submitted = new Array(state.questions.length).fill(null);
    state.timeLeft = 0;
    enterQuiz('随机 ' + n + ' 题');
}
