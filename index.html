夫","D. 张青莲"],"answer":0,"explanation":"侯德榜发明了联合制碱法（侯氏制碱法）。拉瓦锡提出了燃烧的氧化学说；门捷列夫编制了元素周期表；张青莲测定了铟等元素的相对原子质量。"},{"id":"hn2014_04","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"河南名吃胡辣汤营养美味，下列用到的食材中富含蛋白质的是","options":["A. 小麦粉","B. 大葱","C. 牛肉","D. 红薯粉条"],"answer":2,"explanation":"牛肉富含蛋白质。小麦粉富含淀粉（糖类）；大葱富含维生素；红薯粉条主要成分为淀粉（糖类）。"},{"id":"hn2014_05","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"下列各组物质中，都由分子构成的一组是","options":["A. 金和金刚石","B. 水和氨气","C. 汞和氯化钠","D. 干冰和硫酸铜"],"answer":1,"explanation":"水和氨气(H₂O和NH₃)都由分子构成。金(Au)和金刚石(C)由原子构成，汞(Hg)由原子构成，氯化钠(NaCl)和硫酸铜(CuSO₄)由离子构成，干冰(CO₂)由分子构成。"},{"id":"hn2014_06","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"下列说法中正确的是<br><div class=\"q-img\"><img src=\"images/q/img_86.png\"></div>","options":["A. 该反应属于复分解反应","B. 该反应中元素的化合价没有变化","C. 图中的两种化合物都属于氧化物","D. 该反应所得生成物的质量比为1:1"],"answer":2,"explanation":"图中反应为H₂O+CO→(高温)CO₂+H₂。H₂O和CO₂均为氧化物（由两种元素组成且含氧元素），故C正确。该反应中C和H元素化合价有变化，生成物CO₂与H₂质量比44:2=22:1。"},{"id":"hn2014_07","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"下列有关化学实验的说法中不正确的是","options":["A. 用高锰酸钾制O₂时，反应试管的管口应略向下倾斜","B. 做铁在O₂中燃烧实验时，集气瓶应先放少量水或细沙","C. 配制稀硫酸时，可在盛浓硫酸的烧杯中慢慢倒入蒸馏水","D. 用金属和酸制H₂时，可采用与制CO₂相同的发生装置"],"answer":2,"explanation":"C不正确：浓硫酸密度比水大且溶解放热，应将浓硫酸沿器壁缓缓倒入水中并搅拌（酸入水），不可将水倒入浓硫酸中，否则会沸腾溅出。"},{"id":"hn2014_08","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"分类是学习和研究化学的常用方法。下列分类中正确的是","options":["A. 有机物：甲烷、乙醇、乙酸","B. 复合肥料：尿素、硝酸钾、磷酸氢二铵","C. 混合物：煤、石油、冰水共存物","D. 合成材料：合金、合成橡胶、合成纤维"],"answer":0,"explanation":"A正确：甲烷(CH₄)、乙醇(C₂H₅OH)、乙酸(CH₃COOH)均为含碳有机物。B错：尿素[CO(NH₂)₂]只含N，是氮肥而非复合肥；C错：冰水共存物是纯净物（均为H₂O）；D错：合金属于金属材料。"},{"id":"hn2014_09","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"下列说法中不正确的是<br><div class=\"q-img\"><img src=\"images/q/img_87.png\"></div>","options":["A. t₁℃时，甲和乙的溶解度相等","B. t₁℃时，30 g乙加到100 g水中形成饱和溶液","C. t₂℃时，各100 g饱和溶液降温至t₁℃析出固体甲多于乙","D. t₂℃时，75 g甲的饱和溶液中加100 g水得到20%的溶液"],"answer":3,"explanation":"D不正确：t₂℃时甲溶解度为50g，75g饱和溶液中含甲25g、水50g，加水100g后总质量175g，质量分数=25/175≈14.3%，不是20%。A、B、C均正确。"},{"id":"hn2014_10","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"下列各组物质中，能相互反应且反应前后溶液总质量保持不变的是","options":["A. 铝和硫酸铜溶液","B. 硫酸和烧碱溶液","C. 氧化铁固体和盐酸","D. 碳酸钾溶液和硝酸钠溶液"],"answer":1,"explanation":"B正确：H₂SO₄+2NaOH=Na₂SO₄+2H₂O，无沉淀无气体，溶液总质量不变。A中Al置换Cu使溶液质量变化；C中Fe₂O₃固体溶解使质量增加；D中K₂CO₃和NaNO₃不反应。"},{"id":"hn2014_11","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"下列事实的结论或解释中不正确的是","options":["A. 水烧开后易把壶盖冲起——说明温度升高分子会变大","B. 公园的桂花开放时满园飘香——说明分子在不断运动","C. 酸碱中和反应都能生成水——实质是H⁺与OH⁻结合生成了H₂O","D. 铝制品有抗腐蚀性能——实质是表面生成了致密氧化膜起保护作用"],"answer":0,"explanation":"A不正确：温度升高分子间间隔增大（分子运动加快），而非分子本身变大。B、C、D的解释均正确。"},{"id":"hn2014_12","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"在一定质量的某NaCl溶液中加入足量的AgNO₃溶液，所得AgCl沉淀质量等于原NaCl溶液质量的1/4。则原NaCl溶液中溶质的质量分数约为","options":["A. 40%","B. 30%","C. 20%","D. 10%"],"answer":3,"explanation":"设NaCl溶液质量为m，溶质质量为x。NaCl+AgNO₃=AgCl↓+NaNO₃，58.5g NaCl生成143.5g AgCl。由x/58.5=(m/4)/143.5，得x=m×58.5/(4×143.5)≈0.102m，质量分数≈10%。"},{"id":"hn2014_13","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_88.png\"></div>","parts":[{"question":"(1) A表示什么","answer":["元素符号"],"acceptable":["元素符号"]},{"question":"(2) B表示什么","answer":["相对原子质量"],"acceptable":["相对原子质量","原子量"]}],"explanation":"元素周期表单元格中，元素符号位于中间/上方（如O），相对原子质量位于下方（如16.00）。"},{"id":"hn2014_14","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_89.png\"></div>","parts":[{"question":"(1) 空气体积分数最大的成分","answer":["氮气"],"acceptable":["N₂","氮气(N₂)","N2"]},{"question":"(2) 人体中含量最高的金属元素","answer":["钙"],"acceptable":["Ca","钙(Ca)"]},{"question":"(3) 形成化合物种类最多的元素","answer":["碳"],"acceptable":["C","碳(C)"]}],"explanation":"空气中N₂约占78%（体积分数最大）；人体中钙是含量最高的金属元素（骨骼主要成分）；碳元素可形成种类最多的有机化合物。"},{"id":"hn2014_15","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_90.png\"></div>","parts":[{"question":"(1) 滤液中的溶质","answer":["NaCl、Na₂CO₃"],"acceptable":["NaCl和Na₂CO₃","NaCl, Na₂CO₃","氯化钠和碳酸钠"]},{"question":"(2) 过滤所用玻璃仪器（除烧杯、玻璃棒外）","answer":["漏斗"],"acceptable":["玻璃漏斗","普通漏斗"]},{"question":"(3) 氮肥的化学式","answer":["NH₄Cl"],"acceptable":["NH4Cl","氯化铵"]}],"explanation":"BaCl₂除SO₄²⁻（BaSO₄↓），过量Na₂CO₃除Ca²⁺和过量Ba²⁺（CaCO₃↓和BaCO₃↓），滤液含NaCl和过量Na₂CO₃。NH₃+CO₂+NaCl+H₂O=NaHCO₃+NH₄Cl，氮肥NH₄Cl。"},{"id":"hn2014_16","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_91.png\"></div>","parts":[{"question":"(1) X的质量（g）","answer":["5.6"],"acceptable":["5.6g","5.6克","5.6 g"]},{"question":"(2) O₂与X化学计量数之比","answer":["5:2"],"acceptable":["5∶2"]}],"explanation":"质量守恒：m(X)=4.8+16.0-10.8-4.4=5.6g。CH₄中H全部在H₂O（1.2g H守恒），C部分在CO₂部分在X，推X为CO。配平：4CH₄+5O₂→2CO+2CO₂+8H₂O，O₂与CO系数比5:2。"},{"id":"hn2014_17","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_92.png\"></div>","parts":[{"question":"(1) 易拉罐立即变瘪的原因","answer":["CO₂气体能与NaOH溶液反应而被吸收，使罐内气压减小"],"acceptable":["CO₂被NaOH吸收，罐内气压降低","CO2与NaOH反应被吸收，气压减小"]},{"question":"(2) Al与NaOH溶液反应的化学方程式","answer":["2Al + 2NaOH + 2H₂O = 2NaAlO₂ + 3H₂↑"],"acceptable":["2Al+2NaOH+2H2O=2NaAlO2+3H2↑"]}],"explanation":"CO₂+2NaOH=Na₂CO₃+H₂O，CO₂被吸收使罐内气压减小，易拉罐变瘪。铝与NaOH反应产生H₂：2Al+2NaOH+2H₂O=2NaAlO₂+3H₂↑，罐内气压增大，易拉罐又鼓起。"},{"id":"hn2014_18","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_93.png\"></div>","parts":[{"question":"（1）D的化学式","answer":["Cu(OH)₂"],"acceptable":["Cu(OH)2","氢氧化铜"]},{"question":"（1）由C转化为A的化学方程式","answer":["CuSO₄ + Fe = Cu + FeSO₄"],"acceptable":["CuSO4+Fe=Cu+FeSO4","CuCl₂+Zn=Cu+ZnCl₂","CuCl2+Zn=Cu+ZnCl2"]},{"question":"（2）B的一种用途","answer":["改良酸性土壤"],"acceptable":["作建筑材料","中和酸性土壤","配制农药波尔多液"]},{"question":"（2）由D转化为C的化学方程式","answer":["CaCl₂ + Na₂CO₃ = CaCO₃↓ + 2NaCl"],"acceptable":["CaCl2+Na2CO3=CaCO3↓+2NaCl","CO₂+Ca(OH)₂=CaCO₃↓+H₂O","CO2+Ca(OH)2=CaCO3↓+H2O"]}],"explanation":"（1）A为Cu（紫红色金属），D为Cu(OH)₂（难溶性碱），C为CuSO₄等可溶性铜盐，用Fe置换出Cu。（2）A为CaO（Mr=56），B为Ca(OH)₂，C为CaCO₃（白色难溶），D为CaCl₂；Ca(OH)₂可改良酸性土壤。"},{"id":"hn2014_19","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_94.png\"></div>","parts":[{"question":"（1）可燃物燃烧还需满足什么条件","answer":["温度达到可燃物的着火点"],"acceptable":["达到着火点","温度达到着火点"]},{"question":"（2）氢气作燃料的优点","answer":["燃烧产物是水，不污染环境"],"acceptable":["燃烧热值高","资源丰富","产物无污染"]}],"explanation":"（1）燃烧三要素：可燃物、氧气（助燃剂）、温度达到着火点。（2）H₂燃烧产物只有水，清洁无污染且热值高。"},{"id":"hn2014_20","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_95.png\"></div>","parts":[{"question":"（1）电解水制取氢气的化学方程式","answer":["2H₂O =通电= 2H₂↑ + O₂↑"],"acceptable":["2H2O=通电=2H2↑+O2↑"]},{"question":"（2）磁铁矿石炼铁的化学方程式","answer":["Fe₃O₄ + 4CO =高温= 3Fe + 4CO₂"],"acceptable":["Fe3O4+4CO=高温=3Fe+4CO2"]},{"question":"（3）实验室制取氧气的化学方程式","answer":["2KMnO₄ =Δ= K₂MnO₄ + MnO₂ + O₂↑"],"acceptable":["2KMnO4=Δ=K2MnO4+MnO2+O2↑","2H₂O₂=MnO₂=2H₂O+O₂↑","2H2O2=MnO2=2H2O+O2↑","2KClO₃=Δ=2KCl+3O₂↑","2KClO3=Δ=2KCl+3O2↑"]}],"explanation":"（1）2H₂O→(通电)2H₂↑+O₂↑；（2）磁铁矿(Fe₃O₄)用CO还原炼铁；（3）实验室常用KMnO₄分解、H₂O₂催化分解或KClO₃分解制取O₂。"},{"id":"hn2014_21","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_96.png\"></div>","parts":[{"question":"（1）需氯化钠的质量（g）","answer":["0.9"],"acceptable":["0.9g","0.9克","0.9 g"]},{"question":"（2）导致质量分数偏小的操作及原因","answer":["①和③。操作①使溶剂的质量偏大；操作③使溶质的质量偏小。"],"acceptable":["①和③。①仰视读数取水偏多，③杂质使NaCl质量偏小"]}],"explanation":"（1）根据标签规格（如100mL 0.9%），需NaCl 0.9g。（2）①仰视读数使实际水量偏大，质量分数偏小；②水溅出使溶剂减少，质量分数偏大；③杂质使NaCl质量偏小，质量分数偏小；④转移时溶液已配好，质量分数不变。"},{"id":"hn2014_22","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_97.png\"></div>","parts":[{"question":"（1）图像合理的是","answer":["乙"],"acceptable":["乙图"]},{"question":"（2）NaOH溶液加盐酸有气泡的原因","answer":["NaOH变质生成了Na₂CO₃，盐酸与Na₂CO₃反应生成了CO₂"],"acceptable":["NaOH吸收空气中CO₂生成Na₂CO₃，Na₂CO₃+HCl产生CO₂"]},{"question":"（3）设计实验检验溶质成分","answer":["取反应后的溶液，加入足量CaCl₂溶液（或BaCl₂溶液等），静置，取上层清液滴加酚酞溶液。若溶液变成红色，则溶质为Na₂CO₃和NaOH；若溶液没有变成红色，则溶质只有Na₂CO₃。"],"acceptable":["加过量CaCl₂至沉淀完全，取上层清液加酚酞，变红则有NaOH，不变红则只有Na₂CO₃"]}],"explanation":"（1）NaOH滴入盐酸，pH从小于7升至大于7，乙图符合。（2）NaOH吸收空气中CO₂变质为Na₂CO₃，加HCl产生CO₂气泡。（3）先加过量CaCl₂沉淀CO₃²⁻，再用酚酞检验OH⁻，排除Na₂CO₃碱性的干扰。"},{"id":"hn2014_23","type":"fill","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_98.png\"></div>","parts":[{"question":"（1）不能用于加热的仪器（填字母代号）","answer":["b"],"acceptable":["b（量筒）","量筒","b(量筒)"]},{"question":"（2）①A中反应的化学方程式","answer":["CaCO₃ + 2HCl = CaCl₂ + CO₂↑ + H₂O"],"acceptable":["CaCO3+2HCl=CaCl2+CO2↑+H2O"]},{"question":"（2）②A中气体不能使B中溶液变浑浊的原因","answer":["浓盐酸易挥发，使CO₂中混有HCl，不能生成CaCO₃沉淀"],"acceptable":["盐酸挥发混入CO₂，HCl与Ca(OH)₂反应，阻止CaCO₃生成"]},{"question":"（2）③导管接口连接顺序","answer":["a接g，f接e，d接h"],"acceptable":["g f e d h","a-g-f-e-d-h"]},{"question":"（3）①X为","answer":["锌（或Zn）"],"acceptable":["Zn","锌"]},{"question":"（3）①乙与硝酸钡反应的化学方程式","answer":["ZnSO₄ + Ba(NO₃)₂ = BaSO₄↓ + Zn(NO₃)₂"],"acceptable":["ZnSO4+Ba(NO3)2=BaSO4↓+Zn(NO3)2"]},{"question":"（3）②操作Ⅱ中玻璃仪器的作用","answer":["蒸发时用玻璃棒不断搅拌，防止因局部温度过高造成液滴飞溅"],"acceptable":["搅拌防止局部过热导致液体飞溅"]},{"question":"（4）最多可生产铜的质量","answer":["0.64t"],"acceptable":["0.64吨","0.64 t","0.64"]}],"explanation":"（1）量筒是量器不能加热；烧杯可垫石棉网加热，试管和蒸发皿可直接加热。（2）①CaCO₃+2HCl=CaCl₂+CO₂↑+H₂O；②浓盐酸挥发HCl混入CO₂，与Ca(OH)₂反应不生成CaCO₃；③净化干燥：饱和NaHCO₃除HCl（a→g→f）→浓H₂SO₄干燥（e→d）→收集（h）。（3）①Zn置换Cu；ZnSO₄+Ba(NO₃)₂=BaSO₄↓+Zn(NO₃)₂；②蒸发时玻璃棒搅拌防飞溅。（4）关系式：H₂SO₄~H₂~Cu，98/64=(4.9×20%)/x，x=0.64t。"},{"id":"hn2015_01","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"下列各项中，属于我国《环境空气质量标准》基本监控项目的是（　　）","options":["A. SO₂浓度","B. O₂浓度","C. N₂浓度","D. H₂O浓度"],"answer":0,"explanation":"二氧化硫属于空气污染监控项目。氧气、氮气、水蒸气均为空气正常成分。"},{"id":"hn2015_02","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"下列资源的利用过程中，一定发生了化学变化的是（　　）","options":["A. 风力发电","B. 石油蒸馏得到汽油等","C. 海水晒盐","D. 煤分解得到煤焦油等"],"answer":3,"explanation":"煤分解得到煤焦油等属于化学变化（干馏），生成了新物质。其他三项均为物理变化。"},{"id":"hn2015_03","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"生活中的下列物品，其制作材料属于合金的是（　　）","options":["A. 塑料袋","B. 玻璃杯","C. 不锈钢锅","D. 涤纶风衣"],"answer":2,"explanation":"不锈钢是铁的合金。塑料、玻璃、涤纶均不属于合金。"},{"id":"hn2015_04","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"下列物质在氧气中燃烧，生成物是黑色固体的是（　　）","options":["A. 木炭","B. 铁丝","C. 镁条","D. 红磷"],"answer":1,"explanation":"铁丝在氧气中燃烧生成黑色Fe₃O₄固体。木炭生成CO₂气体，镁条生成白色MgO，红磷生成白色P₂O₅。"},{"id":"hn2015_05","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"2015年世界水日的主题是\"水与可持续发展\"。下列说法正确的是（　　）","options":["A. 冰水共存物属于纯净物","B. 硬水和软水可用石蕊溶液来区分","C. 有水生成的反应一定是酸和碱的中和反应","D. 水电解时所生成氢气和氧气的质量比为2：1"],"answer":0,"explanation":"冰和水均为H₂O，属于纯净物。硬水和软水用肥皂水区分；有水生成的未必是中和反应；电解水H₂与O₂体积比2:1，质量比1:8。"},{"id":"hn2015_06","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"下列图示的实验操作正确的是（　　）<br><div class=\"q-img\"><img src=\"images/q/img_99.png\"></div>","options":["A. 点燃酒精灯","B. 闻气体气味","C. 稀释浓硫酸","D. 测溶液的pH"],"answer":1,"explanation":"闻气体气味应用手在瓶口轻轻扇动。A禁止用酒精灯引燃；C应将浓硫酸注入水中；D不能将pH试纸伸入待测液。"},{"id":"hn2015_07","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"分类法是化学学习的重要方法。下列说法不正确的是（　　）","options":["A. 生石灰、烧碱、浓硫酸都可以用作干燥剂","B. 铁、锌、碘元素都属于人体必需微量元素","C. CH₄、C₂H₅OH、CH₃COOH 都属于有机化合物","D. KNO₃、CO(NH₂)₂、NH₄H₂PO₄ 都属于复合肥料"],"answer":3,"explanation":"CO(NH₂)₂只含氮元素，属于氮肥，不是复合肥料。"},{"id":"hn2015_08","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"下列图象分别与选顶中的操作相对应，其中合理的是（　　）<br><div class=\"q-img\"><img src=\"images/q/img_100.png\"></div><div class=\"q-img\"><img src=\"images/q/img_101.png\"></div><div class=\"q-img\"><img src=\"images/q/img_102.png\"></div><div class=\"q-img\"><img src=\"images/q/img_103.png\"></div>","options":["A. 向一定量稀氢氧化钠溶液中滴入水","B. 向一定量氯化铜溶液中加入一定量铝","C. 向一定量二氧化锰固体中加入一定量过氧化氢溶液","D. 向一定量硫酸和硫酸铜混合溶液中滴入氢氧化钠溶液"],"answer":2,"explanation":"MnO₂是催化剂，反应前后质量不变。A中pH不会小于7；B中溶液质量减小；D中NaOH先与H₂SO₄反应再与CuSO₄反应。"},{"id":"hn2015_09","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"工业制镁的方法为：将含碳酸钙的贝壳制成石灰乳；在海水中加入石灰乳，过滤；在氢氧化镁中加入盐酸，结晶；电解熔融氯化镁。该方法中的化学反应不包括（　　）","options":["A. 化合反应","B. 置换反应","C. 分解反应","D. 复分解反应"],"answer":1,"explanation":"涉及化合（CaO+H₂O）、分解（CaCO₃、MgCl₂电解）、复分解（Mg(OH)₂+HCl），但不涉及置换反应。"},{"id":"hn2015_10","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"除去食盐水中的CaCl₂和Na₂SO₄杂质的操作有：①加过量的BaCl₂溶液；②过滤；③加过量的Na₂CO₃溶液；④蒸发结晶；⑤加适量盐酸。下列操作顺序正确的是（提示BaSO₄、BaCO₃难溶于水）（　　）","options":["A. ③①②⑤④","B. ①⑤③②④","C. ①③⑤④②","D. ①③②⑤④"],"answer":3,"explanation":"顺序：①加BaCl₂除SO₄²⁻→③加Na₂CO₃除Ca²⁺和过量Ba²⁺→②过滤→⑤加盐酸除CO₃²⁻→④蒸发结晶。"},{"id":"hn2015_11","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"KCl与KNO₃在不同温度的溶解度数据如表。则下列说法不正确的是（　　）\n温度/℃\t20\t30\t40\t50\n溶解度/g\tKCl\t34.0\t37.0\t40.0\t42.6\n\tKNO₃\t31.6\t45.8\t63.9\t85.5<br><div class=\"q-img\"><img src=\"images/q/img_104.png\"></div>","options":["A. 20℃时，KCl溶解度大于KNO₃的溶解度","B. 两物质溶解度相等的温度在20～30℃之间","C. 40℃时，5g KCl加10g水可得到33.3%的溶液","D. 50℃时，10g KNO₃中加20g水，充分溶解，再降温到30℃，有KNO₃固体析出"],"answer":2,"explanation":"40℃时KCl溶解度为40g，10g水中最多溶4g KCl，浓度=4/14×100%≈28.6%，不到33.3%。"},{"id":"hn2015_12","type":"choice","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"现有10.6g碳酸钠和8.4g碳酸氢钠，分别与过量盐酸反应，其中（　　）","options":["A. 碳酸钠消耗的氯化氢多","B. 碳酸氢钠生成的二氧化碳多","C. 碳酸氢钠消耗的氯化氢多","D. 碳酸氢钠生成的二氧化碳多"],"answer":0,"explanation":"Na₂CO₃+2HCl=2NaCl+H₂O+CO₂↑，10.6g Na₂CO₃消耗7.3g HCl；NaHCO₃+HCl=NaCl+H₂O+CO₂↑，8.4g NaHCO₃消耗3.65g HCl。二者生成CO₂均为4.4g。"},{"id":"hn2015_13","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_105.png\"></div>","parts":[{"question":"鱼肉中富含有营养素是______","answer":["蛋白质"],"acceptable":["蛋白"]},{"question":"面粉中的淀粉在人体内经酶的催化作用，与水发生反应，最终变成______（化学式为C₆H₁₂O₆）","answer":["葡萄糖"],"acceptable":["C₆H₁₂O₆","C6H12O6"]}],"explanation":"鱼肉富含蛋白质。淀粉在酶的作用下最终转化为葡萄糖（C₆H₁₂O₆）。"},{"id":"hn2015_14","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_106.png\"></div>","parts":[{"question":"原子序数为10的元素名称为______","answer":["氖"],"acceptable":["Ne"]},{"question":"氟原子的核外电子数为______","answer":["9"],"acceptable":["九"]},{"question":"等质量的氧气和氟气中，所含原子数较少的是______","answer":["氟气"],"acceptable":["F₂","F2"]}],"explanation":"原子序数10为氖(Ne)。氟原子序数9，核外电子数9。O₂相对分子质量32，F₂为38，等质量时F₂分子数少，原子数也少。"},{"id":"hn2015_15","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_107.png\"></div>","parts":[{"question":"天然气完全燃烧的化学方程式为______","answer":["CH₄+2O₂=CO₂+2H₂O"],"acceptable":["CH₄+2O₂=点燃=CO₂+2H₂O","CH4+2O2=CO2+2H2O"]},{"question":"消防队员常用高压水枪灭火，其灭火的原理是______","answer":["降低可燃物的温度至着火点以下"],"acceptable":["降温至着火点以下","降低温度至着火点以下"]},{"question":"氢气作燃料的优点是______（答出一条即可）","answer":["生成物是水，不污染环境"],"acceptable":["无污染","热值高","产物是水"]}],"explanation":"CH₄+2O₂=CO₂+2H₂O。水蒸发吸热降温至着火点以下。H₂燃烧产物为水，清洁无污染。"},{"id":"hn2015_16","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_108.png\"></div>","parts":[{"question":"图中的单质为______","answer":["N₂"],"acceptable":["N2","氮气"]},{"question":"该反应前后化合价没有发生变化的元素为______","answer":["氧"],"acceptable":["O","氧元素"]},{"question":"生成物的质量比为______","answer":["22：7"],"acceptable":["22:7"]}],"explanation":"反应为2NO+2CO=2CO₂+N₂。单质为N₂。O化合价不变。CO₂与N₂质量比=(2×44):28=88:28=22:7。"},{"id":"hn2015_17","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_109.png\"></div>","parts":[{"question":"则x=______","answer":["1.4"],"acceptable":["1.4g","1.4克"]},{"question":"化学方程式为______","answer":["4C₂H₂+9O₂=6CO₂+4H₂O+2CO"],"acceptable":["4C₂H₂+9O₂=点燃=6CO₂+4H₂O+2CO","4C2H2+9O2=6CO2+4H2O+2CO"]}],"explanation":"质量守恒：x=2.6+7.2-6.6-1.8=1.4。各物质质量比配平得化学计量数4:9:6:4:2。"},{"id":"hn2015_18","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_110.png\"></div>","parts":[{"question":"化学方程式①：______","answer":["Ca(OH)₂+CO₂=CaCO₃↓+H₂O"],"acceptable":["Ca(OH)₂+CO₂=CaCO₃+H₂O","Ca(OH)2+CO2=CaCO3↓+H2O"]},{"question":"化学方程式②：______","answer":["Fe₂O₃+6HCl=2FeCl₃+3H₂O"],"acceptable":["Fe2O3+6HCl=2FeCl3+3H2O"]},{"question":"A在生产或生活中的一种用途是______","answer":["改良酸性土壤"],"acceptable":["中和酸性土壤","作建筑材料"]}],"explanation":"A为Ca(OH)₂，B为CaCO₃，C为HCl，D为Fe₂O₃。Ca(OH)₂+CO₂=CaCO₃↓+H₂O。Fe₂O₃+6HCl=2FeCl₃+3H₂O。Ca(OH)₂可改良酸性土壤。"},{"id":"hn2015_19","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_111.png\"></div>","parts":[{"question":"该实验能否达到实验目的？请说明理由。","answer":["不能达到实验目的。因为稀盐酸和硫酸钠溶液交换成分后既不生成沉淀，又不生成气体，也不生成水，不能发生化学反应，而质量守恒定律只适用于化学变化。"],"acceptable":["不能。稀盐酸和硫酸钠不发生反应。","不能。没有化学变化发生。"]}],"explanation":"稀盐酸与硫酸钠不反应，没有新物质生成，故不能验证质量守恒定律。"},{"id":"hn2015_20","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_112.png\"></div>","parts":[{"question":"(1) 酒香不怕巷子深。","answer":["分子是不断运动的。酒精分子通过运动扩散到空气中。"],"acceptable":["分子在不断运动","分子运动"]},{"question":"(2) 加压时，6000L氧气可装入容积为40L的钢瓶中。","answer":["分子间有间隔。加压时氧气分子间的间隔变小，体积减小。"],"acceptable":["分子间有间隔","分子间间隔缩小"]}],"explanation":"(1)分子不断运动使酒香扩散。(2)气体分子间隔大，加压后间隔缩小。"},{"id":"hn2015_21","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_113.png\"></div>","parts":[{"question":"(1) 铝比较活泼，为什么铝制品却有很好的抗腐蚀性能？","answer":["铝在常温下与空气中的氧气反应，表面生成一层致密的氧化铝薄膜，阻止了内部的铝进一步氧化。"],"acceptable":["表面形成致密Al₂O₃保护膜","生成致密氧化膜"]},{"question":"(2) 农业上不能用铁制容器配制农药波尔多液（含硫酸铜），请用方程式解释。","answer":["Fe+CuSO₄=FeSO₄+Cu"],"acceptable":["Fe+CuSO4=FeSO4+Cu"]},{"question":"(3)① 若向所得固体上滴盐酸有气泡产生，则该固体含有的金属为______","answer":["银、铜、锌"],"acceptable":["Ag、Cu、Zn"]},{"question":"(3)② 分析该猜想不合理的原因。","answer":["因为锌有剩余，则溶液中Ag⁺和Cu²⁺全部被置换出来，滤液中不可能含有AgNO₃。"],"acceptable":["锌过量，AgNO₃和Cu(NO₃)₂已被完全反应"]}],"explanation":"铝表面形成致密Al₂O₃膜，阻止进一步氧化。锌有剩余时Ag⁺和Cu²⁺全部被置换，滤液中不含AgNO₃。"},{"id":"hn2015_22","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_114.png\"></div>","parts":[{"question":"(1) 写出一个用A装置或B装置制取气体的化学方程式。","answer":["2H₂O₂=2H₂O+O₂↑"],"acceptable":["2KMnO₄=K₂MnO₄+MnO₂+O₂↑","CaCO₃+2HCl=CaCl₂+CO₂↑+H₂O","2H2O2=2H2O+O2↑"]},{"question":"(2)① 制取氨气应选用的一套装置是______（填字母代号）","answer":["AD"],"acceptable":["A和D"]},{"question":"(2)② 氨气极易溶于水，氨水显碱性。则在图2实验可观察到什么现象？","answer":["试管内液面上升，溶液变成红色。"],"acceptable":["液面上升，溶液变红"]},{"question":"(2)③ 试解释白烟产生的原因。","answer":["浓盐酸挥发出的HCl气体与氨气反应生成氯化铵(NH₄Cl)白色固体小颗粒，形成白烟。浓硫酸没有挥发性，所以无此现象。"],"acceptable":["NH₃+HCl=NH₄Cl固体颗粒","浓硫酸难挥发"]}],"explanation":"NH₃用向下排空气法收集。NH₃溶于水显碱性使酚酞变红。NH₃+HCl=NH₄Cl(白烟)。"},{"id":"hn2015_23","type":"fill","year":"2015","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_115.png\"></div>","parts":[{"question":"(1) 下列说法不正确的是______（填字母）","answer":["d"],"acceptable":["D"]},{"question":"(2) 钠与水反应生成氢氧化钠和氢气，化学方程式为______","answer":["2Na+2H₂O=2NaOH+H₂↑"],"acceptable":["2Na+2H2O=2NaOH+H2↑"]},{"question":"(2续) 小苏打受热分解的化学方程式为______","answer":["2NaHCO₃=Na₂CO₃+H₂O+CO₂↑"],"acceptable":["2NaHCO3=Na2CO3+H2O+CO2↑","2NaHCO₃=△=Na₂CO₃+H₂O+CO₂↑"]},{"question":"(3) 配制一瓶如图2溶液需氯化钠______g","answer":["4.5"],"acceptable":["4.5g","4.5克"]},{"question":"(3续) 俯视读数则溶液的质量分数______6%","answer":[">"],"acceptable":["大于","＞"]},{"question":"(4) 取少量该固体样品于试管中，加足量水，可观察到什么现象？","answer":["有气泡产生"],"acceptable":["产生气泡","有O₂生成"]},{"question":"(4续) 如何检验该水溶液中含有的氢氧化钠？","answer":["向该试管中滴加足量的CaCl₂溶液（或BaCl₂溶液），静置，取上层清液，向其中滴加酚酞溶液，溶液变红，说明含有NaOH。"],"acceptable":["先加足量CaCl₂除CO₃²⁻，再加酚酞变红"]},{"question":"(5) 理论上需要钠的质量是多少？","answer":["4.6kg"],"acceptable":["4.6千克","4.6"]}],"explanation":"Na最外层1个电子，易失电子。500mL 0.9%NaCl含NaCl 4.5g。俯视读数水偏少，浓度偏高。Na₂O₂变质生成Na₂CO₃，加水有O₂。检验NaOH需先除CO₃²⁻再用酚酞。"},{"id":"hn2016_01","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"河南烩面营养美味，下列用的食材中富含蛋白质的是","options":["A. 羊肉","B. 青菜","C. 小麦粉","D. 花生油"],"answer":0,"explanation":"羊肉富含蛋白质。青菜富含维生素，小麦粉富含糖类，花生油富含油脂。"},{"id":"hn2016_02","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"下列物质的用途中，利用其化学性质的是","options":["A. 铜用于制作电线","B. 金刚石用于切割大理石","C. 干冰用于人工降雨","D. 熟石灰用于改良酸性土壤"],"answer":3,"explanation":"熟石灰中和土壤酸性是化学变化，利用化学性质。铜导电、金刚石硬度大、干冰升华均为物理性质。"},{"id":"hn2016_03","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"下列物品废弃后可能会带来\"白色污染\"的是","options":["A. 塑料袋","B. 报纸","C. 玻璃瓶","D. 铝质制饮料罐"],"answer":0,"explanation":"塑料袋为塑料制品，难以降解，造成白色污染。报纸可降解，玻璃瓶和铝罐可回收。"},{"id":"hn2016_04","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"下列化肥中，属于复合肥料的是","options":["A. CO(NH₂)₂","B. KNO₃","C. K₂SO₄","D. Ca₃(PO₄)₂"],"answer":1,"explanation":"KNO₃含K、N两种营养元素，是复合肥。A为氮肥，C为钾肥，D为磷肥。"},{"id":"hn2016_05","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"下列有关水的说法中正确的是","options":["A. 水和冰块混合得到混合物","B. 水的蒸发和水通电分解都属于物理变化","C. 硬水是指含有较多可溶性钙、镁化合物的水","D. 水沸腾时可冲起壶盖，说明温度升高分子会变大"],"answer":2,"explanation":"硬水含较多可溶性Ca²⁺、Mg²⁺。冰和水均为H₂O，属于纯净物。水通电分解是化学变化。温度升高分子间隔变大，分子大小不变。"},{"id":"hn2016_06","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"下列图示的实验操作中不正确的是<br><div class=\"q-img\"><img src=\"images/q/img_116.png\"></div>","options":["A","B","C","D"],"answer":1,"explanation":"胶头滴管使用时应保持胶帽在上，不能平放或倒置，防止液体倒流腐蚀胶帽。"},{"id":"hn2016_07","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"下列各组物质中，都由离子构成的一组是","options":["A. NaCl、CuSO₄","B. CH₄、HCl","C. Si、CO₂","D. Ar、Au"],"answer":0,"explanation":"NaCl和CuSO₄由离子构成。CH₄、HCl、CO₂由分子构成，Si、Ar、Au由原子构成。"},{"id":"hn2016_08","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"是甲、乙的溶解度曲线，下列说法不正确的是<br><div class=\"q-img\"><img src=\"images/q/img_117.png\"></div>","options":["A. t₁℃时，乙的溶解度大于甲的溶解度","B. t₂℃时，甲、乙的饱和溶液中溶质的质量分数相等","C. 降低温度能使接近饱和的甲溶液变为饱和溶液","D. t₃℃时，75g甲的饱和溶液中加入50g水，可以得到质量分数为25%的溶液"],"answer":3,"explanation":"t₃℃时甲的溶解度50g，75g饱和溶液含甲25g、水50g，加50g水后质量分数=25/125=20%，不到25%。"},{"id":"hn2016_09","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"下列化学方程式中符合题意且书写正确的是","options":["A. 正常雨水偏弱酸性原因：SO₃+H₂O=H₂SO₄","B. 生活中用天然气作燃料：C₂H₅OH+3O₂=2CO₂+3H₂O","C. 用小苏打治疗胃酸过多症：NaHCO₃+HCl=NaCl+CO₂+H₂O","D. 工业上用熟石灰制烧碱：Ca(OH)₂+2NaNO₃=Ca(NO₃)₂+2NaOH"],"answer":2,"explanation":"A中正常雨水偏弱酸性是因为CO₂+H₂O=H₂CO₃；B中天然气主要成分是CH₄；D不符合复分解反应条件。"},{"id":"hn2016_10","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"偏二甲肼(C₂H₈N₂)与N₂O₄反应放出的能量把火箭送入太空。该反应的化学方程式为C₂H₈N₂+2N₂O₄=2X+3N₂+4H₂O。下列说法正确的是","options":["A. X的化学式为CO","B. 偏二甲肼中碳的质量分数为40%","C. 该反应属于分解反应","D. 生成N₂和H₂O的质量比为14:9"],"answer":1,"explanation":"C₂H₈N₂相对分子质量=24+8+28=60，C%=24/60=40%。X应为CO₂。该反应不是分解反应。N₂与H₂O质量比=(3×28):(4×18)=84:72=7:6。"},{"id":"hn2016_11","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"X、Y、Z有如右图所示的转化（\"→\"表示反应一步实现，部分物质和反应条件已略去），则符合要求的X、Y、Z依次为<br><div class=\"q-img\"><img src=\"images/q/img_118.png\"></div>","options":["A. Cu、CuO、Cu(OH)₂","B. C、CO、H₂CO₃","C. CaO、Ca(OH)₂、CaCO₃","D. H₂O₂、H₂、H₂O"],"answer":2,"explanation":"CaO+H₂O=Ca(OH)₂，Ca(OH)₂+CO₂=CaCO₃↓+H₂O，CaCO₃高温CaO+CO₂↑，三步均可一步实现。"},{"id":"hn2016_12","type":"choice","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"相同质量的镁铝锌分别与相同质量20%的盐酸充分反应，产生氢气质量（直接用各金属表示）大小关系有以下几种猜测：①Mg＞Al＞Zn；②Al＞Mg＞Zn；③Al＝Mg＝Zn；④Al＝Mg＞Zn；⑤Al＝Zn＞Mg；⑥Al＞Mg＝Zn。其中合理的个数为","options":["A. 5个","B. 4个","C. 3个","D. 2个"],"answer":2,"explanation":"酸足量时Al>Mg>Zn(②)；酸对各金属均不足时Al=Mg=Zn(③)；酸对Al、Mg足量但对Zn不足时Al=Mg>Zn(④)。共3个合理。"},{"id":"hn2016_13","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_119.png\"></div>","parts":[{"question":"空气中体积分数约为78%的气体是______","answer":["氮气"],"acceptable":["N₂","N2","氮气(N₂)"]},{"question":"地壳中含量居前两位的元素所形成化合物的化学式为______","answer":["SiO₂"],"acceptable":["SiO2","二氧化硅"]}],"explanation":"空气中N₂约占78%。地壳中含量前两位是O和Si，形成SiO₂。"},{"id":"hn2016_14","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_120.png\"></div>","parts":[{"question":"氖的相对原子质量为______","answer":["20.18"],"acceptable":["20.18"]},{"question":"氖的原子结构示意图为______","answer":["(+10)2 8"],"acceptable":["核外电子排布2、8"]},{"question":"氖在第二周期位于______（填\"最左边\"、\"中间\"或\"最右边\"）","answer":["最右边"],"acceptable":["右边"]}],"explanation":"Ne相对原子质量20.18。核外电子排布2、8，最外层8电子稳定结构，位于第二周期最右边。"},{"id":"hn2016_15","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_121.png\"></div>","parts":[{"question":"煤在空气中燃烧需满足的条件是______","answer":["温度达到煤的着火点"],"acceptable":["达到着火点","温度达到着火点"]},{"question":"灯帽盖灭酒精灯的灭火原理是______","answer":["隔绝空气"],"acceptable":["隔绝氧气","隔绝空气(氧气)"]},{"question":"氢气燃烧的化学方程式为______","answer":["2H₂+O₂=2H₂O"],"acceptable":["2H₂+O₂=点燃=2H₂O","2H2+O2=2H2O"]}],"explanation":"燃烧需温度达着火点。盖灯帽隔绝空气灭火。2H₂+O₂=2H₂O。"},{"id":"hn2016_16","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_122.png\"></div>","parts":[{"question":"该反应的化学方程式为______","answer":["Cl₂+H₂O=HCl+HClO"],"acceptable":["Cl2+H2O=HCl+HClO"]},{"question":"Cl₂通入石灰乳中制取漂白粉的化学方程式为______","answer":["2Cl₂+2Ca(OH)₂=CaCl₂+Ca(ClO)₂+2H₂O"],"acceptable":["2Cl2+2Ca(OH)2=CaCl2+Ca(ClO)2+2H2O"]}],"explanation":"Cl₂+H₂O=HCl+HClO。2Cl₂+2Ca(OH)₂=CaCl₂+Ca(ClO)₂+2H₂O。"},{"id":"hn2016_17","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_123.png\"></div>","parts":[{"question":"所含的金属元素是______（写元素符号）","answer":["Zn"],"acceptable":["锌"]},{"question":"每支口服液含葡萄糖酸锌28.8mg，则含锌______mg","answer":["4"],"acceptable":["4mg","4.0"]}],"explanation":"葡萄糖酸锌中金属元素为Zn。Zn/ZnG=65/455，28.8×65/455≈4.1，取整为4mg。"},{"id":"hn2016_18","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_124.png\"></div>","parts":[{"question":"(1) X的成分为______","answer":["Zn、Cu"],"acceptable":["锌和铜"]},{"question":"(1续) 操作Ⅰ需用的玻璃仪器有烧杯、玻璃棒和______","answer":["漏斗"],"acceptable":["普通漏斗","玻璃漏斗"]},{"question":"(2) 加入B时反应的化学方程式为______","answer":["Zn+H₂SO₄=ZnSO₄+H₂↑"],"acceptable":["Zn+H2SO4=ZnSO4+H2↑"]},{"question":"(3) 操作Ⅱ中玻璃棒的作用是______","answer":["搅拌，防止局部过热液体飞溅"],"acceptable":["搅拌防飞溅","搅拌使受热均匀"]}],"explanation":"固体含Zn和Cu，Zn与H₂SO₄反应，Cu不反应。过滤后蒸发ZnSO₄溶液得硫酸锌晶体，玻璃棒搅拌防飞溅。"},{"id":"hn2016_19","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_125.png\"></div>","parts":[{"question":"盐酸除铁锈（Fe₂O₃）的化学方程式为______","answer":["Fe₂O₃+6HCl=2FeCl₃+3H₂O"],"acceptable":["Fe2O3+6HCl=2FeCl3+3H2O"]},{"question":"金属铝较活泼，为什么通常铝制品却很耐腐蚀？","answer":["铝在常温下与空气中的氧气反应，表面生成一层致密的氧化铝薄膜，阻止了内部的铝进一步氧化。"],"acceptable":["表面有致密Al₂O₃保护膜"]}],"explanation":"Fe₂O₃+6HCl=2FeCl₃+3H₂O。铝表面形成致密Al₂O₃膜，阻止继续氧化。"},{"id":"hn2016_20","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_126.png\"></div>","parts":[{"question":"(1) 推测氨气具有哪些性质？","answer":["氨气极易溶于水，水溶液显碱性。"],"acceptable":["易溶于水，溶液显碱性"]},{"question":"(2) 请解释白烟产生的原因。","answer":["浓盐酸挥发出的HCl气体与浓氨水挥发出的NH₃反应生成NH₄Cl白色固体小颗粒，形成白烟。"],"acceptable":["NH₃+HCl=NH₄Cl白色固体"]}],"explanation":"NH₃易溶于水使瓶内压强减小形成喷泉；NH₃水溶液显碱性使酚酞变红。NH₃+HCl=NH₄Cl。"},{"id":"hn2016_21","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_127.png\"></div>","parts":[{"question":"(1) 实验室用KMnO₄制取O₂应选用的一套实验装置为______（填字母代号）","answer":["AD（或AE）"],"acceptable":["AD","AE"]},{"question":"(1续) 该反应的化学方程式为______","answer":["2KMnO₄=K₂MnO₄+MnO₂+O₂↑"],"acceptable":["2KMnO₄=△=K₂MnO₄+MnO₂+O₂↑","2KMnO4=K2MnO4+MnO2+O2↑"]},{"question":"(2) 请简述使B装置中反应停止的原理。","answer":["关闭弹簧夹，产生的气体把酸液压回到长颈漏斗中，石灰石（或大理石）与盐酸脱离接触，反应停止。"],"acceptable":["关闭弹簧夹，气体压回酸液，固液分离反应停止"]},{"question":"(3) 若用右图装置采用排水法收集H₂，请简述操作步骤。","answer":["集气瓶中注满水，插入带导管的橡皮塞，向导管a通入H₂，直至排净集气瓶中的水。"],"acceptable":["集气瓶装满水，从a管通入H₂排水"]}],"explanation":"KMnO₄加热制O₂选固体加热+排水/向上排空气法。B装置利用弹簧夹控制固液接触与分离。排水法氢气短进长出。"},{"id":"hn2016_22","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_128.png\"></div>","parts":[{"question":"(1) 以上操作合理的先后顺序为______（数字序号不能重复使用）","answer":["②①⑤③④（或①②⑤③④）"],"acceptable":["②①⑤③④","①②⑤③④"]},{"question":"(2) BaCl₂溶液与Na₂SO₄溶液反应的化学方程式为______","answer":["BaCl₂+Na₂SO₄=BaSO₄↓+2NaCl"],"acceptable":["BaCl2+Na2SO4=BaSO4↓+2NaCl"]},{"question":"(3) Na₂CO₃不能用K₂CO₃代替，请说明原因。","answer":["若用K₂CO₃，会引入新杂质KCl（或K⁺），无法通过后续操作除去。"],"acceptable":["引入新杂质K⁺","生成KCl杂质无法除去"]}],"explanation":"先除SO₄²⁻(BaCl₂)、Mg²⁺(NaOH)，再除Ca²⁺和过量Ba²⁺(Na₂CO₃)，过滤后加盐酸。用K₂CO₃会引入K⁺。"},{"id":"hn2016_23","type":"fill","year":"2016","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_129.png\"></div>","parts":[{"question":"(1) 复分解反应发生后，生成物肯定不会是______（填\"单质\"或\"化合物\"）","answer":["单质"],"acceptable":["单质"]},{"question":"(2) 下列说法正确的是______（填字母）","answer":["c"],"acceptable":["C"]},{"question":"(3) 浓硫酸和浓盐酸敞口放置均会变稀，这是为什么？","answer":["浓硫酸有吸水性，吸收空气中的水分，溶剂增加，溶液变稀；浓盐酸有挥发性，HCl气体挥发，溶质减少，溶液变稀。"],"acceptable":["浓硫酸吸水溶剂增加，浓盐酸挥发溶质减少"]},{"question":"(4)① B装置玻璃管里可观察到的现象是______","answer":["红色固体变黑色"],"acceptable":["红棕色变黑"]},{"question":"(4)② C装置中反应的化学方程式为______","answer":["Ca(OH)₂+CO₂=CaCO₃↓+H₂O"],"acceptable":["Ca(OH)2+CO2=CaCO3↓+H2O"]},{"question":"(4)③ 确定A装置溶液中溶质的成分。","answer":["取少量A中溶液，加入足量BaCl₂溶液，若有白色沉淀生成则含Na₂CO₃；静置，向上层清液中滴加无色酚酞溶液，若变红则含NaOH。"],"acceptable":["先加过量BaCl₂除Na₂CO₃，再用酚酞检验NaOH"]},{"question":"(5) 理论上需要消耗铝的质量是多少？","answer":["10.8kg"],"acceptable":["10.8千克","10.8"]}],"explanation":"复分解反应生成物不会有单质。p点pH>7，溶质为NaCl和NaOH。CO还原Fe₂O₃生成Fe和CO₂。先除CO₃²⁻再检OH⁻。"},{"id":"hn2017_01","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列制作过程中的变化属于化学变化的是（　　）","options":["A. 粮食酿酒","B. 石油分馏","C. 铁水铸锅","D. 麦磨成面"],"answer":0,"explanation":"粮食酿酒过程中有新物质酒精生成，属于化学变化；石油分馏、铁水铸锅、麦磨成面均没有新物质生成，属于物理变化。","year":"2017"},{"id":"hn2017_02","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列科学家中，发现了元素周期律并编制了元素周期表的是（　　）","options":["A. 拉瓦锡","B. 门捷列夫","C. 道尔顿","D. 阿伏伽德罗"],"answer":1,"explanation":"门捷列夫在化学上的主要贡献是发现了元素周期律并编制出元素周期表。拉瓦锡得出空气由氮气和氧气组成，道尔顿提出原子学说，阿伏伽德罗创立分子学说。","year":"2017"},{"id":"hn2017_03","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"\"河南味道\"名声远播．下列食品或食材中富含维生素的是（　　）","options":["A. 原阳大米","B. 叶县岩盐","C. 西峡猕猴桃","D. 道口烧鸡"],"answer":2,"explanation":"西峡猕猴桃中富含维生素；原阳大米富含糖类，叶县岩盐富含无机盐，道口烧鸡富含蛋白质。","year":"2017"},{"id":"hn2017_04","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列各组物质，按混合物、单质顺序排列的是（　　）","options":["A. 海水、干冰","B. 冰水、水银","C. 食醋、黄铜","D. 煤、金刚石"],"answer":3,"explanation":"煤属于混合物，金刚石属于单质。海水是混合物但干冰是氧化物（化合物），冰水是氧化物，水银是单质，食醋和黄铜都是混合物。","year":"2017"},{"id":"hn2017_05","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"能用于区分硬水和软水的方法是（　　）","options":["A. 闻气味","B. 观察颜色","C. 加肥皂水","D. 加食盐水"],"answer":2,"explanation":"硬水与肥皂水混合产生浮渣，软水与肥皂水混合产生泡沫。硬水和软水均无色无味，加食盐水无区别。","year":"2017"},{"id":"hn2017_06","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列化肥分别与熟石灰混合研磨后．能闻到刺激性气味的是（　　）","options":["A. NH₄Cl","B. KNO₃","C. NaNO₃","D. Ca₃(PO₄)₂"],"answer":0,"explanation":"NH₄Cl属于铵态氮肥，与熟石灰混合研磨后产生有刺激性气味的氨气。其他化肥不属于铵态氮肥，无明显变化。","year":"2017"},{"id":"hn2017_07","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列图示的实验操作中正确的是（　　）<br><div class=\"q-img\"><img src=\"images/q/img_130.png\"></div>","options":["A. 收集氢气","B. 稀释浓硫酸","C. 检查气密性","D. 验证质量守恒定律"],"answer":2,"explanation":"检查装置气密性时，将导管一端浸入水中，双手紧握容器外壁，导管口有气泡冒出则气密性好。A中氢气密度小于空气应用向下排空气法；B中稀释浓硫酸应将浓硫酸沿器壁注入水中；D中碳酸钠与盐酸反应生成气体逸出，且砝码与药品放反。","year":"2017"},{"id":"hn2017_08","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"图为钠的原子结构示意图．下列说法不正确的是（　　）<br><div class=\"q-img\"><img src=\"images/q/img_131.png\"></div>","options":["A. 钠原子的质子数为11","B. 图中 n的值为10","C. 钠在反应中易失去电子","D. 钠元素位于第三周期"],"answer":1,"explanation":"在原子中，质子数=核外电子数，n=11-2-1=8，不是10。钠原子最外层电子数为1，易失去电子；原子核外有3个电子层，位于第三周期。","year":"2017"},{"id":"hn2017_09","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列溶液在空气中敞口放置后，溶液质量因发生化学反应而减小的是（　　）","options":["A. 石灰水","B. 浓硫酸","C. 浓盐酸","D. 烧碱溶液"],"answer":0,"explanation":"石灰水与空气中CO₂反应生成CaCO₃沉淀，每44份CO₂生成100份CaCO₃，从溶液中析出的沉淀质量大于进入溶液的气体质量，溶液质量减小。浓硫酸吸水质量增加（物理变化），浓盐酸挥发质量减小（物理变化），烧碱溶液吸收CO₂质量增加。","year":"2017"},{"id":"hn2017_10","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"表示向一定量CaCl₂和盐酸的混合溶液中滴加Na₂CO₃溶液的变化过程，x表示Na₂CO₃溶液的质量，则y可能表示（　　）<br><div class=\"q-img\"><img src=\"images/q/img_132.png\"></div>","options":["A. 气体的体积","B. 沉淀的质量","C. NaCl的质量","D. 混合溶液的pH"],"answer":3,"explanation":"碳酸钠先与盐酸反应，溶液pH从小于7逐渐升高至7；再与CaCl₂反应生成沉淀，此时pH保持7不变；当CaCl₂反应完后继续加碳酸钠，溶液呈碱性，pH大于7。","year":"2017"},{"id":"hn2017_11","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"硝酸铜受热分解会产生一种污染空气的有毒气体，该气体可能是（　　）","options":["A. N₂","B. NO₂","C. NH₃","D. SO₂"],"answer":1,"explanation":"根据质量守恒定律，反应前后元素种类不变。硝酸铜中含Cu、N、O元素，不含S和C元素，故不可能生成SO₂或CO。N₂无毒，NO₂为污染空气的有毒气体。","year":"2017"},{"id":"hn2017_12","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"是某反应的微观示意图，下列有关该反应的说法不正确的是（　　）<br><div class=\"q-img\"><img src=\"images/q/img_133.png\"></div>","options":["A. 属于置换反应","B. 相对分子质量最小的是NH₃","C. 生成丙和丁的质量比为1：3","D. 氢元素的化合价在反应前后没有变化"],"answer":2,"explanation":"该反应为4NH₃+3O₂→6H₂O+2N₂。生成丙(N₂)和丁(H₂O)的质量比为(28×2):(18×6)=56:108=14:27，不是1:3。该反应为置换反应，NH₃相对分子质量最小，氢元素反应前后均为+1价。","year":"2017"},{"id":"hn2017_13","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"甲乙丙有如图所示的转化关系（\"→\"表示反应一步实现，部分反应物和反应条件略去），下列各组物质按照甲乙丙的顺序不符合要求的是（　　）<br><div class=\"q-img\"><img src=\"images/q/img_134.png\"></div>","options":["A. C、CO₂、CO","B. H₂O₂、O₂、H₂O","C. CuO、Cu、Cu(NO₃)₂","D. NaOH、NaCl、NaNO₃"],"answer":3,"explanation":"D选项NaNO₃→NaOH无法一步实现（硝酸盐和钠盐均是可溶性盐，不符合复分解反应条件）。A、B、C选项均可一步转化。","year":"2017"},{"id":"hn2017_14","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_135.png\"></div>","parts":[{"answer":["氧气"],"acceptable":["O₂"]},{"answer":["Al₂O₃"],"acceptable":["Al2O3"]}],"year":"2017"},{"id":"hn2017_15","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_136.png\"></div>","parts":[{"answer":["SO₄²⁻"],"acceptable":["SO42-","硫酸根离子"]},{"answer":["NaHCO₃+HCl=NaCl+H₂O+CO₂↑"],"acceptable":["NaHCO3+HCl=NaCl+H2O+CO2↑"]}],"year":"2017"},{"id":"hn2017_16","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_137.png\"></div>","parts":[{"answer":["塑料"],"acceptable":[]},{"answer":["隔绝O₂和H₂O"],"acceptable":["隔绝氧气和水","隔绝O2和H2O","隔绝空气和水"]},{"answer":["Fe₂O₃+3H₂SO₄=Fe₂(SO₄)₃+3H₂O"],"acceptable":["Fe2O3+3H2SO4=Fe2(SO4)3+3H2O"]}],"year":"2017"},{"id":"hn2017_17","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_138.png\"></div>","parts":[{"answer":["Y"],"acceptable":[]},{"answer":["t₂℃"],"acceptable":["t2℃","t₂°C","t2°C"]},{"answer":["70"],"acceptable":[]}],"year":"2017"},{"id":"hn2017_18","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_139.png\"></div>","parts":[{"answer":["建筑材料"],"acceptable":["作建筑材料","作补钙剂"]},{"answer":["CaCl₂"],"acceptable":["CaCl2","氯化钙"]},{"answer":["CaO+H₂O=Ca(OH)₂"],"acceptable":["CaO+H2O=Ca(OH)2"]}],"year":"2017"},{"id":"hn2017_19","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_140.png\"></div>","parts":[{"answer":["2NaCl+2H₂O=2NaOH+H₂↑+Cl₂↑"],"acceptable":["2NaCl+2H2O=2NaOH+H2↑+Cl2↑"]},{"answer":["大于"],"acceptable":[]},{"answer":["0.69"],"acceptable":[]}],"year":"2017"},{"id":"hn2017_20","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_141.png\"></div>","parts":[{"answer":["HCl+NaOH=NaCl+H₂O"],"acceptable":["HCl+NaOH=NaCl+H2O","HCl+NaOH═NaCl+H₂O"],"question":"（1）请写出有关反应的化学方程式．"},{"answer":["紫色石蕊溶液"],"acceptable":["紫色石蕊试液","Zn","锌粒","Na₂CO₃","碳酸钠","CuO","氧化铜"],"question":"（2）烧杯中无色溶液的溶质可能只有NaCl，也可能还有HCl．要确定该溶质的成分，请写出一种可选用的试剂．"}],"year":"2017"},{"id":"hn2017_21","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_142.png\"></div>","parts":[{"answer":["CH₄+2O₂=CO₂+2H₂O"],"acceptable":["CH4+2O2=CO2+2H2O"],"question":"（1）请写出甲烷完全燃烧的化学方程式．"},{"answer":["试管口略向下倾斜"],"acceptable":["试管口略低于试管底，铁架台固定"],"question":"（2）实验室里加热醋酸钠和碱石灰的固体混合物可制取甲烷，请将如图方框中气体的发生装置补画完整．"}],"year":"2017"},{"id":"hn2017_22","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_143.png\"></div>","parts":[{"answer":["Zn+2AgNO₃=Zn(NO₃)₂+2Ag"],"acceptable":["Zn+2AgNO3=Zn(NO3)2+2Ag","Zn+Cu(NO₃)₂=Zn(NO₃)₂+Cu","Zn+Cu(NO3)2=Zn(NO3)2+Cu"],"question":"（1）请写出一个有关反应的化学方程式．"},{"answer":["有气泡产生"],"acceptable":["产生气泡","有气泡生成"],"question":"（2）向所得固体上滴加盐酸，能观察到什么现象．"},{"answer":["锌与硝酸银反应使溶液质量减少，与硝酸铜反应时使溶液质量增加，所以溶液质量可能不变"],"question":"（3）反应后所得溶液的质量与反应前溶液的质量相比，可能保持不变，为什么？","acceptable":[]}],"year":"2017"},{"id":"hn2017_23","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_144.png\"></div>","parts":[{"answer":["6"],"acceptable":["六个"],"question":"（1）以上操作中所发生的复分解反应共有　   　个．"},{"answer":["搅拌，使液体受热均匀，防止液滴飞溅"],"acceptable":["搅拌防止局部过热造成液滴飞溅","玻璃棒搅拌使受热均匀"],"question":"（2）操作①、③、⑤要用到同一种玻璃仪器，该仪器在操作⑤中的作用是什么？"},{"answer":["取③所得溶液，加入足量的BaCl₂溶液，静置，向上层清液中滴加无色酚酞溶液，溶液变红色，说明溶液中含有氢氧化钠"],"acceptable":["加入足量BaCl2溶液除去碳酸钠，再滴加酚酞变红"],"question":"（3）请设计实验方案证明操作③所得溶液中含有NaOH．（写出实验步骤和现象）"}],"year":"2017"},{"id":"hn2017_24","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_145.png\"></div>","parts":[{"answer":["2HCl+CaCO₃=CaCl₂+H₂O+CO₂↑"],"acceptable":["2HCl+CaCO3=CaCl2+H2O+CO2↑","2H₂O₂=2H₂O+O₂↑","2H2O2=2H2O+O2↑"],"question":"（1）①写出一个双球管中可能反应的化学方程式．"},{"answer":["温度达到可燃物着火点，可燃物与氧气接触"],"acceptable":["温度达到可燃物着火点","温度达到着火点"],"question":"（1）②挤压右滴管并微热燃烧管，白磷燃烧而红磷不燃烧，由此可说明燃烧需要什么条件？"},{"answer":["磷"],"acceptable":["磷（P）"],"question":"（1）③相同质量的磷、铁、镁分别在氧气中完全燃烧，消耗氧气最多的是　   　．"},{"answer":["Ca(OH)₂溶液变浑浊"],"acceptable":["澄清石灰水变浑浊"],"question":"（2）①A装置中能观察到什么现象？"},{"answer":["Fe₂O₃+3CO=2Fe+3CO₂"],"acceptable":["3CO+Fe₂O₃=2Fe+3CO₂","Fe2O3+3CO=2Fe+3CO2"],"question":"（2）②写出B装置中反应的化学方程式．"},{"answer":["h、g接e、f接c、d接b"],"acceptable":["h g e f c d b","h,g,e,f,c,d,b","h、g接e、f接d、c接b"],"question":"（2）③要达到实验目的，装置中导管接口从左到右的连接顺序为：一氧化碳发生装置接　   　、　   　接　   　、　   　接　   　、　   　接　   　．"},{"answer":["在A装置后增加一个尾气处理装置（合理即可）"],"acceptable":["在装置C的短导管处放一盏点燃的酒精灯","加装尾气处理装置","将尾气点燃"],"question":"（2）④从环保角度考虑，还需对以上装置进行改进，请简述改进措施．"},{"answer":["24.5g"],"acceptable":["24.5","24.5克"],"question":"（3）将30.9g 氯酸钾（KClO₃）和二氧化锰的固体混合物装入试管中，加热制取氧气，同时生成氯化钾．待反应完全后，将试管冷却，称量，可以得到21.3g 固体物质．请计算原固体混合物中氯酸钾的质量．"}],"year":"2017"},{"id":"hn2018_01","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"生活中的下列变化，属于物理变化的是（　　）","options":["A. 蜡熔化","B. 铁生锈","C. 米酿酒","D. 纸燃烧"],"answer":0,"explanation":"蜡熔化是由固态变为液态，只是状态变化，属于物理变化。铁生锈、米酿酒、纸燃烧均有新物质生成，属于化学变化。","year":"2018"},{"id":"hn2018_02","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"开封小笼包是地方特色美食，其主要食材瘦肉中富含的营养素为（　　）","options":["A. 糖类","B. 油脂","C. 维生素","D. 蛋白质"],"answer":3,"explanation":"瘦肉中富含的营养素是蛋白质。","year":"2018"},{"id":"hn2018_03","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"\"建设美丽中国\"是新时代的目标。下列说法不利于减少环境污染的是（　　）","options":["A. 回收各种废弃塑料","B. 开发和利用新能源","C. 工业废水任意排放","D. 积极植树、造林、种草"],"answer":2,"explanation":"工业废水任意排放会造成水体污染，不利于减少环境污染。其他选项均有利于环境保护。","year":"2018"},{"id":"hn2018_04","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列物质在氧气里燃烧，生成物为白色固体的是（　　）","options":["A. 硫","B. 镁条","C. 铁丝","D. 木炭"],"answer":1,"explanation":"镁条在氧气中燃烧发出耀眼的白光，生成白色固体氧化镁。硫燃烧生成有刺激性气味的气体，铁丝燃烧生成黑色固体，木炭燃烧生成无色气体。","year":"2018"},{"id":"hn2018_05","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列各组元素中，元素符号的第一个字母不相同的一组是（　　）","options":["A. 锰、钛","B. 氩、金","C. 铅、铂","D. 氦、汞"],"answer":0,"explanation":"锰(Mn)和钛(Ti)的第一个字母不同（M和T）。氩(Ar)和金(Au)均为A，铅(Pb)和铂(Pt)均为P，氦(He)和汞(Hg)均为H。","year":"2018"},{"id":"hn2018_06","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列有关水的说法正确的是（　　）","options":["A. 冰水共存物属于混合物","B. 水是由氢元素和氧元素组成的化合物","C. 将硬水过滤可得到软水","D. 凡是有水生成的反应一定是中和反应"],"answer":1,"explanation":"冰水共存物中只有水分子，属于纯净物；过滤不能除去可溶性杂质，不能将硬水软化；有水生成的反应不一定是中和反应（如金属氧化物与酸反应也生成水）。","year":"2018"},{"id":"hn2018_07","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列实验设计不能达到其对应实验目的的是（　　）<br><div class=\"q-img\"><img src=\"images/q/img_146.png\"></div>","options":["A. 测定空气里氧气的含量","B. 检查装置的气密性","C. 验证质量守恒定律","D. 验证CO₂密度比空气的大"],"answer":2,"explanation":"碳酸钠与盐酸反应生成二氧化碳气体，在敞口容器中进行时气体逸散，无法验证质量守恒定律。A中红磷燃烧消耗氧气可测定含量，B中加热法可检查气密性，D中蜡烛自下而上熄灭可验证CO₂密度比空气大。","year":"2018"},{"id":"hn2018_08","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"硅是信息技术的关键材料。右图为硅的原子结构示意图，下列说法正确的是（　　）<br><div class=\"q-img\"><img src=\"images/q/img_147.png\"></div>","options":["A. 硅属于稀有气体元素","B. 图中n的值为8","C. 硅的相对原子质量为14","D. 硅元素位于第三周期"],"answer":3,"explanation":"硅原子核外有3个电子层，位于第三周期。硅不属于稀有气体；n=14-2-8=4；相对原子质量为28（14为原子序数）。","year":"2018"},{"id":"hn2018_09","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"室温时将少量干冰放入塑料袋中并密封，塑料袋会快速鼓起，其原因是（　　）","options":["A. 分子的体积变大","B. 分子分解变成了原子","C. 分子的间隔变大","D. 分子由静止变为运动"],"answer":2,"explanation":"干冰升华由固态变为气态，分子间间隔变大导致塑料袋鼓起。分子体积不变，分子种类不变，分子在常温下始终运动。","year":"2018"},{"id":"hn2018_10","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列区分物质的方法或试剂不正确的是（　　）","options":["A. 用带火星的木条区分氧气和氮气","B. 用熟石灰区分氯化铵和氯化钾","C. 灼烧后闻气味区分羊毛线和腈纶线","D. 用酚酞溶液区分硫酸和硫酸钠溶液"],"answer":3,"explanation":"硫酸显酸性、硫酸钠显中性，二者均不能使酚酞溶液变色，无法区分。其他方法均能区分：氧气使带火星木条复燃；氯化铵与熟石灰研磨产生氨气；羊毛灼烧有烧焦羽毛气味。","year":"2018"},{"id":"hn2018_11","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"实验室配制一定溶质质量分数的氯化钠溶液时，下列操作会导致结果偏小的是（　　）\n①称量的氯化钠固体中含有不溶性杂质；\n②用量筒量取水时仰视读数；\n③往烧杯加水时有水洒出；\n④将配制好的溶液装入试剂瓶中有少量溅出。","options":["A. ①②","B. ①③","C. ②④","D. ③④"],"answer":0,"explanation":"①杂质使溶质偏小，质量分数偏小；②仰视读数使量取水偏多，质量分数偏小；③水洒出使溶剂偏少，质量分数偏大；④溶液有均一性，少量溅出不影响质量分数。","year":"2018"},{"id":"hn2018_12","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"过氧化钠（Na₂O₂）可做呼吸面具中氧气的来源，它与二氧化碳反应后的生成物为（　　）","options":["A. Na₂CO₃和H₂","B. Na₂O和O₂","C. NaOH和O₂","D. Na₂CO₃和O₂"],"answer":3,"explanation":"过氧化钠与二氧化碳反应生成碳酸钠和氧气，化学方程式为2Na₂O₂+2CO₂=2Na₂CO₃+O₂。","year":"2018"},{"id":"hn2018_13","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"甲、乙、丙有如右图所示的转化关系（\"→\"表示反应一步实现，部分物质和反应条件已略去），下列各组物质按照甲、乙、丙的顺序不符合要求的是（　　）<br><div class=\"q-img\"><img src=\"images/q/img_148.png\"></div>","options":["A. C、CO、CO₂","B. H₂O₂、H₂O、O₂","C. KOH、K₂CO₃、KNO₃","D. Fe₂O₃、FeCl₃、Fe(OH)₃"],"answer":2,"explanation":"C选项KNO₃→K₂CO₃无法一步实现（硝酸盐和碳酸盐均是可溶性盐，不符合复分解反应条件）。其他选项均可一步转化。","year":"2018"},{"id":"hn2018_14","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"有Mg、Al、Zn的混合物共7.2g，与足量盐酸反应，生成H₂的质量可能是（　　）","options":["A. 0.2g","B. 0.6g","C. 0.8g","D. 0.9g"],"answer":1,"explanation":"使用极值法计算：7.2g纯Mg生成H₂约0.6g，纯Al生成H₂约0.8g，纯Zn生成H₂约0.22g。混合物生成的H₂质量介于最小和最大值之间，0.6g在此范围内。","year":"2018"},{"id":"hn2018_15","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_149.png\"></div>","parts":[{"answer":["钙"],"acceptable":["Ca","钙元素"]},{"answer":["磷酸二氢铵"],"acceptable":["NH₄H₂PO₄","磷酸二氢铵（NH₄H₂PO₄）"]}],"year":"2018"},{"id":"hn2018_16","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_150.png\"></div>","parts":[{"answer":["C₂H₅OH+3O₂=2CO₂+3H₂O"],"acceptable":["C2H5OH+3O2=2CO2+3H2O"]},{"answer":["降低可燃物的温度至着火点以下"],"acceptable":["降低温度至着火点以下","降温至着火点以下"]},{"answer":["生成物是水，不污染环境"],"acceptable":["热值高","来源广泛","无污染","生成物不污染环境"]}],"year":"2018"},{"id":"hn2018_17","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_151.png\"></div>","parts":[{"answer":["导电"],"acceptable":["导电性"]},{"answer":["Fe₂(SO₄)₃"],"acceptable":["硫酸铁","Fe2(SO4)3"]},{"answer":["4Al+3O₂=2A ":"下列过程属于物理变化的是（  ）","options":["A．粮食酿酒","B．陶瓷烧制","C．石油分馏","D．煤的干馏"],"answer":2,"explanation":"石油分馏是根据沸点不同分离混合物，没有新物质生成，属于物理变化。粮食酿酒、陶瓷烧制、煤的干馏均有新物质生成，属于化学变化。","year":"2019"},{"id":"hn2019_02","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"河南地处中原，物产丰富。下列食材或食品中富含蛋白质的是（  ）","options":["A．黄河鲤鱼","B．新郑大枣","C．叶县岩盐","D．原阳大米"],"answer":0,"explanation":"黄河鲤鱼富含动物蛋白；新郑大枣富含维生素；叶县岩盐富含无机盐；原阳大米富含糖类（淀粉）。","year":"2019"},{"id":"hn2019_03","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"空气中含量最多且化学性质不活泼的气体是（  ）","options":["A．O₂","B．CO₂","C．N₂","D．Ne"],"answer":2,"explanation":"空气中氮气约占78%，含量最多，且氮气化学性质不活泼，常用作保护气。","year":"2019"},{"id":"hn2019_04","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"2019年北京世园会主题为\"绿色生活，美丽家园\"。下列做法值得提倡的是（  ）","options":["A．排放未达标的工业废水","B．露天焚烧树叶、秸秆","C．选用一次性筷子、塑料袋","D．将垃圾分类并回收利用"],"answer":3,"explanation":"垃圾分类回收利用既能节约资源，又能防止环境污染，符合绿色生活理念。","year":"2019"},{"id":"hn2019_05","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列各组物质中，都由分子构成的一组是（  ）","options":["A．铁、汞","B．氨、干冰","C．水、金刚石","D．硫酸铜、氯化钠"],"answer":1,"explanation":"氨由氨分子构成，干冰（固态CO₂）由二氧化碳分子构成。铁、汞由原子构成；金刚石由碳原子构成；硫酸铜和氯化钠由离子构成。","year":"2019"},{"id":"hn2019_06","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"稀土元素镝（Dy）常用于制造硬盘驱动器。下列有关说法中不正确的是（  ）<br><div class=\"q-img\"><img src=\"images/q/img_160.png\"></div>","options":["A．镝属于非金属元素","B．镝原子的质子数为66","C．镝的相对原子质量为162.5","D．稀士资源需合理利用和保护"],"answer":0,"explanation":"镝名称带\"钅\"字旁，属于金属元素，故A不正确。质子数=原子序数=66；相对原子质量可从元素周期表读出。","year":"2019"},{"id":"hn2019_07","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"分类、归纳等是化学学习的常用方法。下列分类、归纳中正确的是（  ）","options":["A．氧化物：SO₂、C₆H₁₂O₆","B．复合肥料：KNO₃、CO(NH₂)₂","C．人体必需微量元素：Ca、Se","D．有机物：C₂H₅OH、CH₃COOH"],"answer":3,"explanation":"C₂H₅OH和CH₃COOH都是含碳化合物（除CO、CO₂、碳酸盐外），属于有机物。C₆H₁₂O₆含三种元素，不是氧化物；CO(NH₂)₂只含氮元素，是氮肥；Ca是常量元素。","year":"2019"},{"id":"hn2019_08","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列图示的实验操作中正确的是（  ）<br><div class=\"q-img\"><img src=\"images/q/img_161.png\"></div>","options":["A．点燃酒精灯","B．稀释浓硫酸","C．测溶液的pH","D．制取氧气"],"answer":1,"explanation":"稀释浓硫酸应将浓硫酸缓缓倒入水中并不断搅拌。A中禁止用酒精灯引燃另一酒精灯；C中pH试纸不能浸入待测液；D中试管口应略向下倾斜。","year":"2019"},{"id":"hn2019_09","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"钠着火不能用二氧化碳灭火。钠在二氧化碳中燃烧生成炭黑和一种白色固体，它可能是（  ）","options":["A．碳酸钠","B．硫酸钠","C．碳酸氢钠","D．氢氧化钠"],"answer":0,"explanation":"反应物为Na和CO₂，只含Na、C、O元素，不含S、H元素，故不可能是硫酸钠、碳酸氢钠或氢氧化钠，根据质量守恒，只能为碳酸钠。","year":"2019"},{"id":"hn2019_10","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"实验室用氯化钠配制50g质量分数为6%的氯化钠溶液。下列说法中不正确的是（  ）","options":["A．所需氯化钠的质量为3g","B．氯化钠放在托盘天平的左盘称量","C．俯视量筒读数会使所配溶液偏稀","D．所需玻璃仪器有烧杯、玻璃棒、量筒等"],"answer":2,"explanation":"俯视量筒读数时读数偏大，实际取水偏少，导致溶质质量分数偏大（偏浓），而不是偏稀。","year":"2019"},{"id":"hn2019_11","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列说法中正确的是（  ）<br><div class=\"q-img\"><img src=\"images/q/img_162.png\"></div>","options":["A．开始时应先预热玻璃管，后通入一氧化碳","B．实验中玻璃管里粉末由黑色逐渐变成红粽色","C．参加反应的氧化铁和一氧化碳质量比为40：7","D．将尾气点燃或收集，可防止一氧化碳污染空气"],"answer":3,"explanation":"CO有毒，需进行尾气点燃或收集处理。A应先通CO排空气再加热防爆炸；B中Fe₂O₃红棕色粉末变为黑色Fe；C中Fe₂O₃与CO质量比为160:84=40:21。","year":"2019"},{"id":"hn2019_12","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列区分物质的方法或试剂不正确的是（  ）","options":["A．用灼烧法区分腈纶线、羊毛线","B．用肥皂水区分硬水、软水","C．用熟石灰区分氯化铵、硫酸铵","D．用水区分硝酸铵、氢氧化钠"],"answer":2,"explanation":"氯化铵和硫酸铵都是铵态氮肥，与熟石灰混合均产生有刺激性气味的氨气，无法区分。其他三项方法均正确。","year":"2019"},{"id":"hn2019_13","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列图象分别与选项中的操作相对应，其中合理的是（  ）<br><div class=\"q-img\"><img src=\"images/q/img_163.png\"></div><div class=\"q-img\"><img src=\"images/q/img_164.png\"></div><div class=\"q-img\"><img src=\"images/q/img_165.png\"></div><div class=\"q-img\"><img src=\"images/q/img_166.png\"></div>","options":["A．向pH为13的氢氧化钠溶液中加水","B．向一定质量二氧化锰固体中加一定质量过氧化氢溶液","C．温度不变，向一定质量饱和氢氧化钙溶液中加入氧化钙","D．向一定质量硫酸和硫酸铜的混合溶液中加入氢氧化钠溶液"],"answer":3,"explanation":"NaOH先与H₂SO₄反应无沉淀，后与CuSO₄反应生成Cu(OH)₂沉淀，图象正确。A中pH不会降到7以下；B中MnO₂质量不变；C中CaO与水反应消耗水，溶液质量减小。","year":"2019"},{"id":"hn2019_14","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"向某氯化钡溶液中加入一定质量的硫酸溶液，二者恰好完全反应，过滤，所得溶液的质量与原氯化钡溶液的质量相等。则所加硫酸溶液中溶质质量分数的计算式为（  ）<br><div class=\"q-img\"><img src=\"images/q/img_167.png\"></div>","options":["A．(49/233)×100%","B．(98/233)×100%","C．(233/98)×100%","D．(49/116.5)×100%"],"answer":1,"explanation":"生成BaSO₄沉淀的质量等于所加H₂SO₄溶液的质量。根据BaCl₂+H₂SO₄=BaSO₄↓+2HCl，设生成BaSO₄质量为233份，则加入H₂SO₄溶液质量为233，其中纯H₂SO₄质量为98份，质量分数为98/233×100%。","year":"2019"},{"id":"hn2019_15","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_168.png\"></div>","parts":[{"answer":["门捷列夫"],"acceptable":[["门捷列夫"]],"question":"发现了元素周期律并编制出元素周期表的化学家是______，"},{"answer":["C"],"acceptable":[["C"],["碳"],["碳元素"]],"question":"形成化合物种类最多的元素是______；"},{"answer":["SiO₂"],"acceptable":[["SiO₂"],["SiO2"],["二氧化硅"]],"question":"地壳中含量居前两位的元素所形成化合物的化学式为______。"}],"year":"2019"},{"id":"hn2019_16","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_169.png\"></div>","parts":[{"answer":["a₁"],"acceptable":[["a₁"],["a1"]],"question":"甲、乙溶解度相等时的温度为______℃；"},{"answer":["等于"],"acceptable":[["等于"]],"question":"将a₁℃时等质量甲、乙饱和溶液升温到a₂℃，溶质的质量为甲______乙（填\"大于\"\"小于\"或\"等于\"）；"},{"answer":["10"],"acceptable":[["10"],["10g"]],"question":"a₂℃时，65g甲饱和溶液稀释到20%，需加水______g。"}],"year":"2019"},{"id":"hn2019_17","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_170.png\"></div>","parts":[{"answer":["CH₄+2O₂=CO₂+2H₂O"],"acceptable":[["CH₄+2O₂=CO₂+2H₂O"],["CH4+2O2=CO2+2H2O"]],"question":"天然气（主要成分为CH₄）完全燃烧的化学方程式为______；"},{"answer":["改大"],"acceptable":[["改大"]],"question":"灶具的进风口应______（填\"改大\"\"改小\"或\"不变\"）；"},{"answer":["来源广"],"acceptable":[["来源广"],["热值高"],["无污染"],["来源广（或热值高、无污染等）"]],"question":"氢气作为新能源的优点是______（答出一条即可）。"}],"year":"2019"},{"id":"hn2019_18","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img sr le":[["e"],["f"],["c"],["d"],["h"],["g"]],"question":"（4）为了达到实验的目的，以上装置导管接口正确的连接顺序为a接______、______接______、______接______、______接b。"},{"answer":["不易溶解于水且支持燃烧"],"acceptable":[["不易溶解于水且支持燃烧"],["不易溶于水，支持燃烧"]],"question":"（5）氧气可采用B装置收集并用带火星的木条检验，这是利用了氧气的哪些性质？"},{"answer":["取所得溶液，加入足量CaCl₂溶液，有白色沉淀生成，取上层清液滴入酚酞试液，酚酞变红，说明固体为Na₂CO₃和NaOH"],"acceptable":[["加入足量CaCl₂溶液有沉淀，取上层清液滴酚酞变红，证明含Na₂CO₃和NaOH"]],"question":"（6）实验结束后，取C装置中固体溶于水，无气泡产生。请设计实验，检验C装置中固体的成分。（简要写出实验步骤、现象和结论）"},{"answer":["702kg"],"acceptable":[["702kg"],["702千克"],["702 kg"]],"question":"（7）某潜水艇上有100人，如果每人每分钟消耗氧气为0.001kg，假如所需要的氧气全部由Na₂O₂与CO₂反应来提供，则该潜水艇一天所需要Na₂O₂的质量是多少？"}],"year":"2019"},{"id":"hn2020_01","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"河南小麦熟，国家粮食足。小麦的主要成分是淀粉，淀粉属于（  ）","options":["A．糖类","B．油脂","C．蛋白质","D．维生素"],"answer":0,"explanation":"淀粉是多糖，属于糖类，是人体主要的供能物质。","year":"2020"},{"id":"hn2020_02","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列传统工艺品的制作过程中，一定发生了化学变化的是（  ）","options":["A．南阳玉雕","B．洛阳剪纸","C．开封汴绣","D．汝州瓷器"],"answer":3,"explanation":"汝州瓷器烧制过程中发生复杂的化学变化（如硅酸盐的生成）。玉雕、剪纸、汴绣均为物理变化。","year":"2020"},{"id":"hn2020_03","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"绿满中原需要天蓝、地绿、水清。下列做法值得提倡的是（  ）","options":["A．燃放烟花爆竹","B．生活垃圾进行分类回收处理","C．露天焚烧秸秆","D．实验室含酸废水倒入下水道"],"answer":1,"explanation":"垃圾分类回收处理有利于资源再利用和环境保护。其他三项均会造成环境污染。","year":"2020"},{"id":"hn2020_04","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"物质由微观粒子构成，下列物质由离子构成的是（  ）","options":["A．He","B．NH₃","C．C₆₀","D．NaCl"],"answer":3,"explanation":"NaCl由Na⁺和Cl⁻构成。He由氦原子构成；NH₃由氨分子构成；C₆₀由C₆₀分子构成。","year":"2020"},{"id":"hn2020_05","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"水是化学学习和研究的重要物质。下列有关水的说法正确的是（  ）","options":["A．冰和水的共存物属于混合物","B．有水生成的反应一定属于中和反应","C．可用肥皂水区分软水和硬水","D．水汽化时体积增大是因水分子变大"],"answer":2,"explanation":"硬水与肥皂水反应产生较少泡沫，软水产生较多泡沫，可用于区分。冰水共存物只含水一种物质，是纯净物；中和反应生成盐和水，但有水生成的不一定是中和反应（如CO₂+2NaOH=Na₂CO₃+H₂O）；水汽化体积增大是因分子间隔变大。","year":"2020"},{"id":"hn2020_06","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"金属材料在生产、生活中使用广泛。下列金属的用途利用了金属导电性的是（  ）","options":["A．铜制电线","B．铁制铁锅","C．金制项链","D．铝制饮料罐"],"answer":0,"explanation":"铜制电线利用了铜优良的导电性。铁锅利用导热性；金项链利用光泽和延展性；铝罐利用延展性和耐腐蚀性。","year":"2020"},{"id":"hn2020_07","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"下列图示的实验操作中正确的是（  ）<br><div class=\"q-img\"><img src=\"images/q/img_179.png\"></div>","options":["A．浓硫酸稀释","B．闻气体气味","C．液体的倾倒","D．检查气密性"],"answer":1,"explanation":"闻气体气味应用手扇闻，不能直接凑到瓶口。A中稀释浓硫酸应在烧杯中进行并将酸缓慢倒入水中；C中瓶塞应倒放、标签应向手心；D装置不密闭，无法检查气密性。","year":"2020"},{"id":"hn2020_08","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"从环境保护的角度考虑，下列燃料中最理想的是（  ）","options":["A．煤","B．汽油","C．氢气","D．天然气"],"answer":2,"explanation":"氢气燃烧只生成水，无污染，是最理想的清洁燃料。煤、汽油、天然气燃烧均会产生污染物或温室气体。","year":"2020"},{"id":"hn2020_09","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"生活中常使用消毒剂来杀菌、消毒。下列几种消毒液的有效成分（括号内物质）中，氧元素的质量分数最大的是（  ）","options":["A．双氧水消毒液（H₂O₂）","B．\"84\"消毒液（NaClO）","C．酒精消毒液（C₂H₅OH）","D．过氧乙酸消毒液（C₂H₄O₃）"],"answer":0,"explanation":"H₂O₂中O质量分数=32/34≈94.1%；NaClO中O质量分数=16/74.5≈21.5%；C₂H₅OH中O质量分数=16/46≈34.8%；C₂H₄O₃中O质量分数=48/76≈63.2%。H₂O₂最大。","year":"2020"},{"id":"hn2020_10","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"甲、乙两种固体的溶解度曲线如图所示，下列说法正确的是（  ）<br><div class=\"q-img\"><img src=\"images/q/img_180.png\"></div>","options":["A．甲的溶解度大于乙的溶解度","B．t₁℃时，甲、乙饱和溶液中溶质的质量分数相等","C．t₂℃时，60g甲的饱和溶液稀释到20%需加水10g","D．将t₁℃时相等质量的甲、乙的饱和溶液升温到t₂℃，溶液中溶质的质量甲大于乙"],"answer":1,"explanation":"t₁℃时甲、乙溶解度相等，饱和溶液溶质质量分数相等。A中未指明温度无法比较；C需加水40g；D中升温后溶解度增大但无溶质析出，溶质质量仍相等。","year":"2020"},{"id":"hn2020_11","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"氯碱工业是以电解食盐水为基础的基本化学工业，电解食盐水不可能生成的是（  ）","options":["A．H₂","B．Cl₂","C．NaOH","D．NaNO₃"],"answer":3,"explanation":"电解食盐水（NaCl+H₂O）生成NaOH、H₂和Cl₂，化学方程式为2NaCl+2H₂O=2NaOH+H₂↑+Cl₂↑。NaNO₃中含氮元素，反应物中没有氮元素，根据质量守恒定律不可能生成。","year":"2020"},{"id":"hn2020_12","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"分类和归纳是行之有效、简单易行的科学方法，下列说法错误的是（  ）","options":["A．锂、汞都属于金属元素","B．锌、碘都属于人体必需微量元素","C．尿素、硝酸钾都属于复合肥","D．塑料、合成纤维都属于合成材料"],"answer":2,"explanation":"尿素CO(NH₂)₂只含氮元素，属于氮肥；硝酸钾含K和N两种营养元素，是复合肥。故C说法错误。","year":"2020"},{"id":"hn2020_13","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"为治理汽车尾气反应的微观示意图，下列有关说法正确的是（  ）<br><div class=\"q-img\"><img src=\"images/q/img_181.png\"></div>","options":["A．图中只有两种氧化物","B．该反应属于置换反应","C．相对分子质量最大的是NO","D．生成丙和丁的质量比为7：22"],"answer":3,"explanation":"反应为2CO+2NO=N₂+2CO₂。CO、NO、CO₂均为氧化物共三种；反应物均为化合物，不属于置换反应；CO₂相对分子质量44大于NO的30；生成N₂和CO₂的质量比为28:88=7:22。","year":"2020"},{"id":"hn2020_14","type":"choice","chapter":"历年真题","chapterIdx":-1,"question":"已知镁和铝的相对原子质量之比为8：9，若镁和铝分别与足量盐酸反应，生成氢气的质量相等，则参加反应的镁和铝的质量比为（  ）","options":["A．3：2","B．4：3","C．1：1","D．1：2"],"answer":1,"explanation":"设Mg相对原子质量=8x，Al=9x。Mg+2HCl=MgCl₂+H₂↑中，8x份Mg产生2份H₂；2Al+6HCl=2AlCl₃+3H₂↑中，18x份Al产生6份H₂。设生成1份H₂需Mg 4x份、Al 3x份，质量比Mg:Al=4x:3x=4:3。","year":"2020"},{"id":"hn2020_15","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_182.png\"></div>","parts":[{"answer":["O"],"acceptable":[["O"],["氧"],["氧元素"]],"question":"地壳中含量最多的元素是______；"},{"answer":["N₂"],"acceptable":[["N₂"],["N2"],["氮气"]],"question":"空气中体积分数约为78%的气体是______。"}],"year":"2020"},{"id":"hn2020_16","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_183.png\"></div>","parts":[{"answer":["+4"],"acceptable":[["+4"],["+4价"],["正四价"]],"question":"Mg₂SiO₄中硅元素的化合价是______；"},{"answer":["（+12）2 8 2"],"acceptable":[["(+12)2 8 2"],["镁原子结构示意图"]],"question":"镁原子（核电荷数为12）的结构示意图为______。"}],"year":"2020"},{"id":"hn2020_17","type":"fill","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_184.png\"></div>","parts":[{"answer":["左盘"],"acceptable":[["左盘"]],"question":"所需氯化钠固体应放在托盘天平的______（填\"左盘\"或\"右盘\"）上进行称量；"},{"answer":["俯视"],"acceptable":[["俯视"]],"question":"若所配制溶液的质量分数偏大，则可能是量取水时______（填\"俯视\"或\"仰视\"）量筒读数所致。"}],"year":"2020"},{"id":"hn2020_18",
