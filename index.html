<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>河南中考化学 · 在线练习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --primary: #2d7a4e;
    --primary-light: #3c9d64;
    --primary-dark: #1e5a36;
    --accent: #f5a623;
    --bg: #f0f4f0;
    --card: #ffffff;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --danger: #e74c3c;
    --success: #27ae60;
    --border: #dce3dc;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 16px;
}
body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}
.hidden { display: none !important; }

/* ========== Header ========== */
.app-header {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
    padding: 16px 20px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.app-header h1 { font-size: 20px; font-weight: 700; }
.app-header .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }

/* ========== Container ========== */
.container { max-width: 800px; margin: 0 auto; padding: 16px; }

/* ========== Home Page ========== */
.home-grid { display: grid; gap: 12px; margin-top: 16px; }
.home-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 2px solid transparent;
}
.home-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
.home-card:active { transform: scale(0.98); }
.home-card .icon { font-size: 28px; margin-bottom: 8px; }
.home-card h3 { font-size: 17px; margin-bottom: 4px; }
.home-card p { font-size: 13px; color: var(--text-light); line-height: 1.5; }
.home-card .tag {
    display: inline-block;
    margin-top: 8px;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    background: var(--bg);
    color: var(--text-light);
}
.card-exam { border-color: var(--danger); }
.card-chapter { border-color: var(--primary); }
.card-random { border-color: var(--accent); }

/* ========== Chapter List ========== */
.chapter-list { display: grid; gap: 10px; margin-top: 12px; }
.chapter-item {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: transform 0.1s;
}
.chapter-item:active { transform: scale(0.98); }
.chapter-item .name { font-size: 15px; font-weight: 500; }
.chapter-item .count { font-size: 12px; color: var(--text-light); background: var(--bg); padding: 2px 10px; border-radius: 10px; }
.chapter-item .done { color: var(--success); }

/* ========== Quiz Page ========== */
.quiz-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding: 12px 0;
}
.quiz-header .back {
    background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px 8px;
    color: var(--text); border-radius: 8px;
}
.quiz-header .back:hover { background: var(--bg); }
.quiz-progress {
    font-size: 14px; font-weight: 600; color: var(--primary);
}
.quiz-timer {
    font-size: 14px; font-weight: 600; color: var(--accent);
}
.quiz-timer.warning { color: var(--danger); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.quiz-atomic-ref {
    font-size: 12px; color: var(--text-light);
    text-align: center; padding: 6px 12px;
    margin-bottom: 12px;
    background: #f8faf8; border-radius: 8px;
    line-height: 1.6;
}

/* ========== Question Card ========== */
.question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
}
.q-number {
    font-size: 12px; color: var(--primary); font-weight: 600;
    background: #e8f5e9; padding: 2px 10px; border-radius: 10px; display: inline-block; margin-bottom: 12px;
}
.q-type {
    font-size: 12px; color: var(--accent); font-weight: 600;
    background: #fff8e1; padding: 2px 10px; border-radius: 10px; display: inline-block; margin-left: 6px;
}
.q-chapter {
    font-size: 12px; color: #666;
    background: #f5f5f5; padding: 2px 10px; border-radius: 10px; display: inline-block; margin-left: 6px;
}
.q-text {
    font-size: 16px; line-height: 1.8; margin: 12px 0 16px;
}
.q-text .highlight { color: var(--primary); font-weight: 600; }
.q-img img { max-width: 100%; height: auto; border-radius: 8px; }

.options { display: flex; flex-direction: column; gap: 10px; }
.option {
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 15px;
    line-height: 1.6;
    background: #fafcfa;
}
.option:hover { border-color: var(--primary-light); background: #f0faf3; }
.option.selected { border-color: var(--primary); background: #e8f5e9; }
.option.correct { border-color: var(--success); background: #e8f8f0; }
.option.wrong { border-color: var(--danger); background: #fdecea; }
.option.disabled { pointer-events: none; opacity: 0.7; }
.option .label {
    display: inline-block; font-weight: 700; margin-right: 8px; color: var(--primary);
}

/* ========== Fill Blank ========== */
.fill-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
}
.fill-input:focus { border-color: var(--primary); }
.fill-input.correct { border-color: var(--success); background: #e8f8f0; }
.fill-input.wrong { border-color: var(--danger); background: #fdecea; }

/* ========== Explanation ========== */
.explanation {
    background: #f8f9fa;
    border-left: 4px solid var(--primary);
    padding: 14px 16px;
    border-radius: 0 12px 12px 0;
    margin-top: 14px;
    font-size: 14px;
    line-height: 1.7;
    color: #444;
}
.explanation strong { color: var(--primary-dark); }

/* ========== Buttons ========== */
.btn-row {
    display: flex; gap: 10px; margin-top: 16px;
}
.btn {
    flex: 1;
    padding: 14px;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-primary:disabled { background: #bdc3c7; cursor: not-allowed; }
.btn-outline {
    background: white; color: var(--primary); border: 2px solid var(--primary);
}
.btn-outline:hover { background: #f0faf3; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #c0392b; }
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { background: #e6951f; }

/* ========== Result ========== */
.result-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px 24px;
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 16px;
}
.result-score {
    font-size: 56px; font-weight: 800; color: var(--primary);
    line-height: 1;
}
.result-score .total { font-size: 24px; color: var(--text-light); }
.result-label { font-size: 14px; color: var(--text-light); margin: 8px 0 16px; }
.result-stats {
    display: flex; justify-content: center; gap: 24px; margin: 16px 0;
}
.stat-item { text-align: center; }
.stat-item .num { font-size: 22px; font-weight: 700; }
.stat-item .label { font-size: 12px; color: var(--text-light); }
.stat-correct .num { color: var(--success); }
.stat-wrong .num { color: var(--danger); }
.stat-skip .num { color: var(--text-light); }

.result-detail-list { margin-top: 16px; }
.result-detail-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
}
.result-detail-item:hover { background: #f8f9fa; }
.result-detail-item .r { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.result-detail-item .r-c { background: #e8f8f0; color: var(--success); }
.result-detail-item .r-w { background: #fdecea; color: var(--danger); }
.result-detail-item .r-s { background: #f5f5f5; color: #999; }
.result-detail-item .q { font-size: 13px; color: var(--text); }

/* ========== Review ========== */
.review-section { margin-top: 12px; }

/* ========== Badge ========== */
.badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
}
.badge-primary { background: #e8f5e9; color: var(--primary); }
.badge-accent { background: #fff8e1; color: var(--accent); }

/* ========== Progress Bar ========== */
.progress-bar {
    height: 6px; background: var(--border); border-radius: 3px; margin: 8px 0 16px; overflow: hidden;
}
.progress-bar .fill {
    height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light));
    border-radius: 3px; transition: width 0.3s;
}

/* ========== Responsive ========== */

@media (max-width: 480px) {
    .container { padding: 12px; }
    .question-card { padding: 16px; border-radius: 12px; }
    .q-text { font-size: 15px; }
    .option { padding: 12px; font-size: 14px; }
    .result-score { font-size: 42px; }
}
</style>
</head>
<body>

<div class="app-header">
    <h1>🧪 河南中考化学 · 在线练习</h1>
    <div class="sub">河南中考化学 · 在线练习系统</div>
</div>

<div class="container" id="app">

    <!-- ======== Home ======== -->
    <div id="pageHome">
        <div class="home-grid">
            <div class="home-card card-chapter" onclick="showChapterList()">
                <div class="icon">📖</div>
                <h3>按章节练习</h3>
                <p>按教材章节顺序练习，巩固每个单元知识点</p>
                <span class="tag" id="chapterTag">共 0 题</span>
            </div>
            <div class="home-card card-exam" onclick="startMockExam()">
                <div class="icon">📝</div>
                <h3>模拟考试</h3>
                <p>按真题题型组卷：14选择+6填空+4简答+1综合，60分钟</p>
                <span class="tag">题型组卷 · 限时挑战</span>
            </div>
            <div class="home-card card-random" onclick="showRandomConfig()">
                <div class="icon">🎲</div>
                <h3>随机组卷</h3>
                <p>从全部题库随机抽取 10 题，快速自测</p>
                <span class="tag">自选数量 · 灵活练习</span>
            </div>
            <div class="home-card" style="border-color:#e67e22;" onclick="showYearExamList()">
                <div class="icon">📅</div>
                <h3>历年中考真题</h3>
                <p>按年份练习各地市中考真题，熟悉考试风格</p>
                <span class="tag" id="yearTag">暂无题目</span>
            </div>
            <div class="home-card" style="border-color:#9b59b6;" onclick="showReview()">
                <div class="icon">📋</div>
                <h3>错题回顾</h3>
                <p>复习做错的题目，巩固薄弱知识点</p>
                <span class="tag" id="wrongTag">暂无错题</span>
            </div>
        </div>
        <div id="wrongExportArea" class="hidden" style="margin-top:8px;">
            <button class="btn btn-danger" onclick="exportWrongAnswers()" style="font-size:14px;padding:12px;">
                📤 导出错题
            </button>
        </div>
        <div style="text-align:center;margin-top:24px;font-size:12px;color:#aaa;">
            河南中考化学 · 在线练习系统
        </div>
    </div>

    <!-- ======== Chapter List ======== -->
    <div id="pageChapter" class="hidden">
        <div class="quiz-header">
            <button class="back" onclick="showHome()">&larr;</button>
            <span style="font-weight:600;">选择章节</span>
            <span></span>
        </div>
        <div class="chapter-list" id="chapterList"></div>
    </div>

    <!-- ======== Year Exam List ======== -->
    <div id="pageYearExam" class="hidden">
        <div class="quiz-header">
            <button class="back" onclick="showHome()">&larr;</button>
            <span style="font-weight:600;">历年中考真题</span>
            <span></span>
        </div>
        <div class="chapter-list" id="yearList"></div>
    </div>

    <!-- ======== Quiz ======== -->
    <div id="pageQuiz" class="hidden">
        <div class="quiz-main">
            <div class="quiz-header">
                <button class="back" onclick="confirmExit()">&larr;</button>
                <span class="quiz-progress" id="quizProgress"></span>
                <span class="quiz-timer hidden" id="quizTimer">⏱ 40:00</span>
            </div>
            <div class="progress-bar" id="progressBarWrapper">
                <div class="fill" id="progressFill" style="width:0%"></div>
            </div>
            <div id="questionArea"></div>
        </div>
    </div>

    <!-- ======== Result ======== -->
    <div id="pageResult" class="hidden">
        <div class="result-card" id="resultCard"></div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="showReviewResult()">查看详细解析</button>
            <button class="btn btn-outline" onclick="exportWrongAnswers()" style="flex:0.6;">📤 导出错题</button>
            <button class="btn btn-outline" onclick="showHome()">返回首页</button>
        </div>
        <div id="resultReview" class="hidden review-section"></div>
    </div>

</div>

<script>
// ====================================================================
//  问 题 库  —— 河南中考化学真题风格，涵盖全部知识模块

const QUESTION_BANK = [{"id":"hn2026_01","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"1．《天工开物》记载的下列工艺中，不涉及化学变化的是","options":["A. 百炼成钢","B. 沙里淘金","C. 五谷酿酒","D. 陶瓷烧制"],"answer":1,"explanation":"沙里淘金是利用密度差异分离，没有新物质生成，属于物理变化。"},{"id":"hn2026_02","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"2．2026年六五环境日我国主题是\"全面绿色转型，共建美丽中国\"。下列做法不符合这一主题的是","options":["A. 污水处理达标后排放","B. 使用新能源汽车","C. 生活中垃圾分类","D. 在餐厅使用一次性餐具"],"answer":3,"explanation":"使用一次性餐具会造成资源浪费和环境污染，不符合绿色转型主题。"},{"id":"hn2026_03","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"3．材料的应用与发展贯穿人类文明史。下列物品中，主要由金属材料制成的是","options":["A. 四羊青铜方尊","B. 人面鱼纹彩陶盆","C. 有机人工角膜","D. 高强度芳纶纸"],"answer":0,"explanation":"四羊青铜方尊由青铜制成，青铜是铜合金，属于金属材料。"},{"id":"hn2026_04","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"4．鹤壁物产丰饶声名远播。下列食物中富含维生素的是","options":["A. 淇河鲫鱼","B. 黎阳贡面","C. 无核枣","D. 缠丝鸭蛋"],"answer":2,"explanation":"无核枣属于水果类，富含维生素。"},{"id":"hn2026_05","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"5．规范的操作是实验安全和成功的重要保证。下列图示的实验操作不正确的是","options":["A","B","C","D"],"answer":0,"explanation":"检验二氧化碳气体应把气体通入澄清石灰水中。"},{"id":"hn2026_06","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"6．从微观视角认识物质是学习化学的重要方法。下列物质由分子构成的是","options":["A. 金刚石","B. 氯化钠","C. 铜","D. 氨气"],"answer":3,"explanation":"氨气由氨分子构成；金刚石由碳原子构成；氯化钠由离子构成；铜由原子构成。"},{"id":"hn2026_07","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"7．微型空气质量\"检测站\"主要通过传感器来检测空气污染物的浓度。下列不属于空气污染物的是","options":["A. 二氧化氮","B. 二氧化碳","C. 臭氧","D. PM2.5"],"answer":1,"explanation":"二氧化碳是空气成分之一，不属于空气污染物。"},{"id":"hn2026_08","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"8．稀土元素铷(Nd)和镨(Pr)是制造高性能铷铁硼永磁材料的核心元素。铷元素和镨元素在元素周期表中的信息如图所示，下列说法正确的是","options":["A. 两种元素都属于非金属元素","B. 铷的相对原子质量为144.2g","C. 镨的质子数为59","D. 两种元素原子的核外电子数相差3.3"],"answer":2,"explanation":"镨的原子序数为59，原子序数=质子数。"},{"id":"hn2026_09","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"9．分类法是学习化学常用的方法，下列分类正确的是","options":["A. 碱：烧碱、纯碱、氢氧化钾","B. 人体必需的微量元素：铁、钙、碘","C. 化石燃料：煤、石油、天然气","D. 合成材料：合金、合成纤维、合成橡胶"],"answer":2,"explanation":"化石燃料包括煤、石油、天然气。A中纯碱是盐；B中钙是常量元素；D中合金是金属材料。"},{"id":"hn2026_10","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"10．我国空间站运用自主研发的\"再生生保系统\"，有效保障了航天员的太空生存，其中一个子系统反应的微观示意图如下，下列说法不正确的是","options":["A. 该反应中共涉及两种氧化物","B. 反应前后原子数目不变","C. 乙中氧元素质量分数小于丙中氧元素质量分数","D. 参加反应的甲和乙质量比为1:22"],"answer":3,"explanation":"根据微观示意图分析，参加反应的甲和乙质量比应为8:44。"},{"id":"hn2026_11","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"11．劳动成就梦想，化学服务生活。下列劳动项目与所涉及的化学知识不相符的是","options":["A. 用扇子扇煤炉火让火更旺：提高了燃煤的着火点","B. 用活性炭自制净水器：活性炭具有吸附性","C. 将食品包装袋抽真空并充入氮气：氮气化学性质不活泼","D. 将黄铜片和铜片互相刻画：比较黄铜和铜的硬度大小"],"answer":0,"explanation":"扇风是提供充足氧气，着火点是物质固有属性，不能提高。"},{"id":"hn2026_12","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"12．某兴趣小组为探究氯化镁在水中的溶解情况，进行了如下实验。下列说法不正确的是","options":["A. 氯化镁的溶解度随温度升高而增大","B. 20℃时氯化镁的溶解度为54.3g","C. 20℃升温至40℃时烧杯中溶质的质量分数变大","D. 烧杯②中的溶液为不饱和溶液"],"answer":3,"explanation":"烧杯②中有未溶解物质，溶液为饱和溶液。"},{"id":"hn2026_13","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"13．下列图像分别与选项中的操作相对应，其中对应关系正确的是","options":["A. 向一定量稀硫酸中滴入水","B. 一定温度时向一定量饱和石灰水中加入少量氧化钙","C. 水通直流电","D. 向一定量的二氧化锰固体中加入过氧化氢溶液"],"answer":2,"explanation":"水通电产生氢气和氧气的体积比为2:1，与图像相符。"},{"id":"hn2026_14","type":"choice","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"14．向一定质量的某金属混合物中加入适量稀硫酸，恰好完全反应，生成氢气0.4g；将反应后的溶液蒸干，得到24.2g固体，则该金属混合物不可能是","options":["A. Mg和Al","B. Mg和Zn","C. Al和Zn","D. Mg、Al和Zn"],"answer":0,"explanation":"暂无解析"},{"id":"hn2026_15","type":"fill","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_474.png\"></div>","parts":[],"answer":"","explanation":"<div class=\"q-img\"><img src=\"images/q/img_486.png\"></ 壁一模","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_482.png\"></div>","parts":[],"answer":"","explanation":"<div class=\"q-img\"><img src=\"images/q/img_494.jpg\"></div>","acceptable":[]},{"id":"hn2026_24","type":"fill","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_483.png\"></div>","parts":[],"answer":"","explanation":"<div class=\"q-img\"><img src=\"images/q/img_495.png\"></div>","acceptable":[]},{"id":"hn2026_25","type":"fill","year":"2026鹤壁一模","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_484.png\"></div><div class=\"q-img\"><img src=\"images/q/img_485.png\"></div>","parts":[],"answer":"","explanation":"<div class=\"q-img\"><img src=\"images/q/img_496.png\"></div>","acceptable":[]},{"id":"hn2008_01","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"下列物质的用途主要是由其化学性质决定的是","options":["A. 用干冰作制冷剂","B. 用金刚石切割玻璃","C. 用煤作燃料","D. 发烧病人用酒精擦身体降温"],"answer":2,"explanation":"用煤作燃料是利用煤的可燃性，属于化学性质。干冰制冷、金刚石切割、酒精降温都是利用物理性质。"},{"id":"hn2008_02","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"2008年6月1日，我国正式实行\"限塑令\"，开始在全国范围内限制使用塑料购物袋。下列说法不正确的是","options":["A. \"限塑令\"有助于控制白色污染","B. 提倡生产和使用可降解的塑料","C. 塑料属于有机合成材料","D. 应禁止使用塑料制品"],"answer":3,"explanation":"塑料制品在生活中有广泛应用，应合理使用而非禁止。其他三项说法均正确。"},{"id":"hn2008_03","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"下列关于燃烧现象的描述，正确的是","options":["A. 氢气在氧气中燃烧产生大量的白烟","B. 红磷在空气中燃烧发出蓝紫色火焰","C. 镁条在空气中燃烧发出耀眼的白光","D. 铁丝在空气中剧烈燃烧，火星四射"],"answer":2,"explanation":"镁条在空气中燃烧发出耀眼的白光，生成白色固体。A氢气燃烧产生淡蓝色火焰；B红磷燃烧产生大量白烟而非蓝紫色火焰；D铁丝在空气中不能燃烧，在氧气中才能剧烈燃烧火星四射。"},{"id":"hn2008_04","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"生产和生活中下列做法不正确的是","options":["A. 用洗洁精或纯碱洗涤餐具上的油污","B. 用甲醛水溶液浸泡水产品以防止腐烂","C. 使用无铅汽油以减少含铅物质的排放","D. 开发利用新能源以减缓能源危机"],"answer":1,"explanation":"甲醛有毒，不能用于浸泡水产品。A洗涤剂有乳化作用、纯碱显碱性可去油污；C无铅汽油减少铅污染；D开发新能源正确。"},{"id":"hn2008_05","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"下列图示的化学实验操作错误的是<div class=\"q-img\"><img src=\"images/q/img_1.png\" style=\"max-width:100%;margin:8px 0;border-radius:8px;\"></div>","options":["A","B","C","D"],"answer":0,"explanation":"根据图示判断，A选项实验操作存在错误。化学实验操作需严格按照规范进行。"},{"id":"hn2008_06","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"下列实验方案不可行的是","options":["A. 用肥皂水区分硬水和软水","B. 用水区分硝酸铵固体和蔗糖固体","C. 用pH试纸区分澄清石灰水和食盐水","D. 用紫色石蕊试液区分稀盐酸和稀硫酸"],"answer":3,"explanation":"稀盐酸和稀硫酸都能使紫色石蕊试液变红，无法区分。A肥皂水泡沫多的是软水，泡沫少的是硬水；B硝酸铵溶于水吸热温度降低，蔗糖无变化；C石灰水显碱性pH>7，食盐水中性pH=7。"},{"id":"hn2008_07","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"在研究气体的性质时，某同学进行了下图所示操作，有关说法不正确的是<div class=\"q-img\"><img src=\"images/q/img_2.png\" style=\"max-width:100%;margin:8px 0;border-radius:8px;\"></div>","options":["A. 这种研究物质的方法属于实验法","B. 这是一种正确的闻气体的方法","C. 该操作利用了分子在不断运动的性质","D. 研究有剧毒的气体物质时也可用此方法"],"answer":3,"explanation":"闻气体时应扇闻（用手轻轻扇动），对于剧毒气体不能用此方法，需要在通风橱中处理。A、B、C说法均正确。"},{"id":"hn2008_08","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"某物质在空气中完全燃烧生成8.8g二氧化碳和5.4g水，则关于这种物质的组成描述正确的是","options":["A. 该物质只含有碳元素和氢元素","B. 该物质中碳元素与氢元素的质量比为12∶1","C. 该物质一定含有碳元素和氢元素，可能含有氧元素","D. 该物质的分子中碳原子与氢原子的个数比为1∶2"],"answer":2,"explanation":"8.8g CO₂含碳2.4g，5.4g H₂O含氢0.6g，C+H=3.0g<反应物总质量，所以一定含C、H，可能含O。碳氢原子个数比=(2.4/12)∶(0.6/1)=0.2:0.6=1∶3，不等于1∶2。"},{"id":"hn2008_09","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"下图是钠与氯气（Cl₂）反应生成氯化钠的模拟图。从图示可知下列说法不正确的是<div class=\"q-img\"><img src=\"images/q/img_3.png\" style=\"max-width:100%;margin:8px 0;border-radius:8px;\"></div>","options":["A. 反应中钠原子转移一个电子给氯原子","B. 反应中氯气分子分成氯原子","C. 核外电子在化学反应中起着重要作用","D. 氯化钠由氯化钠分子构成"],"answer":3,"explanation":"氯化钠是由钠离子和氯离子构成的离子化合物，不是由分子构成的。"},{"id":"hn2008_10","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"下列化学方程式符合题意且书写正确的是","options":["A. 正常雨水的pH约为5.6的原因：CO₂+H₂O=H₂CO₃","B. 医疗上用氢氧化镁中和过多胃酸：Mg(OH)₂+2HCl=MgCl₂+2H₂O","C.工业上用高温煅烧石灰石的方法制生石灰：CaCO3==CaO +CO2↑","D. 证明铁是金属活动性顺序表中氢之前的金属：2Fe+6HCl=2FeCl₃+3H₂↑"],"answer":0,"explanation":"A正确，CO₂与水反应生成碳酸使雨水呈弱酸性。B错误，Mg(OH)₂难溶于水，与盐酸的反应速率慢，不适用于中和胃酸（实际用Al(OH)₃或NaHCO₃）。C缺少反应条件\"高温\"。D错误，铁与盐酸反应生成FeCl₂不是FeCl₃。"},{"id":"hn2008_11","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"下列各组物质间的反应，要借助酸碱指示剂才能判断出反应发生的是","options":["A. 锌与稀盐酸","B. 烧碱与稀硫酸","C. 氧化铁与稀硫酸","D. 硫酸铜溶液与氢氧化钠溶液"],"answer":1,"explanation":"烧碱（NaOH）与稀硫酸反应无明显现象，需借助指示剂判断。A锌与盐酸反应有气泡；C氧化铁与硫酸反应溶液变黄色；D有蓝色沉淀生成。"},{"id":"hn2008_12","type":"choice","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"下列各组中的物质充分混合后，所得溶液的质量比反应前溶液的总质量减少的是","options":["A. 二氧化硫和氢氧化钠溶液","B. 氢氧化钠固体与稀硫酸","C. 铁和硫酸铜溶液","D. 氯化钠溶液和稀盐酸"],"answer":2,"explanation":"铁与硫酸铜反应：Fe+CuSO₄=FeSO₄+Cu，每56份铁反应生成64份铜，进入溶液的Fe比析出的Cu少，使溶液质量减少。A、B、D反应后溶液质量均增加。"},{"id":"hn2008_13","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_4.png\"></div>","parts":[{"question":"(1) 空气中体积分数约为78%的气体单质是______","answer":["氮气"],"acceptable":["N₂","N2","氮"]},{"question":"(2) 可作复合肥料的一种盐是______","answer":["硝酸钾"],"acceptable":["KNO₃","KNO3"]},{"question":"(3) 沼气（主要成分CH₄）完全燃烧的化学方程式是______","answer":["CH₄+2O₂=CO₂+2H₂O"],"acceptable":["CH₄+2O₂=点燃=CO₂+2H₂O","CH4+2O2=CO2+2H2O","CH4+2O2=点燃=CO2+2H2O"]}],"explanation":"空气中氮气约占78%。硝酸钾含K、N两种营养元素，属于复合肥料。沼气主要成分甲烷完全燃烧生成CO₂和H₂O。"},{"id":"hn2008_14","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_5.png\"></div>","parts":[{"question":"(1) 其中富含淀粉的是______","answer":["米饭"],"acceptable":["大米","米"]},{"question":"(2) 该同学还需要补充的食物是______（写出一种即可）","answer":["青菜"],"acceptable":["蔬菜","水果"]}],"explanation":"米饭富含淀粉（糖类）。午餐缺少维生素，需要补充蔬菜、水果等。"},{"id":"hn2008_15","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_6.png\"></div>","parts":[{"question":"(1) 天然水污染的来源有______（写出一种即可）","answer":["工业废水"],"acceptable":["生活污水","农业污水","农药化肥"]},{"question":"(2) 常用的净水方法有______（写出一种即可）","answer":["过滤"],"acceptable":["吸附","蒸馏","沉淀","煮沸"]},{"question":"(3) 漂白粉可用于水的杀菌消毒，其有效成分是次氯酸钙[Ca(ClO)₂]。反应Ca(ClO)₂+X+H₂O=CaCO₃↓+2HClO，X的化学式为______","answer":["CO₂"],"acceptable":["CO2","二氧化碳"]}],"explanation":"天然水污染主要来源于工业废水和生活污水。常用净水方法有沉淀、过滤、吸附、蒸馏等。根据质量守恒定律推算出X为CO₂。"},{"id":"hn2008_16","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_7.png\"></div>","parts":[{"question":"(1) ZnSO₄(CuSO₄)：______","answer":["锌"],"acceptable":["Zn","锌粉","锌粒"]},{"question":"(2) O₂(水蒸气)：______","answer":["浓硫酸"],"acceptable":["H₂SO₄(浓)","H2SO4(浓)","浓H₂SO₄","浓H2SO4"]}],"explanation":"Zn+CuSO₄=ZnSO₄+Cu，过滤除去铜和过量锌。浓硫酸具有吸水性可干燥氧气。"},{"id":"hn2008_17","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_8.png\"></div>","parts":[{"question":"(1) t₁℃时，B物质的溶解度为______g","answer":["b"],"acceptable":["b g","bg"]},{"question":"(2) 将t₂℃时A、B的饱和溶液分别升温到t₃℃，A溶液的溶质质量分数______（填\"大于\"\"小于\"或\"等于\"）B溶液的溶质质量分数","answer":["等于"],"acceptable":["="]}],"explanation":"t₂℃时A、B溶解度相等，饱和溶液质量分数相等。升温后溶解度增大但溶质和溶剂质量不变，质量分数不变，仍然相等。"},{"id":"hn2008_18","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_9.png\"></div>","parts":[{"question":"(1) 氢氧化钠变质的原因（用化学方程式表示）______","answer":["2NaOH+CO₂=Na₂CO₃+H₂O"],"acceptable":["2NaOH+CO2=Na2CO3+H2O"]},{"question":"(2) 检验氢氧化钠已变质，可选用的酸是______（填化学式）","answer":["HCl"],"acceptable":["盐酸","稀盐酸","H₂SO₄","H2SO4"]},{"question":"(3) 检验氢氧化钠已变质，可选用的碱是______（填化学式）","answer":["Ca(OH)₂"],"acceptable":["Ca(OH)2","氢氧化钙","石灰水","澄清石灰水"]}],"explanation":"氢氧化钠与CO₂反应生成Na₂CO₃而变质。酸与Na₂CO₃反应产生气泡。碱Ca(OH)₂与Na₂CO₃反应生成白色沉淀CaCO₃。"},{"id":"hn2008_19","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_10.png\"></div>","parts":[{"question":"(1) 将隧道两端封口所依据的原理是______","answer":["隔绝氧气"],"acceptable":["隔绝空气","隔绝O₂","隔绝O2"]},{"question":"(2) 向隧道里注水所依据的原理是______","answer":["降低温度到着火点以下"],"acceptable":["降温","降低温度","使温度降低到着火点以下"]}],"explanation":"灭火原理：①隔绝氧气（或空气）；②使温度降低到可燃物的着火点以下。"},{"id":"hn2008_20","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_11.png\"></div>","parts":[{"question":"(1) 右图A是金属的一个应用实例，请说出利用了金属的什么物理性质？（答出一点即可）","answer":["导电性"],"acceptable":["延展性","延性","导热性","金属光泽"]},{"question":"(2) 右图B是两块金属片相互刻画后，在纯铜片上有明显的划痕。该实验探究的目的是什么？","answer":["比较合金和纯金属的硬度"],"acceptable":["比较黄铜和铜的硬度","比较合金与纯金属的硬度"]},{"question":"(3) 工业上可用一氧化碳还原赤铁矿（主要成分Fe₂O₃）炼铁，化学方程式为______","answer":["Fe₂O₃+3CO=2Fe+3CO₂"],"acceptable":["Fe₂O₃+3CO=高温=2Fe+3CO₂","Fe2O3+3CO=2Fe+3CO2","Fe2O3+3CO=高温=2Fe+3CO2"]}],"explanation":"(1)金属常用作导线利用导电性。(2)相互刻画可以比较金属的硬度。(3)Fe₂O₃+3CO=高温=2Fe+3CO₂"},{"id":"hn2008_21","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_12.png\"></div>","parts":[{"question":"(1) NaOH和Ba(NO₃)₂两种溶液混合后能否发生反应？理由是什么？","answer":["不能"],"acceptable":["否","不能反应","不可以"]},{"question":"(2) 写出一个有BaSO₄生成的复分解反应的化学方程式","answer":["Na₂SO₄+Ba(OH)₂=BaSO₄↓+2NaOH"],"acceptable":["Na2SO4+Ba(OH)2=BaSO4+2NaOH","H₂SO₄+BaCl₂=BaSO₄↓+2HCl","H2SO4+BaCl2=BaSO4+2HCl","Na₂SO₄+Ba(NO₃)₂=BaSO₄↓+2NaNO₃"]}],"explanation":"可溶性硫酸盐与可溶性钡盐反应生成BaSO₄沉淀。没有沉淀、气体或水生成时复分解反应不能发生。"},{"id":"hn2008_22","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_13.png\"></div>","parts":[{"question":"(1) 用A装置制取氧气的化学方程式为______","answer":["2KMnO₄=K₂MnO₄+MnO₂+O₂↑"],"acceptable":["2KMnO4=K2MnO4+MnO2+O2↑","2KMnO₄=△=K₂MnO₄+MnO₂+O₂↑","2KClO₃=2KCl+3O₂↑","2KClO3=2KCl+3O2↑"]},{"question":"(2) 收集氧气时不宜用D装置，其原因是什么？","answer":["氧气的密度比空气略大"],"acceptable":["氧气密度比空气大","氧气密度大于空气"]},{"question":"(3) 将B、C装置连接后可制取多种气体。写出制取其中一种气体的化学方程式，并用简单的方法验证所得的气体。","answer":["CaCO₃+2HCl=CaCl₂+H₂O+CO₂↑"],"acceptable":["CaCO3+2HCl=CaCl2+H2O+CO2↑","2H₂O₂=2H₂O+O₂↑","2H2O2=2H2O+O2↑","Zn+2HCl=ZnCl₂+H₂↑","Zn+2HCl=ZnCl2+H2↑"]}],"explanation":"A装置固体加热型可用加热KMnO₄或KClO₃制氧气。B装置固液不加热，C装置向上排空气法，可制CO₂（密度大于空气）。"},{"id":"hn2008_23","type":"fill","year":"2008","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_14.png\"></div>","parts":[{"question":"(1) 反应物的浓度不同，反应现象不同。请举出实例：______","answer":["硫在空气中燃烧产生淡蓝色火焰"],"acceptable":["硫在空气中淡蓝色火焰氧气中蓝紫色火焰","碳在氧气中燃烧比空气中更旺"]},{"question":"(2) 碳在充足的氧气中燃烧生成CO₂，在不足的氧气中燃烧生成CO。对比可得到的结论是______","answer":["反应物的量不同生成物可能不同"],"acceptable":["由量变可以引起质变","反应物的量不同产物不同","氧气量不同产物不同"]},{"question":"(3) 对比A（先通H₂再加热）、B（铜丝加热后伸入H₂中）两套H₂还原CuO的装置，B装置的优点是______（答出一点即可）","answer":["装置简单"],"acceptable":["操作简便","节约原料","节省时间","操作方便"]},{"question":"(4) 铜丝变黑后继续加热至炽热时与H₂反应较快，只红热时反应较慢。对比可得到的结论是______","answer":["温度越高反应越快"],"acceptable":["温度影响反应速率","反应速率与温度有关","升高温度加快反应"]},{"question":"(5) 用废铜屑制取硫酸铜。甲方案：Cu+2H₂SO₄(浓)=CuSO₄+SO₂↑+2H₂O（消耗H₂SO₄ 98g制80g CuSO₄）；乙方案：2Cu+O₂=2CuO、CuO+H₂SO₄=CuSO₄+H₂O。计算乙方案制80g CuSO₄需H₂SO₄的质量。","answer":["49g"],"acceptable":["49 g","49克","49"]},{"question":"(6) 通过对比甲、乙两种方案及计算结果，你认为选用哪种方案更好？请说明理由。","answer":["乙方案"],"acceptable":["乙","乙方案更好"]},{"question":"(7) 通过对上述实验的对比与分析可知，探究某一化学问题时，除了应根据具体情况考虑恰当的实验装置外，还应考虑______等因素（答出一点即可）","answer":["反应条件"],"acceptable":["反应物的用量","操作步骤","温度","浓度"]}],"explanation":"⑷甲方案：Cu+2H₂SO₄(浓)=CuSO₄+SO₂↑+2H₂O，消耗98g H₂SO₄制80g CuSO₄；乙方案：Cu→CuO→CuSO₄，CuO+H₂SO₄=CuSO₄+H₂O，H₂SO₄与CuSO₄物质的量之比1:1，m(H₂SO₄)=49g。乙方案既节省原料又避免产生SO₂污染，更环保。进行实验探究时还需考虑反应条件、反应物用量等因素。"},{"id":"hn2009_01","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"\"河南熟，天下足\"。我省是粮食生产大省，所生产小麦和大米的主要成分为","options":["A. 蛋白质","B. 油脂","C. 淀粉","D. 维生素"],"answer":2,"explanation":"小麦和大米富含淀粉（糖类），淀粉属于糖类，是人体主要的供能物质。"},{"id":"hn2009_02","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"下列有关O₂和CO₂的自述中属于物理性质的是<br><div class=\"q-img\"><img src=\"images/q/img_15.png\"></div>","options":["A","B","C","D"],"answer":1,"explanation":"物理性质不需要通过化学变化就能表现出来。O₂和CO₂的物理性质包括颜色、状态、气味、密度等。"},{"id":"hn2009_03","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"下列各组物质中，前者属于混合物，后者属于化合物的是","options":["A. 食盐　食醋","B. 生铁　氢气","C. 空气　纯碱","D. 冰水共存物　烧碱"],"answer":2,"explanation":"空气是由多种气体组成的混合物，纯碱（Na₂CO₃）是由不同种元素组成的纯净物，属于化合物。"},{"id":"hn2009_04","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"下列有关水的说法不正确的是","options":["A. 水是生命活动不可缺少的物质","B. 水通电分解和水的蒸发都是化学变化","C. 用肥皂水可以检验硬水和软水","D. 净化水的方法有吸附、沉淀、过滤和蒸馏等"],"answer":1,"explanation":"水的蒸发是物理变化，没有新物质生成；水通电分解生成H₂和O₂，属于化学变化。"},{"id":"hn2009_05","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"下列实验操作或做法正确的是","options":["A. 将用剩的药品放回原试剂瓶","B. 制备气体前，检查装置的气密性","C. 实验结束后，用嘴吹灭酒精灯","D. 将氢氧化钠放在托盘天平的右盘上称量"],"answer":1,"explanation":"制备气体前必须检查装置的气密性，这是实验安全的基本要求。A中用剩药品不能放回原瓶；C应用灯帽盖灭酒精灯；D应左物右码。"},{"id":"hn2009_06","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"食品安全与人体健康密切相关。下列做法不会损害人体健康的是","options":["A. 用含小苏打的发酵粉焙制糕点","B. 用三聚氰胺提高牛奶中蛋白质的含量","C. 用甲醛的水溶液浸泡水产品","D. 用霉变花生制成的压榨花生油烹调食品"],"answer":0,"explanation":"小苏打（NaHCO₃）受热分解产生CO₂，可使糕点疏松多孔，对人体无害。三聚氰胺、甲醛、霉变花生中的黄曲霉素都有毒。"},{"id":"hn2009_07","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"下列各组物质中，能相互反应且反应类型属于复分解反应的是","options":["A. 锌和稀盐酸","B. 二氧化碳和水","C. 氯化钠溶液和硝酸钾溶液","D. 氢氧化钠和稀硫酸"],"answer":3,"explanation":"NaOH+H₂SO₄=Na₂SO₄+H₂O，两种化合物交换成分生成两种化合物，属于复分解反应。A是置换反应；B是化合反应；C不反应。"},{"id":"hn2009_08","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"环境问题是2009年\"两会\"上的热门话题之一。下列情况中：①煤的燃烧 ②工业废气的排放 ③动植物的呼吸 ④汽车尾气的排放，可能引起大气污染的是","options":["A. ①②④","B. ②③④","C. ①③④","D. ①②③"],"answer":0,"explanation":"煤燃烧产生SO₂等有害气体，工业废气和汽车尾气中含有NO₂、CO等污染物。动植物的呼吸是自然界的正常生理活动，不造成大气污染。"},{"id":"hn2009_09","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"草莓、香蕉等水果具有芳香气味，是因为其中含有乙酸乙酯（化学式为C₄H₈O₂）等物质。下列关于乙酸乙酯的说法正确的是","options":["A. 该物质属于氧化物","B. 其分子由碳原子、氢原子和氧分子构成","C. 该物质的相对分子质量为88","D. 该物质中碳、氢、氧的质量比为12:1:16"],"answer":2,"explanation":"Mr(C₄H₈O₂)=12×4+1×8+16×2=88。A氧化物只含两种元素；B分子由原子构成不含氧分子；D质量比=(48:8:32)=6:1:4。"},{"id":"hn2009_10","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"下列说法不正确的是<br><div class=\"q-img\"><img src=\"images/q/img_16.png\"></div>","options":["A. a的溶解度大于b的溶解度","B. 在t℃时，a、b的饱和溶液中溶质的质量分数相同","C. 将t℃时b的饱和溶液升温至40℃，其溶液中溶质的质量分数不变","D. 10℃时，分别用100g水配制a、b的饱和溶液所需a的质量小于b的质量"],"answer":0,"explanation":"温度低于t℃时a的溶解度小于b，温度高于t℃时a的溶解度大于b，不能笼统比较。A说法不正确。"},{"id":"hn2009_11","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"下列说法正确的是","options":["A. 水沸腾时可将壶盖顶起，说明分子大小随温度升高而增大","B. 某固体中滴加稀盐酸时有气泡产生，说明该固体一定是碳酸钠","C. 氢气燃烧后的生成物只有水，说明氢气是一种清洁燃料","D. 燃着的木条伸入某无色气体中很快熄灭，说明该气体一定是二氧化碳"],"answer":2,"explanation":"H₂燃烧只生成水，无污染，是清洁燃料。A温度升高分子间隔变大而非分子变大；B可能是碳酸盐或活泼金属；D还可能是N₂等。"},{"id":"hn2009_12","type":"choice","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"表示水消毒时所发生反应的微观过程。下列有关说法正确的是<br><div class=\"q-img\"><img src=\"images/q/img_17.png\"></div>","options":["A. 图中单质的化学式为O₂","B. 该反应属于置换反应","C. 生成物的水溶液呈中性","D. 生成物中氯元素的化合价分别为-1和+1"],"answer":3,"explanation":"反应为Cl₂+H₂O=HCl+HClO，生成物中HCl中Cl为-1价，HClO中Cl为+1价。"},{"id":"hn2009_13","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_18.png\"></div>","parts":[{"question":"(1) 空气成分中体积分数最大的物质是______","answer":["氮气"],"acceptable":["N₂","N2"]},{"question":"(2) 地壳中含量最多的金属元素与氧元素所形成化合物的化学式为______","answer":["Al₂O₃"],"acceptable":["Al2O3","氧化铝"]}],"explanation":"空气中氮气约占78%（体积分数）。地壳中含量最多的金属元素是Al，形成的氧化物为Al₂O₃。"},{"id":"hn2009_14","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_19.png\"></div>","parts":[{"question":"(1) 可用于改良酸性土壤的是______（填序号）","answer":["②"],"acceptable":["2","熟石灰","氢氧化钙"]},{"question":"(2) 农业上可作复合肥料的是______（填序号）","answer":["④"],"acceptable":["4","硝酸钾","KNO₃","KNO3"]},{"question":"(3) 可作为人体重要能量来源的是______（填序号）","answer":["①"],"acceptable":["1","葡萄糖"]}],"explanation":"熟石灰Ca(OH)₂可改良酸性土壤。硝酸钾含K、N两种营养元素，是复合肥料。葡萄糖是人体重要的供能物质。"},{"id":"hn2009_15","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_20.png\"></div>","parts":[{"question":"(1) 有关反应的化学方程式为______","answer":["MgCO₃+2HCl=MgCl₂+CO₂↑+H₂O"],"acceptable":["MgCO₃+2HCl=MgCl₂+H₂O+CO₂↑","MgCO3+2HCl=MgCl2+CO2↑+H2O"]},{"question":"(2) 该抗酸药说明书上标明的食用方法为\"嚼食\"，将药片嚼碎后服用的优点是______","answer":["增大接触面积，反应快"],"acceptable":["药物与胃酸的接触面积大，反应快","增大接触面积","加快反应速率"]}],"explanation":"MgCO₃与胃酸（HCl）反应生成MgCl₂、CO₂和H₂O。嚼碎后增大反应物接触面积，使反应速率加快。"},{"id":"hn2009_16","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_21.png\"></div>","parts":[{"question":"(1) 在这个转化过程中NiFe₂O₄起______作用","answer":["催化"],"acceptable":["催化剂","催化作用"]},{"question":"(2) 航天服中的CO₂可用LiOH来吸收，已知LiOH与NaOH具有相似的化学性质，有关反应的化学方程式为______","answer":["2LiOH+CO₂=Li₂CO₃+H₂O"],"acceptable":["2LiOH+CO₂=Li₂CO₃↓+H₂O","2LiOH+CO2=Li2CO3+H2O"]}],"explanation":"NiFe₂O₄在反应前后质量和化学性质不变，起催化作用。LiOH与CO₂反应生成Li₂CO₃和H₂O。"},{"id":"hn2009_17","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_22.png\"></div>","parts":[{"question":"(1) 除去O₂中少量的CO₂，可将混合气体通过足量的______","answer":["氢氧化钠溶液"],"acceptable":["NaOH溶液","碱溶液","氢氧化钠"]},{"question":"(2) 除去Na₂SO₄溶液中少量的Na₂CO₃，不能选用盐酸的原因是______","answer":["生成NaCl，引入新杂质"],"acceptable":["会引入新杂质NaCl","引入新杂质氯化钠"]},{"question":"(3) 测定稀硫酸的pH时，先用水将pH试纸润湿会使结果偏______（填\"大\"或\"小\"）","answer":["大"],"acceptable":["偏大"]}],"explanation":"CO₂是酸性氧化物，能被NaOH溶液吸收。盐酸与Na₂CO₃反应会引入新杂质NaCl。用水润湿pH试纸相当于稀释稀硫酸，pH偏大。"},{"id":"hn2009_18","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_23.png\"></div>","parts":[{"question":"(1) A处玻璃管内所发生反应的化学方程式为______","answer":["Fe₃O₄+4CO=3Fe+4CO₂"],"acceptable":["Fe₃O₄+4CO=高温=3Fe+4CO₂","Fe3O4+4CO=3Fe+4CO2","Fe3O4+4CO=高温=3Fe+4CO2"]},{"question":"(2) B处可观察到的现象是______；C处酒精灯的作用是______（答出一点即可）","answer":["澄清石灰水变浑浊"],"acceptable":["石灰水变浑浊","有白色沉淀生成"]},{"question":"(3) 待四氧化三铁完全反应后，停止加热A处，在断开A、B之前应继续通入一氧化碳至A处玻璃管冷却。若不继续通入一氧化碳，可能出现的后果是______","answer":["石灰水回流至A处玻璃管中，导致玻璃管炸裂"],"acceptable":["石灰水倒吸炸裂试管","液体倒吸使试管炸裂","倒吸炸裂"]}],"explanation":"CO还原Fe₃O₄生成Fe和CO₂。B中石灰水变浑浊。若先停止通CO，温度降低压强减小，石灰水会倒吸进入热的玻璃管导致炸裂。"},{"id":"hn2009_19","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_24.png\"></div>","parts":[{"question":"这个结论是否正确？","answer":["不正确"],"acceptable":["否","错"]},{"question":"请说明理由。","answer":["参加反应的碳酸钠和盐酸的质量总和等于反应后生成的氯化钠、水和二氧化碳的质量总和，遵守质量守恒定律。因为生成的二氧化碳气体逸出，使反应后天平不平衡。"],"acceptable":["由于生成的二氧化碳气体逸出，使反应后天平不平衡","生成的CO₂气体逸出，质量减少"]}],"explanation":"一切化学反应都遵守质量守恒定律。该反应中生成的CO₂气体逸散到空气中，使天平不平衡，但反应前后物质的总质量相等。"},{"id":"hn2009_20","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_25.png\"></div>","parts":[{"question":"(1) 天然气（主要成分是CH₄）用作燃料","answer":["CH₄+2O₂=CO₂+2H₂O"],"acceptable":["CH₄+2O₂=点燃=CO₂+2H₂O","CH4+2O2=CO2+2H2O"]},{"question":"(2) 生石灰用作食品包装袋内的干燥剂","answer":["CaO+H₂O=Ca(OH)₂"],"acceptable":["CaO+H2O=Ca(OH)2"]},{"question":"(3) 工业上用碳酸钠溶液和石灰水制取烧碱","answer":["Na₂CO₃+Ca(OH)₂=CaCO₃↓+2NaOH"],"acceptable":["Na2CO3+Ca(OH)2=CaCO3↓+2NaOH"]}],"explanation":"CH₄燃烧生成CO₂和H₂O并放热。生石灰CaO与水反应生成Ca(OH)₂，吸收水分。Na₂CO₃与Ca(OH)₂反应生成NaOH。"},{"id":"hn2009_21","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_26.png\"></div>","parts":[{"question":"(1) 久置的铜制品表面会锈蚀生成铜绿[Cu₂(OH)₂CO₃]，铜绿是铜与空气中的氧气、水和______共同作用的结果。","answer":["二氧化碳"],"acceptable":["CO₂","CO2","CO₂气体","二氧化碳气体"]},{"question":"(2) 为探究铝、铁、铜的活动性顺序，某同学设计了实验：①铝片浸入稀硫酸中 ②铜片浸入稀硫酸中 ③铝片浸入硫酸亚铁溶液中。这组实验还不能完全证明三种金属的活动性顺序，请补充一个实验来达到目的（写出实验步骤、现象和化学方程式）。——补充实验方法：______","answer":["将铁片浸入硫酸铜溶液中，铁片表面有红色固体析出"],"acceptable":["将铁片浸入稀硫酸中，有气泡产生","Fe+CuSO₄=FeSO₄+Cu","Fe+CuSO4=FeSO4+Cu"]}],"explanation":"铜绿中含有C元素，说明铜还与空气中的CO₂反应。补充实验：将铁片浸入硫酸铜溶液中，铁片表面有红色固体析出，证明Fe＞Cu。"},{"id":"hn2009_22","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_27.png\"></div>","parts":[{"question":"(1) 采用A装置制取气体时，反应物的状态和反应条件需满足什么要求？","answer":["反应物为固体，反应需要加热"],"acceptable":["固体加热型","反应物是固体且需要加热"]},{"question":"(2) B装置可以制取多种气体，请写出制取其中一种气体的化学方程式。","answer":["CaCO₃+2HCl=CaCl₂+CO₂↑+H₂O"],"acceptable":["CaCO3+2HCl=CaCl2+CO2↑+H2O","2H₂O₂=2H₂O+O₂↑","2H2O2=2H2O+O2↑"]},{"question":"(3) 写出可采用C装置（气体由d口进入）收集的一种气体的名称，并用简单的方法验证该气体。","answer":["二氧化碳。将气体通入澄清石灰水，石灰水变浑浊。"],"acceptable":["氧气。将带火星的木条伸入瓶中，木条复燃。"]}],"explanation":"A为固体加热型装置。B为固液不加热型。C装置d口进气相当于向下排空气法，收集密度比空气小的气体。"},{"id":"hn2009_23","type":"fill","year":"2009","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_28.png\"></div>","parts":[{"question":"(1) 同学们打开盛浓盐酸和浓硫酸试剂瓶的瓶盖，立即就能把它们区分开来，这是为什么？","answer":["瓶口出现白雾的是浓盐酸，因为浓盐酸有挥发性"],"acceptable":["浓盐酸瓶口有白雾，浓硫酸没有","浓盐酸易挥发，瓶口有白雾"]},{"question":"(2) 要把10g这种浓硫酸稀释为20％的硫酸，需要水的质量为______g。稀释浓硫酸时，不可将水倒进浓硫酸里，请解释其原因。①需要水的质量：______","answer":["39"],"acceptable":["39g","39克"]},{"question":"(3) 稀释浓硫酸时，不可将水倒进浓硫酸里的原因是：______","answer":["水的密度较小，浮在浓硫酸上面，溶解时放出的热会使水沸腾，造成酸液飞溅"],"acceptable":["会沸腾造成酸液飞溅","放出大量热使水沸腾飞溅"]},{"question":"(4) 取少量该固体样品置于试管中，向其中加入一种无色溶液，发现有气泡产生，说明该样品中含有碳酸钠，由此可确定该固体已发生变质。则无色溶液可能是______（填一种即可）","answer":["稀盐酸"],"acceptable":["盐酸","HCl","稀硫酸","硫酸"]},{"question":"(5) 除去碳酸钠：取少量该固体样品溶于水配成溶液，滴加适量的______溶液，充分反应后过滤（填化学试剂）","answer":["氯化钡"],"acceptable":["BaCl₂","BaCl2","硝酸钡","Ba(NO₃)₂","Ba(NO3)2"]},{"question":"(6) 检验是否含有氢氧化钠：在滤液中滴加酚酞溶液，现象是______","answer":["酚酞溶液变红色"],"acceptable":["变红","溶液变红"]},{"question":"(7) 若73g质量分数为20%的盐酸与127g氢氧化钠溶液恰好完全中和，试计算反应后所得溶液中溶质的质量分数。","answer":["11.7%"],"acceptable":["11.7"]}],"explanation":"浓盐酸有挥发性瓶口有白雾。稀释浓硫酸应将酸倒入水中。NaOH变质生成Na₂CO₃，加酸有气泡。用BaCl₂除去CO₃²⁻后，用酚酞检验OH⁻。"},{"id":"hn2010_01","type":"choice","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"\"低碳生活\"已成为热门话题。下列环境问题与CO₂的排放有关的是","options":["A. 酸雨","B. 白色污染","C. 臭氧层破坏","D. 温室效应"],"answer":3,"explanation":"CO₂是主要的温室气体，大量排放会导致温室效应加剧。酸雨与SO₂、NO₂有关；白色污染与塑料有关。"},{"id":"hn2010_02","type":"choice","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"危险化学品要在包装标签上印有警示性标志。氢氧化钠应选用的标志是<br><div class=\"q-img\"><img src=\"images/q/img_29.png\"></div>","options":["A","B","C","D"],"answer":0,"explanation":"氢氧化钠具有强烈的腐蚀性，应选用腐蚀品标志。"},{"id":"hn2010_03","type":"choice","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"下列做法不正确的是","options":["A. 用熟石灰改良酸性土壤","B. 用洗洁精清洗餐具上的油污","C. 用食盐水检验硬水和软水","D. 用氮气充入食品包装袋防腐"],"answer":2,"explanation":"应用肥皂水检验硬水和软水，泡沫多的是软水，泡沫少的是硬水。食盐水无法区分。"},{"id":"hn2010_04","type":"choice","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"下列变化能证明分子可以再分的是","options":["A. 水蒸发","B. 石蜡熔化","C. 干冰升华","D. 水通电分解"],"answer":3,"explanation":"水通电分解生成H₂和O₂，水分子分解为氢原子和氧原子，原子重新组合成新分子，证明分子可以再分。"},{"id":"hn2010_05","type":"choice","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"下列关于维生素C（化学式为C₆H₈O₆）的说法正确的是","options":["A. 该物质属于氧化物","B. 该物质中碳、氢、氧的质量比为3:4:3","C. 该物质的相对分子质量为176","D. 其分子由碳原子、氢分子和氧分子构成"],"answer":2,"explanation":"Mr(C₆H₈O₆)=12×6+1×8+16×6=176。A氧化物只含两种元素；B质量比=(72:8:96)=9:1:12；D分子由原子构成。"},{"id":"hn2010_06","type":"choice","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"下列图示的实验操作中，正确的是<br><div class=\"q-img\"><img src=\"images/q/img_30.png\"></div>","options":["A","B","C","D"],"answer":2,"explanation":"根据实验操作规范判断，C选项的操作符合要求。"},{"id":"hn2010_07","type":"choice","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"分类法是化学学习和研究的重要方法之一。下列分类正确的是","options":["A. 非金属元素：Mg、F、Si","B. 盐：纯碱、小苏打、硫酸铝","C. 混合物：空气、石油、冰水共存物","D. 合成材料：塑料、羊毛、合金"],"answer":1,"explanation":"纯碱Na₂CO₃、小苏打NaHCO₃、硫酸铝Al₂(SO₄)₃都属于盐类。A中Mg是金属元素；C中冰水共存物是纯净物；D中羊毛是天然材料。"},{"id":"hn2010_08","type":"choice","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"下列区分物质的试剂或方法不正确的是","options":["A. 用水区分氯化钙和碳酸钙","B. 用闻气味的方法区分白酒和白醋","C. 用盐酸区分黄金和黄铜（含锌）","D. 用酚酞溶液区分氯化钠溶液和盐酸"],"answer":3,"explanation":"氯化钠溶液和盐酸都呈中性，都不能使酚酞变色，无法区分。A中CaCl₂可溶，CaCO₃不溶；B白酒有酒味，白醋有酸味；C黄金不反应，黄铜有气泡。"},{"id":"hn2010_09","type":"choice","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"下列各组物质充分反应后，溶液质量比反应前的溶液质量减小的是","options":["A. 铁片浸入稀硫酸中","B. 铁片浸入硫酸铜溶液中","C. 氧化铁粉末加入稀盐酸中","D. 碳酸氢钠粉末加入稀盐酸中"],"answer":1,"explanation":"Fe+CuSO₄=FeSO₄+Cu，每56份Fe反应生成64份Cu，溶液质量减少8份。A、C、D反应后溶液质量均增加。"},{"id":"hn2010_10","type":"choice","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"表示治理汽车尾气所涉及反应的微观过程。下列说法不正确的是<br><div class=\"q-img\"><img src=\"images/q/img_31.png\"></div>","options":["A. 图中单质的化学式为N₂","B. 该反应使有害气体转化为无害气体","C. 该反应属于置换反应","D. 生成单质与化合物的质量比为7:22"],"answer":2,"explanation":"该反应为2CO+2NO=N₂+2CO₂，生成物为N₂和CO₂，不属于置换反应（反应物是两种化合物）。"},{"id":"hn2010_11","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_32.png\"></div>","parts":[{"question":"(1) 天然气的主要成分是______","answer":["CH₄"],"acceptable":["CH4"]},{"question":"(2) 农业上可用作复合肥料的盐是______","answer":["KNO₃"],"acceptable":["KNO3","硝酸钾"]}],"explanation":"天然气主要成分为CH₄。KNO₃含K、N两种营养元素，是复合肥料。"},{"id":"hn2010_12","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_33.png\"></div>","parts":[{"question":"(1) 含有的营养素______（写两种即可）","answer":["蛋白质、糖类"],"acceptable":["蛋白质、维生素","糖类、维生素","蛋白质、无机盐","糖类、无机盐"]},{"question":"(2) 加碘食盐所含KIO₃中I显______价","answer":["+5"],"acceptable":["5","+5价"]}],"explanation":"面粉富含糖类，羊肉富含蛋白质，青菜富含维生素，食盐提供无机盐。KIO₃中K为+1价，O为-2价，I为+5价。"},{"id":"hn2010_13","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_34.png\"></div>","parts":[{"question":"(1) 30℃时，该物质的溶解度为______g","answer":["40"],"acceptable":["40g","40克"]},{"question":"(2) 50℃时，将40g该物质加入到100g水中，搅拌后得到的是______（填\"饱和\"或\"不饱和\"）溶液；将该溶液降温到20℃时可析出晶体______g。①溶液状态：______","answer":["不饱和"],"acceptable":["不饱和溶液"]},{"question":"(3) 析出晶体______g","answer":["10"],"acceptable":["10g","10克"]}],"explanation":"30℃时溶解度为40g。50℃时溶解度大于40g，故为不饱和溶液。20℃时溶解度为30g，降温后析出40-30=10g晶体。"},{"id":"hn2010_14","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_35.png\"></div>","parts":[{"question":"(1) 还需满足的条件是______","answer":["温度达到着火点"],"acceptable":["达到着火点","点燃","加热"]},{"question":"(2) 化学方程式为______","answer":["4P+5O₂=2P₂O₅"],"acceptable":["4P+5O2=2P2O5","4P+5O₂=点燃=2P₂O₅"]},{"question":"(3) 红磷量不足，测得氧气体积分数______","answer":["偏小"],"acceptable":["小"]}],"explanation":"燃烧需要同时满足：可燃物、与氧气接触、温度达到着火点。红磷不足则氧气未耗尽，测得结果偏小。"},{"id":"hn2010_15","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_36.png\"></div>","parts":[{"question":"(1) 甲的化学式为______","answer":["H₂O₂"],"acceptable":["H2O2","过氧化氢"]},{"question":"(2) 乙分解生成丙的化学方程式为______","answer":["2H₂O=2H₂↑+O₂↑"],"acceptable":["2H2O=2H2↑+O2↑","2H₂O=通电=2H₂↑+O₂↑"]},{"question":"(3) 从微观的角度解释甲、乙性质有差异的原因是______","answer":["两种物质的分子构成不同"],"acceptable":["分子构成不同","分子结构不同","分子种类不同"]}],"explanation":"地壳中含量最多的元素是O。H₂O₂和H₂O组成元素相同但分子构成不同，性质不同。H₂O通电分解生成H₂和O₂。"},{"id":"hn2010_16","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_37.png\"></div>","parts":[{"question":"(1) 熟石灰与盐酸反应的化学方程式为______","answer":["Ca(OH)₂+2HCl=CaCl₂+2H₂O"],"acceptable":["Ca(OH)2+2HCl=CaCl2+2H2O"]},{"question":"(2) 当加入熟石灰mg时，溶液中的溶质为______","answer":["CaCl₂和HCl"],"acceptable":["CaCl2和HCl","氯化钙和盐酸","CaCl₂、HCl"]},{"question":"(3) 若改用ng氢氧化钠与相同量盐酸反应，所得溶液的pH______7（填\">\"\"<\"或\"=\"）","answer":["<"],"acceptable":["小于","小"]}],"explanation":"mg时pH<7，盐酸过量，溶质为CaCl₂和HCl。改用NaOH，NaOH的碱性比Ca(OH)₂强但式量小，相同质量NaOH中和的HCl更多，pH更大。"},{"id":"hn2010_17","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_38.png\"></div>","parts":[{"question":"请解释可能的原因。","answer":["氢氧化钠溶液吸收空气中的二氧化碳生成了碳酸钠，碳酸钠与硝酸钡溶液反应生成了不溶于水的碳酸钡。"],"acceptable":["NaOH吸收CO₂生成Na₂CO₃，Na₂CO₃与Ba(NO₃)₂反应生成BaCO₃白色沉淀"]}],"explanation":"敞口放置的NaOH溶液吸收CO₂生成Na₂CO₃，Na₂CO₃+Ba(NO₃)₂=BaCO₃↓+2NaNO₃，BaCO₃是白色沉淀。"},{"id":"hn2010_18","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_39.png\"></div>","parts":[{"question":"(1) 利用一氧化碳还原氧化铁来炼铁。","answer":["Fe₂O₃+3CO=2Fe+3CO₂"],"acceptable":["Fe₂O₃+3CO=高温=2Fe+3CO₂","Fe2O3+3CO=2Fe+3CO2"]},{"question":"(2) 乙醇（化学式为C₂H₅OH）用作燃料。","answer":["C₂H₅OH+3O₂=2CO₂+3H₂O"],"acceptable":["C2H5OH+3O2=2CO2+3H2O","C₂H₅OH+3O₂=点燃=2CO₂+3H₂O"]},{"question":"(3) 干粉灭火器中的干粉（主要成分是NaHCO₃）受热时分解生成碳酸钠、水和一种气体。","answer":["2NaHCO₃=Na₂CO₃+H₂O+CO₂↑"],"acceptable":["2NaHCO3=Na2CO3+H2O+CO2↑","2NaHCO₃=△=Na₂CO₃+H₂O+CO₂↑"]}],"explanation":"CO还原Fe₂O₃是工业炼铁的原理。乙醇燃烧是清洁能源。NaHCO₃受热分解产生CO₂，能隔绝空气灭火。"},{"id":"hn2010_19","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_40.png\"></div>","parts":[{"question":"(1) 同种食品在夏天比冬天更容易变质。说明了什么？","answer":["升高温度，可以加快化学反应速率"],"acceptable":["温度越高反应速率越快","温度升高加快反应"]},{"question":"(2) 过氧化氢溶液在常温下能缓慢分解，若加入少量MnO₂时分解加速。说明了什么？","answer":["使用催化剂，可以加快化学反应速率"],"acceptable":["催化剂加快反应速率","MnO₂催化分解"]},{"question":"(3) 在相同质量的锌粉和锌粒中分别加入足量10%的稀盐酸，前者先反应完。说明了什么？","answer":["增大反应物接触面积，可以加快化学反应速率"],"acceptable":["接触面积越大反应越快","粉末状接触面积大反应快"]}],"explanation":"影响化学反应速率的因素：温度、催化剂、反应物接触面积等。夏天温度高反应快；催化剂加速反应；粉末接触面积大反应快。"},{"id":"hn2010_20","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_41.png\"></div>","parts":[{"question":"(1) 铝是活泼金属，为什么通常铝锅却很耐腐蚀？","answer":["铝与氧气反应，其表面生成致密的氧化铝薄膜起保护作用"],"acceptable":["表面有致密的氧化铝薄膜","Al₂O₃保护膜阻止铝进一步氧化"]},{"question":"(2) 右图是某探究实验装置图。一段时间后，能观察到什么现象？","answer":["铁钉生锈，U型管液面变为左高右低"],"acceptable":["铁钉生锈，U型管左高右低"]},{"question":"(3) X、Y、Z是三种金属固体。将X和Y浸入稀硫酸中，Y溶解并产生氢气，X无变化；将X和Z浸入硝酸银溶液中，X表面有银析出而Z无变化。则X、Y、Z和银四种金属的活动性由强到弱的顺序为______","answer":["Y＞X＞Ag＞Z"],"acceptable":["Y、X、Ag、Z"]}],"explanation":"铝表面有致密的Al₂O₃保护膜。铁生锈消耗氧气，瓶内压强减小，U型管左高右低。Y能与酸反应，X能与AgNO₃反应，Z不能。"},{"id":"hn2010_20c","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"","parts":[{"question":"写出化学方程式（假设X为Cu）","answer":["Cu+2AgNO₃=Cu(NO₃)₂+2Ag"],"acceptable":["Cu+2AgNO3=Cu(NO3)2+2Ag"]}],"explanation":"铜比银活泼，能将银从硝酸银溶液中置换出来。"},{"id":"hn2010_21","type":"fill","year":"2010","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_42.png\"></div>","parts":[{"question":"(1) 实验室制取CO₂的化学方程式为______","answer":["CaCO₃+2HCl=CaCl₂+H₂O+CO₂↑"],"acceptable":["CaCO3+2HCl=CaCl2+H2O+CO2↑"]},{"question":"(2) 表明CO₂未被Na₂O₂完全吸收的实验现象为______","answer":["澄清石灰水变浑浊"],"acceptable":["石灰水变浑浊","有白色沉淀生成"]},{"question":"(3) O₂可采用D装置收集，并用带火星的木条检验，这是利用了O₂的哪些性质？","answer":["氧气密度比空气大，氧气有助燃性"],"acceptable":["密度比空气大，能支持燃烧","密度大于空气，有助燃性"]},{"question":"(4) 若A装置产生的CO₂中混有水蒸气，要检验干燥的CO₂能否与Na₂O₂反应生成O₂，以上实验装置应如何改进？","answer":["在A、B装置之间增加气体干燥装置"],"acceptable":["在A和B之间加干燥装置","加干燥剂除去水蒸气"]},{"question":"(5) 有同学猜想X可能是酸、碱或盐中的一种。通过对物质组成的分析，大家一致认为X肯定不是酸和碱，理由是______","answer":["Na₂O₂和CO₂都不含氢元素，根据质量守恒定律，二者反应后不可能生成含氢元素的酸或碱"],"acceptable":["反应物中不含氢元素","没有氢元素不能生成酸或碱"]},{"question":"(6) 7.8g过氧化钠与足量的水反应，生成氧气的质量是多少？若反应后得到了40g氢氧化钠溶液，计算氢氧化钠溶液中溶质的质量分数。①生成O₂质量：______g","answer":["1.6"],"acceptable":["1.6g","1.6克"]},{"question":"(7) ②所得溶液中NaOH的质量分数：______%","answer":["20"],"acceptable":["20%","20"]}],"explanation":"2Na₂O₂+2H₂O=4NaOH+O₂↑，Na₂O₂与CO₂反应：2Na₂O₂+2CO₂=2Na₂CO₃+O₂。根据化学方程式计算即可。"},{"id":"hn2011_01","type":"choice","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"生活中发生的下列变化，属于化学变化的是","options":["A. 冰雪融化","B. 食物腐烂","C. 汽油挥发","D. 石蜡熔化"],"answer":1,"explanation":"冰雪融化、汽油挥发、石蜡熔化等过程都没有生成新物质，属于物理变化；食物腐烂过程中生成了新的物质，属于化学变化。"},{"id":"hn2011_02","type":"choice","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"燃煤排出的二氧化硫进入大气后，会引起的环境问题是","options":["A. 温室效应","B. 白色污染","C. 酸雨","D. 臭氧层破坏"],"answer":2,"explanation":"二氧化硫溶于水会形成酸雨。"},{"id":"hn2011_03","type":"choice","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"用氯化钠固体配制一定质量分数的氯化钠溶液，不需要用到的仪器是","options":["A. 烧杯","B. 量筒","C. 托盘天平","D. 蒸发皿"],"answer":3,"explanation":"称量氯化钠固体需要托盘天平，量取水的体积需要量筒，溶解氯化钠固体需在烧杯中进行。蒸发皿是用来加热蒸发的仪器，此实验不需要。"},{"id":"hn2011_04","type":"choice","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"某物质不含碳元素和氢元素，它不可能是①酸 ②碱 ③盐 ④有机物中的","options":["A. ①②④","B. ②③④","C. ①②③","D. ①③④"],"answer":0,"explanation":"酸和碱的组成中一定含有氢元素，有机物的组成中一定含有碳元素，因此不含有碳元素和氢元素的物质不可能是酸、碱、有机物。盐的组成不固定，可以不含碳元素和氢元素，如NaCl。"},{"id":"hn2011_05","type":"choice","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"下图是甲、乙两种固体物质的溶解度曲线，下列说法正确的是<br><div class=\"q-img\"><img src=\"images/q/img_43.png\"></div>","options":["A. 甲的溶解度大于乙的溶解度","B. t℃时，甲、乙饱和溶液中溶质的质量分数相等","C. 升高温度能使接近饱和的甲溶液变为饱和溶液","D. 10℃时，分别用100g水配制甲、乙的饱和溶液，所需甲的质量大于乙的质量"],"answer":1,"explanation":"甲、乙溶解度的大小关系随温度变化而变化，A错；t℃时甲、乙溶解度相等，因此它们的饱和溶液中溶质质量分数相等，B正确；甲的溶解度随温度升高而增大，因此接近饱和的甲溶液升温后会变得更不饱和，C错；10℃时甲的溶解度小于乙的溶解度，在100g水中溶解的甲的质量小于乙的质量，D错。"},{"id":"hn2011_06","type":"choice","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"\"信阳毛尖\"是一种绿茶，绿茶中含有的单宁酸（化学式为C₇₆H₅₂O₄₆）具有抑制血压上升、清热解毒等功效。下列有关单宁酸的说法正确的是","options":["A. 属于氧化物","B. 由碳原子、氢分子和氧分子构成","C. 氢元素的质量分数最小","D. 碳、氧两种元素的质量比为76∶46"],"answer":2,"explanation":"单宁酸由三种元素组成，不属于氧化物，A错；单宁酸由单宁酸分子构成，单宁酸分子由碳原子、氢原子、氧原子构成，B错；单宁酸中C、H、O的相对质量分别为12×76=912，1×52=52，16×46=736，氢元素质量最小，其质量分数也最小，C正确；碳、氧元素质量比为912∶736=57∶46，D错。"},{"id":"hn2011_07","type":"choice","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"有元素化合价升降的反应是氧化还原反应。下列属于氧化还原反应的是","options":["A. CaCO₃ = CaO + CO₂↑","B. HCl + KOH = KCl + H₂O","C. SO₂ + 2NaOH = Na₂SO₃ + H₂O","D. 2Na + 2H₂O = 2NaOH + H₂↑"],"answer":3,"explanation":"选项D的化学反应中Na的化合价由0升高到+1，H的化合价由+1降到0，此反应属于氧化还原反应。A、B、C中元素的化合价在反应前后均没有变化，不属于氧化还原反应。"},{"id":"hn2011_08","type":"choice","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"下列实验不能达到实验目的的是<br><div class=\"q-img\"><img src=\"images/q/img_44.png\"></div>","options":["A. A","B. B","C. C","D. D"],"answer":0,"explanation":"由于稀盐酸不能使酚酞溶液变色，A实验小烧杯中的酚酞溶液颜色不变，此实验不能用来探究分子的运动；B实验底层的蜡烛先熄灭，证明CO₂的密度比空气大；C实验导管口出现气泡，证明装置严密；D实验纯铜片上出现划痕，证明黄铜片比纯铜片硬度大。"},{"id":"hn2011_09","type":"choice","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"相同质量的H₂、CH₄和CO完全燃烧需要氧气的质量","options":["A. CO最多，H₂最少","B. H₂最多，CH₄最少","C. H₂最多，CO最少","D. CH₄最多，CO最少"],"answer":2,"explanation":"设H₂、CO、CH₄的质量均为1g，完全燃烧消耗氧气的质量分别为x、y、z。根据2H₂+O₂=2H₂O，2CO+O₂=2CO₂，CH₄+2O₂=CO₂+2H₂O计算，x=8g，y≈0.57g，z=4g，因此消耗氧气的质量H₂最多，CO最少。"},{"id":"hn2011_10","type":"choice","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"能在pH为1的溶液中大量共存，且溶液为无色透明的一组物质是","options":["A. FeCl₃、CuSO₄、NaCl","B. BaCl₂、Na₂SO₄、NaOH","C. CaCl₂、Na₂CO₃、AgNO₃","D. K₂SO₄、NaNO₃、NH₄Cl"],"answer":3,"explanation":"pH为1的溶液显酸性。CuSO₄溶于水显蓝色且FeCl₃溶于水显黄色，A错；B中BaCl₂与Na₂SO₄反应生成BaSO₄沉淀，NaOH也不能在酸性条件下存在；C中CaCl₂与AgNO₃反应生成AgCl沉淀，Na₂CO₃在酸性条件下不能存在；D中三种物质的溶液均为无色，彼此不反应，且与酸也不反应，符合要求。"},{"id":"hn2011_11","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_45.png\"></div>","parts":[{"question":"可充入食品包装袋中防腐的物质是","answer":["氮气"],"acceptable":["N₂","N2"]},{"question":"农业上可作复合肥料的物质是","answer":["硝酸钾"],"acceptable":["KNO₃","KNO3"]}],"explanation":"氮气化学性质稳定，可充入食品包装袋中防腐；硝酸钾含有K和N两种营养元素，是复合肥料。"},{"id":"hn2011_12","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_46.png\"></div>","parts":[{"question":"区分硬水和蒸馏水可以选用的物质是","answer":["肥皂水"],"acceptable":[]},{"question":"测定废水酸碱度可以使用","answer":["pH试纸"],"acceptable":[]}],"explanation":"硬水与肥皂水混合产生浮渣少泡沫多，蒸馏水与肥皂水混合产生较多泡沫；pH试纸可用于测定溶液的酸碱度。"},{"id":"hn2011_13","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_47.png\"></div>","parts":[{"question":"NaCl由什么构成（填\"分子\"、\"原子\"或\"离子\"）","answer":["离子"],"acceptable":[]},{"question":"除去食盐水中泥沙等不溶性杂质的方法是","answer":["过滤"],"acceptable":[]},{"question":"电解食盐水反应中X的化学式","answer":["Cl₂"],"acceptable":["Cl2"]}],"explanation":"NaCl是离子化合物，由Na⁺和Cl⁻离子构成；过滤可除去不溶性杂质；根据质量守恒定律，反应前后原子种类和数目不变，可推知X为Cl₂。"},{"id":"hn2011_14","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_48.png\"></div>","parts":[{"question":"水果、蔬菜能为人体提供的主要营养素是","answer":["维生素"],"acceptable":[]},{"question":"缺哪种元素会引起甲状腺肿大（俗称大脖子病）","answer":["碘"],"acceptable":["I"]},{"question":"含小苏打的药物治疗胃酸过多症的化学方程式","answer":["NaHCO₃ + HCl = NaCl + CO₂↑ + H₂O"],"acceptable":["NaHCO₃+HCl=NaCl+CO₂↑+H₂O"]}],"explanation":"水果、蔬菜富含维生素；缺碘会引起甲状腺肿大；小苏打（NaHCO₃）与胃酸（HCl）反应生成NaCl、CO₂和H₂O。"},{"id":"hn2011_15","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_49.png\"></div>","parts":[{"question":"反应后A的质量","answer":["3.4g"],"acceptable":["3.4 g","3.4"]},{"question":"该反应所属的基本反应类型","answer":["分解反应"],"acceptable":[]},{"question":"该反应中B和D两种物质变化的质量比","answer":["22∶9"],"acceptable":["22:9","22/9"]}],"explanation":"根据质量守恒定律，反应前后总质量不变。C减少7.9g，B增加4.4g，D增加1.8g，则A增加1.7g，反应后A为3.4g。该反应由一种物质（C）生成多种物质，属于分解反应。B和D的质量变化比为4.4∶1.8=22∶9。"},{"id":"hn2011_16","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_50.png\"></div>","parts":[{"question":"反应后所得溶液中含有的金属离子","answer":["Al³⁺和Fe²⁺"],"acceptable":["Al³⁺、Fe²⁺"]},{"question":"反应后溶液的质量比原混合溶液的质量（填\"大\"或\"小\"）","answer":["小"],"acceptable":[]},{"question":"有关反应的化学方程式（写出一个即可）","answer":["Fe + 2AgNO₃ = Fe(NO₃)₂ + 2Ag"],"acceptable":["Fe + Cu(NO₃)₂ = Fe(NO₃)₂ + Cu","Fe + H₂SO₄ = FeSO₄ + H₂↑"]}],"explanation":"金属活动性Al>Fe>Cu>Ag，Fe能置换出Cu和Ag但不能置换Al。向固体中加稀硫酸有气泡，说明Fe过量。溶液中金属离子为Al³⁺和Fe²⁺。Fe与AgNO₃反应时，每56份质量的Fe生成216份质量的Ag，溶液质量减小。"},{"id":"hn2011_17","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_51.png\"></div>","parts":[{"question":"（1）取10mL该硫酸可配制成9.8%的硫酸多少克","answer":["184"],"acceptable":["184g","184 g"]},{"question":"（2）反应一段时间后还可能生成另一种气体，请解释其原因","answer":["随着硫酸的消耗和水的生成，硫酸变稀，锌与稀硫酸反应能生成氢气。"],"acceptable":[]}],"explanation":"10mL浓硫酸质量为10×1.84=18.4g，含H₂SO₄ 18.4×98%≈18.0g，可配制9.8%的硫酸18.0÷9.8%≈184g。随着反应进行，硫酸被消耗且生成水，浓硫酸变稀，锌与稀硫酸反应生成氢气。"},{"id":"hn2011_18","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_52.png\"></div>","parts":[{"question":"（1）金属大规模开发和利用的先后顺序与什么有关（填\"甲\"、\"乙\"或\"丙\"）","answer":["甲"],"acceptable":["金属的活动性"]},{"question":"（2）相同的铁栏杆，为什么安装在南方沿海地区比安装在北方更容易生锈","answer":["铁在潮湿的空气中容易生锈，南方沿海地区的空气湿度较大且温度要高一些。"],"acceptable":[]},{"question":"（3）用盐酸清洗铁锈的化学方程式","answer":["Fe₂O₃ + 6HCl = 2FeCl₃ + 3H₂O"],"acceptable":[]}],"explanation":"金属的活动性越弱，越容易被开发利用，铝比铜和铁活泼，所以利用较晚。铁生锈是铁与空气中的氧气和水共同作用的结果，南方沿海地区湿度大、温度高，铁更易生锈。"},{"id":"hn2011_19","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_53.png\"></div>","parts":[{"question":"（1）A中的试管口为什么应略向下倾斜","answer":["防止试管口的冷凝水回流到热的试管底部，炸裂试管。"],"acceptable":[]},{"question":"（2）写出选用B制取氧气的化学方程式","answer":["2H₂O₂ = 2H₂O + O₂↑"],"acceptable":[]},{"question":"（3）若采用C（气体由a口进入）收集到一种气体，简述验证该气体的实验方法","answer":["将带火星的木条伸入集气瓶中，木条复燃，证明收集的气体是氧气。"],"acceptable":["向集气瓶中加入澄清的石灰水，石灰水变浑浊，证明收集的气体是二氧化碳。"]}],"explanation":"试管口略向下倾斜可防止冷凝水回流炸裂试管。B装置是固液不加热装置，用H₂O₂和MnO₂制取氧气。C装置a口进气收集的气体密度比空气大，可能是O₂或CO₂。"},{"id":"hn2011_20","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_54.png\"></div>","parts":[{"question":"（1）闻氯气时在操作上应注意什么问题","answer":["不要把鼻孔凑到容器口去闻氯气的气味。"],"acceptable":["用手在容器口轻轻扇动，让极少量气体飘进鼻孔。"]},{"question":"（2）C中Cl₂与NaOH溶液反应的化学方程式","answer":["Cl₂ + 2NaOH = NaCl + NaClO + H₂O"],"acceptable":[]},{"question":"（3）推测具有漂白性的物质可能有哪些","answer":["盐酸和次氯酸"],"acceptable":["HCl和HClO"]},{"question":"（3）证明只有次氯酸有漂白性还需补做的实验步骤和现象","answer":["取一红色布条，在上面滴加盐酸，布条不褪色。"],"acceptable":[]}],"explanation":"闻有毒气体时不能把鼻孔凑到容器口。Cl₂与NaOH反应生成NaCl、NaClO和H₂O。A中干燥布条不褪色说明Cl₂无漂白性，B中湿润布条褪色说明Cl₂与水反应的产物有漂白性。滴加盐酸到红色布条上不褪色，证明盐酸无漂白性，从而确认只有次氯酸有漂白性。"},{"id":"hn2011_21","type":"fill","year":"2011","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_55.png\"></div>","parts":[{"question":"（1）低碳生活主要是为了减少哪种物质的排放量（填化学式）","answer":["CO₂"],"acceptable":["CO2"]},{"question":"（2）下列说法不正确的是（填标号）","answer":["C"],"acceptable":[]},{"question":"（3）甲的化学式","answer":["CaCO₃"],"acceptable":["CaCO3"]},{"question":"（3）丙转化为丁的化学方程式","answer":["CaO + H₂O = Ca(OH)₂"],"acceptable":["CaO+H₂O=Ca(OH)₂"]},{"question":"（4）挤压胶头滴管后气球胀大的原因并写出化学方程式","answer":["CO₂被浓NaOH溶液吸收，锥形瓶内的气压减小，外界大气压大于锥形瓶内的气压，使气球胀大。"],"acceptable":["2NaOH + CO₂ = Na₂CO₃ + H₂O"]},{"question":"（5）①CO与Fe₂O₃反应的化学方程式","answer":["Fe₂O₃ + 3CO = 2Fe + 3CO₂"],"acceptable":["Fe2O3 + 3CO = 2Fe + 3CO2"]},{"question":"（5）②气体通过装置的顺序是A→______（装置不能重复使用）","answer":["C→D→B"],"acceptable":[]},{"question":"（5）③从环保角度考虑，对以上装置的改进措施","answer":["将尾气点燃或进行收集等。"],"acceptable":[]},{"question":"（6）计算石灰石中杂质的质量分数","answer":["20%"],"acceptable":["20"]}],"explanation":"（1）低碳指减少CO₂排放。（2）碳原子结构示意图应为（+6）2、4，C选项中的示意图错误。（3）甲为CaCO₃，乙为CO₂，丙为CaO（干燥剂），丁为Ca(OH)₂；CaO+H₂O=Ca(OH)₂。（4）NaOH吸收CO₂使瓶内气压减小，气球胀大。（5）CO还原Fe₂O₃生成Fe和CO₂，先通过C除杂再通过D反应，最后尾气需处理。（6）生成CO₂质量12.5+50-58.1=4.4g，计算得CaCO₃ 10g，杂质2.5g，质量分数20%。"},{"id":"hn2012_01","type":"choice","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"生活中的下列变化属于物理变化的是","options":["A. 粮食酿酒","B. 铁钉生锈","C. 蜡烛燃烧","D. 水的蒸发"],"answer":3,"explanation":"水的蒸发是状态变化，没有新物质生成，属于物理变化。粮食酿酒、铁钉生锈、蜡烛燃烧都有新物质生成，属于化学变化。"},{"id":"hn2012_02","type":"choice","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"为节约资源和保护环境，提倡垃圾分类回收。下列生活垃圾可与铝制易拉罐归为同一类加以回收的是","options":["A. 废旧电池","B. 空玻璃酒瓶","C. 废弃铁锅","D. 一次性塑料饭盒"],"answer":2,"explanation":"铝制易拉罐和废弃铁锅都属于金属材料，可归为同一类回收。废旧电池需特殊处理，玻璃和塑料属于其他类别。"},{"id":"hn2012_03","type":"choice","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"分子、原子、离子等都是构成物质的微粒。下列物质由离子构成的是","options":["A. 氯化钠","B. 黄金","C. 金刚石","D. 干冰"],"answer":0,"explanation":"氯化钠由Na⁺和Cl⁻离子构成；黄金由金原子构成；金刚石由碳原子构成；干冰（固体CO₂）由CO₂分子构成。"},{"id":"hn2012_04","type":"choice","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"下列物质在氧气里燃烧，能生成有刺激性气味的气体的是","options":["A. 铁丝","B. 硫","C. 镁条","D. 木炭"],"answer":1,"explanation":"硫在氧气中燃烧发出明亮的蓝紫色火焰，生成有刺激性气味的SO₂气体。铁丝燃烧生成黑色固体，镁条燃烧生成白色固体，木炭燃烧生成无色无味的CO₂。"},{"id":"hn2012_05","type":"choice","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"我们的衣、食、住、行中蕴含着丰富的化学知识。下列说法不正确的是","options":["A. 衣料中的棉、羊毛等都属于合成有机高分子材料","B. 食用加碘食盐和强化铁酱油可补充某些人体必需微量元素","C. 建造高楼大厦时所用到的钢和生铁属于铁的两种合金","D. 宇通客车用天然气代替汽油作燃料可减少空气污染"],"answer":0,"explanation":"棉、羊毛属于天然有机高分子材料，不是合成有机高分子材料。加碘食盐补充碘元素，强化铁酱油补充铁元素，均为人体必需微量元素。钢和生铁是铁的合金。天然气燃烧产物更清洁。"},{"id":"hn2012_06","type":"choice","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"下列图示的实验操作正确的是<br><div class=\"q-img\"><img src=\"images/q/img_56.png\"></div>","options":["A. A","B. B","C. C","D. D"],"answer":2,"explanation":"A倾倒液体时标签应向手心、瓶塞应倒放；B禁止用酒精灯引燃另一只酒精灯，应用火柴点燃；C用试管夹夹持试管加热液体，操作正确；D胶头滴管应悬空在试管口上方滴加，不能伸入试管内。"},{"id":"hn2012_07","type":"choice","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"右图是甲、乙两种固体的溶解度曲线，下列说法正确的是<br><div class=\"q-img\"><img src=\"images/q/img_57.png\"></div>","options":["A. 甲的溶解度等于乙的溶解度","B. 升高温度可以将甲的不饱和溶液变为饱和溶液","C. 20℃时，100g乙的饱和溶液中溶质质量是30g","D. 40℃时，分别用100g水配制甲、乙的饱和溶液，所需甲的质量大于乙的质量"],"answer":3,"explanation":"没有指明温度，无法比较溶解度大小，A错；甲的溶解度随温度升高而增大，升温会使不饱和溶液变得更不饱和，B错；20℃时乙的溶解度为30g，但100g饱和溶液中溶质质量小于30g（应为130g饱和溶液中含30g溶质），C错；40℃时甲的溶解度大于乙，用100g水配制饱和溶液所需甲的质量更大，D正确。"},{"id":"hn2012_08","type":"choice","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"下列反应中，不属于置换反应的是","options":["A. 2Mg + CO₂ = 2MgO + C","B. 2Na + 2H₂O = 2NaOH + H₂↑","C. Cl₂ + 2NaBr = 2NaCl + Br₂","D. 2Na₂O₂ + 2H₂O = 4NaOH + O₂↑"],"answer":3,"explanation":"置换反应是一种单质和一种化合物反应生成另一种单质和另一种化合物。A、B、C均符合置换反应的定义。D中反应物是两种化合物（Na₂O₂和H₂O），不属于置换反应。"},{"id":"hn2012_09","type":"choice","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"下列图像分别与选项中的操作相对应，其中可能合理的是<br><div class=\"q-img\"><img src=\"images/q/img_58.png\"></div>","options":["A. 向一定量的稀盐酸和CaCl₂混合溶液中滴入Na₂CO₃溶液","B. 向一定量的MnO₂固体中加入一定量的过氧化氢溶液","C. 向一定量的稀盐酸中滴入NaOH溶液","D. 一定温度时，向一定量的饱和石灰水中加入生石灰"],"answer":2,"explanation":"向稀盐酸中滴入NaOH溶液，pH由小逐渐增大，当恰好完全反应时pH=7，NaOH过量后pH>7，图像呈S形变化，C合理。A中Na₂CO₃先与HCl反应无沉淀，后与CaCl₂反应生成沉淀；B中加H₂O₂生成O₂，MnO₂为催化剂质量不变；D中加入生石灰消耗水且放热，溶质质量分数变化复杂。"},{"id":"hn2012_10","type":"choice","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"将乙醇和氧气置于密闭容器中引燃，测得反应前后各物质的质量如下：\n    物质（纯净物）\t乙醇\t氧气\t二氧化碳\t水\tX\n    反应前质量/g\t2.3\t4\t0\t0\t0\n    反应后质量/g\t0\t0\t2.2\t2.7\t待测\n下列说法正确的是<br><div class=\"q-img\"><img src=\"images/q/img_59.png\"></div>","options":["A. 反应后X的质量为1.5g","B. X中一定含有碳元素和氧元素","C. X中一定含有碳元素和氢元素","D. X中两种元素的质量比为1:1"],"answer":1,"explanation":"根据质量守恒，X质量=2.3+4-2.2-2.7=1.4g，A错。乙醇中C:1.2g、H:0.3g、O:0.8g；CO₂中含C:0.6g、O:1.6g；H₂O中含H:0.3g、O:2.4g。X中含C:1.2-0.6=0.6g，O:4.8-4.0=0.8g，不含H。C、O质量比0.6:0.8=3:4，B正确，C、D错。"},{"id":"hn2012_11","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_60.png\"></div>","parts":[{"question":"空气中体积分数最大的物质","answer":["氮气"],"acceptable":["N₂","N2"]},{"question":"极易燃烧，被认为是最清洁燃料的物质","answer":["氢气"],"acceptable":["H₂","H2"]}],"explanation":"空气中氮气约占78%（体积分数），是含量最多的气体；氢气燃烧只生成水，无污染，是最清洁的燃料。"},{"id":"hn2012_12","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_61.png\"></div>","parts":[{"question":"牡丹花开时满城飘香，从分子角度解释","answer":["分子在不断地运动使香味扩散。"],"acceptable":["分子在不断运动","分子在不断地运动"]},{"question":"牡丹花能为人体提供的主要营养素（同水果、蔬菜一样）","answer":["维生素"],"acceptable":[]}],"explanation":"分子在不停地运动，花香分子扩散到空气中使人闻到香味。水果、蔬菜、牡丹花等植物性食物主要提供维生素。"},{"id":"hn2012_13","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_62.png\"></div>","parts":[{"question":"可燃物燃烧除需要氧气外还需要满足的条件","answer":["温度达到可燃物的着火点。"],"acceptable":[]},{"question":"煤块经粉碎处理后燃烧得更快、更充分的原因","answer":["煤粉与氧气（或空气）有更大的接触面。"],"acceptable":["增大了可燃物与氧气的接触面积"]}],"explanation":"燃烧需要同时满足三个条件：可燃物、氧气（空气）、温度达到着火点。煤块粉碎后与氧气的接触面积增大，反应速率加快，燃烧更充分。"},{"id":"hn2012_14","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_63.png\"></div>","parts":[{"question":"葡萄糖由几种元素组成","answer":["三"],"acceptable":["3","3种"]},{"question":"葡萄糖中碳元素的质量分数","answer":["40%"],"acceptable":["40"]},{"question":"把10g这种葡萄糖溶液稀释为2%的溶液需要水的质量","answer":["15"],"acceptable":["15g","15 g"]}],"explanation":"葡萄糖化学式为C₆H₁₂O₆，由C、H、O三种元素组成。碳元素质量分数=72/180×100%=40%。10g×5%÷2%-10g=15g水。"},{"id":"hn2012_15","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_64.png\"></div>","parts":[{"question":"明矾溶于水生成的胶状物可以怎样悬浮于水中的杂质","answer":["吸附"],"acceptable":[]},{"question":"反应Cl₂ + 2X = 2NaCl + 2ClO₂中X的化学式","answer":["NaClO₂"],"acceptable":["NaClO2"]},{"question":"除去硬水中过多的哪种离子（填离子符号）和Mg²⁺可得到软水","answer":["Ca²⁺"],"acceptable":["Ca2+"]}],"explanation":"明矾溶于水生成胶状物吸附悬浮杂质使之沉降。根据质量守恒定律，反应前后原子种类和数目不变，可推知X为NaClO₂。硬水中含有较多的Ca²⁺和Mg²⁺，除去这两种离子即可得到软水。"},{"id":"hn2012_16","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_65.png\"></div>","parts":[{"question":"甲的化学式","answer":["CH₄"],"acceptable":["CH4"]},{"question":"反应②的化学方程式","answer":["CO₂ + Ca(OH)₂ = CaCO₃↓ + H₂O"],"acceptable":["CO2 + Ca(OH)2 = CaCO3↓ + H2O"]},{"question":"反应③的化学方程式","answer":["CaCO₃ + 2HCl = CaCl₂ + CO₂↑ + H₂O"],"acceptable":["CaCO3 + 2HCl = CaCl2 + CO2↑ + H2O"]},{"question":"试剂A中溶质在生产或生活中的一种用途","answer":["灭火"],"acceptable":["作气体肥料","制碳酸饮料"]}],"explanation":"甲为CH₄（相对分子质量16），乙为H₂O（最常见溶剂），丁为CaCO₃（Ca质量分数40/100=40%）。丙为CaO（干燥剂），CaO与H₂O反应生成Ca(OH)₂。反应②是CO₂与Ca(OH)₂生成CaCO₃，反应③是CaCO₃与盐酸反应生成CO₂，CO₂可用于灭火、作气体肥料等。"},{"id":"hn2012_17","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_66.png\"></div>","parts":[{"question":"（1）图中属于化合物的是","answer":["水"],"acceptable":["H₂O","H2O"]},{"question":"（2）写出该反应的化学方程式","answer":["2H₂O = 2H₂↑ + O₂↑"],"acceptable":["2H2O = 2H2↑ + O2↑"]}],"explanation":"水是由氢元素和氧元素组成的纯净物，属于化合物。该反应是水的分解反应，在通电条件下生成氢气和氧气。"},{"id":"hn2012_18","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_67.png\"></div>","parts":[{"question":"（1）洗涤剂能除去油污是因为它具有什么功能","answer":["乳化"],"acceptable":[]},{"question":"（2）在铁制品表面涂油、刷漆或镀铬等能防止铁生锈的原理","answer":["覆盖保护层，起到隔绝氧气（或空气）和水的作用。"],"acceptable":[]},{"question":"（3）含Mg(OH)₂的药物治疗胃酸过多症的化学方程式","answer":["Mg(OH)₂ + 2HCl = MgCl₂ + 2H₂O"],"acceptable":["Mg(OH)2 + 2HCl = MgCl2 + 2H2O"]},{"question":"（4）联合制碱法中向饱和食盐水中通入NH₃和CO₂的化学方程式","answer":["NaCl + H₂O + NH₃ + CO₂ = NaHCO₃↓ + NH₄Cl"],"acceptable":["NaCl+H₂O+NH₃+CO₂=NaHCO₃↓+NH₄Cl"]}],"explanation":"洗涤剂具有乳化作用，将油污乳化成小液滴。隔绝氧气和水可防止铁生锈。Mg(OH)₂中和胃酸（HCl）。联合制碱法（侯氏制碱法）生成NaHCO₃（小苏打）和NH₄Cl（氮肥）。"},{"id":"hn2012_19","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_68.png\"></div>","parts":[{"question":"（1）仪器X的名称","answer":["酒精灯"],"acceptable":[]},{"question":"（2）写出一个用A装置制取O₂的化学方程式","answer":["2KMnO₄ = K₂MnO₄ + MnO₂ + O₂↑"],"acceptable":["2KClO₃ = 2KCl + 3O₂↑"]},{"question":"（3）使C装置中反应停止的原理","answer":["当用弹簧夹夹住胶皮管时，产生的气体使试管内的压强增大，液体被压回长颈漏斗中，与固体反应物脱离，反应便会停止。"],"acceptable":[]},{"question":"（4）用D装置采用排水法收集O₂的操作步骤","answer":["先将集气瓶装满水，再将O₂从b口通入。"],"acceptable":[]}],"explanation":"A装置为固体加热装置，可用KMnO₄或KClO₃制O₂。C装置通过弹簧夹控制气压实现固液分离，从而控制反应。D装置排水法收集O₂时，气体应从短管b口通入。"},{"id":"hn2012_20","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_69.png\"></div>","parts":[{"question":"（1）该白色粉末中肯定含有的物质","answer":["Na₂CO₃"],"acceptable":["碳酸钠"]},{"question":"（1）该白色粉末中可能含有的物质","answer":["NaOH"],"acceptable":["氢氧化钠"]},{"question":"（2）为确定可能含有的物质是否存在的实验步骤","answer":["取少量（I）的溶液，加入足量BaCl₂溶液（或CaCl₂溶液），静置，取上层清液滴加酚酞溶液。"],"acceptable":[]}],"explanation":"溶液无色透明，排除CuSO₄（蓝色）。加入盐酸有气泡产生，说明含有Na₂CO₃。BaCl₂与Na₂CO₃不能共存（会生成BaCO₃沉淀），（I）为无色透明溶液，故不含BaCl₂。可能含有NaOH，需先用BaCl₂除去CO₃²⁻后再用酚酞检验OH⁻。"},{"id":"hn2012_21","type":"fill","year":"2012","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_70.png\"></div>","parts":[{"question":"（1）下列说法不正确的是（填标号）","answer":["C"],"acceptable":[]},{"question":"（2）不合理的猜想是（填标号）","answer":["②"],"acceptable":[]},{"question":"（2）不合理的理由是","answer":["猜想②中无Cu(NO₃)₂，说明Cu(NO₃)₂已与Zn反应生成Cu，而Cu能与AgNO₃反应，故也不可能有AgNO₃。"],"acceptable":["Zn应先与AgNO₃反应后与Cu(NO₃)₂反应，当有AgNO₃剩余时，溶质中一定含有Cu(NO₃)₂。"]},{"question":"（2）若猜想①成立，取少量固体B，滴加什么试剂（有气泡产生）","answer":["稀盐酸"],"acceptable":["稀硫酸","稀盐酸（或稀硫酸等）"]},{"question":"（2）有关反应的化学方程式","answer":["Zn + 2HCl = ZnCl₂ + H₂↑"],"acceptable":["Zn + H₂SO₄ = ZnSO₄ + H₂↑"]},{"question":"（3）焦炭的作用是燃烧提供能量和","answer":["制取CO"],"acceptable":["制取一氧化碳"]},{"question":"（3）有铁生成的化学方程式","answer":["Fe₂O₃ + 3CO = 2Fe + 3CO₂"],"acceptable":["Fe2O3 + 3CO = 2Fe + 3CO2"]},{"question":"（4）计算可生产硫酸亚铁的质量","answer":["7.6t"],"acceptable":["7.6 t","7.6"]}],"explanation":"（1）地壳中含量最多的元素是氧，不是铝。（2）若AgNO₃有剩余，则Cu(NO₃)₂尚未反应完全，溶液中应有Cu(NO₃)₂，故猜想②不合理。若猜想①成立则Zn过量，固体B含Zn、Cu、Ag，滴加酸产生H₂。（3）焦炭燃烧提供热量并制取还原剂CO。（4）Fe+H₂SO₄=FeSO₄+H₂↑，49t×10%=4.9t H₂SO₄，152/98×4.9=7.6t FeSO₄。"},{"id":"hn2013_01","type":"choice","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"能源与生活息息相关。下列利用化学反应获得电能的是","options":["A. 风力发电","B. 水力发电","C. 火力发电","D. 太阳能发电"],"answer":2,"explanation":"火力发电通过燃烧煤等燃料（化学能→热能→机械能→电能），利用了化学反应；风力、水力、太阳能发电均直接利用自然界能量，不涉及化学反应。"},{"id":"hn2013_02","type":"choice","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"下列图标中，属于我国制定的塑料包装制品回收标志的是<br><div class=\"q-img\"><img src=\"images/q/img_71.png\"></div>","options":["A","B","C","D"],"answer":1,"explanation":"我国制定的塑料包装制品回收标志是由三个弯曲箭头组成的三角形循环图案（选项B），属于回收标志中常见的一种。"},{"id":"hn2013_03","type":"choice","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"下列各项中，不属于我国《环境空气质量标准》基本监控项目的是","options":["A. 二氧化硫浓度","B. 氮气浓度","C. 二氧化氮浓度","D. PM2.5浓度"],"answer":1,"explanation":"《环境空气质量标准》基本监控项目包括SO₂、NO₂、PM2.5、PM10、CO、O₃等。氮气(N₂)是空气的主要成分，不属于污染物，不在监控项目中。"},{"id":"hn2013_04","type":"choice","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"2013年5月在郑州举办的第八届中国中部投资贸易博览会上，河南大枣等果蔬类产品颇受青睐。下列人体需要的营养素主要由水果、蔬菜提供的是","options":["A. 维生素","B. 油脂","C. 淀粉","D. 蛋白质"],"answer":0,"explanation":"水果和蔬菜富含维生素，是人体维生素的主要来源。油脂主要来自植物油和动物脂肪，淀粉主要来自谷物，蛋白质主要来自肉蛋奶豆类。"},{"id":"hn2013_05","type":"choice","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"下列结构示意图表示的粒子中，属于离子的是<br><div class=\"q-img\"><img src=\"images/q/img_72.png\"></div>","options":["A. 质子数8，电子数8（氧原子）","B. 质子数10，电子数10（氖原子）","C. 质子数11，电子数10（钠离子）","D. 质子数12，电子数12（镁原子）"],"answer":2,"explanation":"离子是原子得失电子形成的带电粒子，质子数≠电子数。C中质子数11>电子数10，带1个单位正电荷，为Na⁺，属于离子。其他选项质子数=电子数，均为原子。"},{"id":"hn2013_06","type":"choice","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"分类法是化学学习的重要方法。下列说法正确的是","options":["A. 醋酸和干冰都属于有机物","B. 不锈钢和金刚石都属于合金","C. 尿素和硝酸钾都属于复合肥料","D. 锌和碘都属于人体必需的微量元素"],"answer":3,"explanation":"A错：干冰(CO₂)是无机物；B错：金刚石是碳单质，不是合金；C错：尿素[CO(NH₂)₂]只含N，属于氮肥而非复合肥；D正确：锌和碘都是人体必需的微量元素。"},{"id":"hn2013_07","type":"choice","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"下列图示实验所得出的结论中，不正确的是<br><div class=\"q-img\"><img src=\"images/q/img_73.png\"></div>","options":["A. 氧气约占空气体积的1/5","B. 二氧化碳的密度比空气大且不支持燃烧","C. 天平不平衡说明该反应不遵守质量守恒定律","D. 燃烧条件之一是温度需达到可燃物的着火点"],"answer":2,"explanation":"C不正确：碳酸钠与盐酸反应生成CO₂气体逸散到空气中，导致天平不平衡，但该反应仍然遵守质量守恒定律；若在密闭容器中进行，天平会平衡。"},{"id":"hn2013_08","type":"choice","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"有化合价升降的反应是氧化还原反应。下列一定不是氧化还原反应的是","options":["A. 化合反应","B. 分解反应","C. 置换反应","D. 复分解反应"],"answer":3,"explanation":"复分解反应是两种化合物交换成分的反应，反应前后各元素化合价均不变，一定不是氧化还原反应。化合、分解反应可能有化合价变化，置换反应一定有化合价变化。"},{"id":"hn2013_09","type":"choice","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"探究金属活动性顺序时，将锌粒放入硫酸铜溶液中，锌粒表面有紫红色物质析出，还有无色无味气体产生的\"异常\"现象。推测该气体可能是","options":["A. 氢气","B. 二氧化硫","C. 二氧化碳","D. 一氧化碳"],"answer":0,"explanation":"硫酸铜溶液因Cu²⁺水解而呈弱酸性，锌与酸反应可产生氢气(H₂)。H₂无色无味，符合描述。SO₂有刺激性气味，CO₂可使澄清石灰水变浑浊，CO有毒且该反应无碳源，均不符合。"},{"id":"hn2013_10","type":"choice","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"下列图像分别与选项中的操作相对应，其中合理的是<br><div class=\"q-img\"><img src=\"images/q/img_74.png\"></div>","options":["A. 向一定量稀硫酸中滴入水","B. 向一定量纯碱和烧碱的混合溶液中滴入盐酸","C. 一定温度时向一定量饱和石灰水中加入氧化钙","D. 向一定量二氧化锰固体中加入过氧化氢溶液"],"answer":1,"explanation":"B合理：盐酸先与烧碱(NaOH)反应（无气体），再与纯碱(Na₂CO₃)反应生成CO₂气体，故气体质量先为0后增加。A错：加水稀释pH不会超过7；C错：CaO与水反应消耗溶剂，有Ca(OH)₂析出，溶液质量减小；D错：MnO₂是催化剂，质量不变。"},{"id":"hn2013_11","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_75.png\"></div>","parts":[{"question":"(1) 天然气的主要成分","answer":["甲烷"],"acceptable":["CH₄","甲烷(CH₄)","CH4"]},{"question":"(2) 地壳中含量最多的金属元素","answer":["铝"],"acceptable":["Al","铝(Al)","Al（铝）"]}],"explanation":"天然气主要成分为甲烷(CH₄)；地壳中含量最多的金属元素是铝(Al)，含量最多的非金属元素是氧(O)。"},{"id":"hn2013_12","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_76.png\"></div>","parts":[{"question":"(1) 图中单质名称","answer":["氮气"],"acceptable":["N₂","氮气(N₂)","N2"]},{"question":"(2) 化学方程式","answer":["2CO + 2NO =催化剂= N₂ + 2CO₂"],"acceptable":["2CO+2NO=催化剂=N2+2CO2","2CO+2NO=N₂+2CO₂","2CO+2NO=N2+2CO2"]}],"explanation":"从微观示意图分析，反应物为CO和NO，生成物为N₂和CO₂。N₂由同种原子构成，属于单质（氮气）。化学方程式为2CO+2NO→(催化剂)N₂+2CO₂。"},{"id":"hn2013_13","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_77.png\"></div>","parts":[{"question":"(1) 区分硬水和软水的试剂","answer":["肥皂水"],"acceptable":["肥皂水"]},{"question":"(2) NaClO中氯元素的化合价","answer":["+1"],"acceptable":["+1价","+1"]},{"question":"(3) X的化学式","answer":["MnCl₂"],"acceptable":["MnCl2","氯化锰"]}],"explanation":"硬水与肥皂水反应产生浮渣，软水则起泡多；NaClO中Na为+1价、O为-2价，故Cl为+1价；根据质量守恒定律，反应前后原子种类和数目不变（Mn:1, Cl:2），推知X为MnCl₂。"},{"id":"hn2013_14","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_78.png\"></div>","parts":[{"question":"(1) 析出固体质量A____B","answer":[">"],"acceptable":["大于","＞"]},{"question":"(2) 需加水的质量（g）","answer":["100"],"acceptable":["100g","100克","100 g"]}],"explanation":"A的溶解度随温度降低下降幅度大于B，故等质量饱和溶液降温，A析出固体更多。t₂℃时A的溶解度为50g，150g饱和溶液中含A 50g，稀释为20%需溶液总质量50g÷20%=250g，加水250g-150g=100g。"},{"id":"hn2013_15","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_79.png\"></div>","parts":[{"question":"（1）硫酸铜的构成粒子","answer":["Cu²⁺、SO₄²⁻"],"acceptable":["Cu2+、SO42-","Cu²⁺和SO₄²⁻","Cu2+和SO42-"]},{"question":"（2）酒精燃烧的化学方程式","answer":["C₂H₅OH + 3O₂ =点燃= 2CO₂ + 3H₂O"],"acceptable":["C2H5OH+3O2=点燃=2CO2+3H2O","CH₃CH₂OH+3O₂=点燃=2CO₂+3H₂O"]},{"question":"（3）电解食盐水的化学方程式","answer":["2NaCl + 2H₂O =通电= 2NaOH + H₂↑ + Cl₂↑"],"acceptable":["2NaCl+2H2O=通电=2NaOH+H2↑+Cl2↑"]}],"explanation":"（1）硫酸铜(CuSO₄)由Cu²⁺和SO₄²⁻构成；（2）酒精(C₂H₅OH)燃烧生成CO₂和H₂O；（3）电解食盐水：2NaCl+2H₂O→(通电)2NaOH+H₂↑+Cl₂↑，最轻气体H₂（Mr=2），另一种气体Cl₂（Mr=71）。"},{"id":"hn2013_16","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_80.png\"></div>","parts":[{"question":"(1) 反应①的化学方程式（甲→乙）","answer":["Fe₂O₃ + 3CO =高温= 2Fe + 3CO₂"],"acceptable":["Fe2O3+3CO=高温=2Fe+3CO2","2Fe₂O₃+3C=高温=4Fe+3CO₂↑","2Fe2O3+3C=高温=4Fe+3CO2↑"]},{"question":"(2) 反应②的化学方程式（甲→丙）","answer":["Fe₂O₃ + 6HCl = 2FeCl₃ + 3H₂O"],"acceptable":["Fe2O3+6HCl=2FeCl3+3H2O","Fe₂O₃+3H₂SO₄=Fe₂(SO₄)₃+3H₂O","Fe2O3+3H2SO4=Fe2(SO4)3+3H2O"]},{"question":"(3) 试剂B的化学式","answer":["NaOH"],"acceptable":["Ca(OH)₂","KOH","Ca(OH)2"]},{"question":"(4) 反应③的化学方程式","answer":["4Fe(OH)₂ + O₂ + 2H₂O = 4Fe(OH)₃"],"acceptable":["4Fe(OH)2+O2+2H2O=4Fe(OH)3"]}],"explanation":"甲为Fe₂O₃（Fe%=112/160=70%），乙为Fe（黑色粉末），丙为FeCl₃，丁为FeCl₂。反应①为Fe₂O₃还原为Fe；反应②为Fe₂O₃与酸反应；B为可溶性碱使Fe³⁺沉淀；反应③为Fe(OH)₂被氧化为Fe(OH)₃。"},{"id":"hn2013_17","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_81.png\"></div>","parts":[{"question":"（1）如何验证一瓶无色气体是氧气？","answer":["将带火星的木条伸到集气瓶中，木条复燃即可验证"],"acceptable":["将带火星的木条伸入瓶中，木条复燃证明是氧气","用带火星木条伸入，复燃是氧气"]},{"question":"（2）集气瓶中预先加少量水或铺一层细沙的目的","answer":["防止溅落的熔融物炸裂瓶底"],"acceptable":["防止高温熔融物溅落使集气瓶炸裂","防止炸裂瓶底"]},{"question":"（3）任举一例","answer":["与氧气浓度有关，如硫在氧气里燃烧比在空气里燃烧要剧烈"],"acceptable":["与接触面积有关，如煤粉比煤块燃烧得更加剧烈"]}],"explanation":"（1）氧气支持燃烧，可使带火星木条复燃；（2）铁丝燃烧产生高温熔融物Fe₃O₄，加水或细沙防止炸裂瓶底；（3）氧气浓度越大或接触面积越大，燃烧越剧烈。"},{"id":"hn2013_18","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_82.png\"></div>","parts":[{"question":"（1）浓硫酸在实验室中常用它做______剂","answer":["干燥"],"acceptable":["干燥剂"]},{"question":"（2）解释石灰浆粉刷墙壁干燥后变硬的原因","answer":["石灰浆中含有Ca(OH)₂，干燥过程中与CO₂反应，生成难溶于水的CaCO₃"],"acceptable":["Ca(OH)₂+CO₂=CaCO₃↓+H₂O，生成坚硬的CaCO₃"]},{"question":"（3）推测喷洒液和烧杯中溶液可能是什么","answer":["石蕊溶液和浓盐酸"],"acceptable":["酚酞溶液和浓氨水"]}],"explanation":"（1）浓硫酸有吸水性，可作干燥剂；（2）Ca(OH)₂+CO₂=CaCO₃↓+H₂O；（3）紫色石蕊遇酸变红，浓盐酸挥发HCl；或无色酚酞遇碱变红，浓氨水挥发NH₃。"},{"id":"hn2013_19","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_83.png\"></div>","parts":[{"question":"（1）A、F组合制取某气体的化学方程式","answer":["2KMnO₄ =Δ= K₂MnO₄ + MnO₂ + O₂↑"],"acceptable":["2KMnO4=Δ=K2MnO4+MnO2+O2↑","2KClO₃=Δ=2KCl+3O₂↑","2KClO3=Δ=2KCl+3O2↑"]},{"question":"（2）制取CO₂的化学方程式","answer":["CaCO₃ + 2HCl = CaCl₂ + CO₂↑ + H₂O"],"acceptable":["CaCO3+2HCl=CaCl2+CO2↑+H2O"]},{"question":"（2）C的主要优点（与B相比较）","answer":["可通过分液漏斗的开关控制液体的滴加速率和滴加量来控制反应"],"acceptable":["可以控制反应速率","控制液体滴加速度"]},{"question":"（3）制取氢气应选择的装置","answer":["发生装置选B（或C），收集装置选E（或F）"],"acceptable":["B和E","B和F","C和E","C和F"]}],"explanation":"（1）A是固体加热装置，F是排水集气法，适用于O₂制取（KMnO₄或KClO₃分解）；（2）CO₂制取：CaCO₃+2HCl=CaCl₂+CO₂↑+H₂O，分液漏斗可控制反应速率；（3）H₂可用固液不加热装置(B或C)，向下排空气法(E)或排水集气法(F)收集。"},{"id":"hn2013_20","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_84.png\"></div>","parts":[{"question":"（1）向固体乙上滴加盐酸时______气泡","answer":["没有"],"acceptable":["无","无气泡"]},{"question":"（2）溶液甲中一定含有的溶质（化学式）","answer":["Al(NO₃)₃、Zn(NO₃)₂、Cu(NO₃)₂"],"acceptable":["Al(NO3)3、Zn(NO3)2、Cu(NO3)2","Al(NO₃)₃, Zn(NO₃)₂, Cu(NO₃)₂"]},{"question":"（3）实验过程中发生反应的化学方程式","answer":["Cu + 2AgNO₃ = Cu(NO₃)₂ + 2Ag；Zn + 2AgNO₃ = Zn(NO₃)₂ + 2Ag（或Zn + Cu(NO₃)₂ = Zn(NO₃)₂ + Cu）"],"acceptable":["Cu+2AgNO3=Cu(NO3)2+2Ag；Zn+2AgNO3=Zn(NO3)2+2Ag","Cu+2AgNO3=Cu(NO3)2+2Ag；Zn+Cu(NO3)2=Zn(NO3)2+Cu"]}],"explanation":"溶液甲呈蓝色说明含Cu²⁺，Cu参与了反应（置换出Ag）。溶液甲中一定含Al(NO₃)₃（未反应）、Zn(NO₃)₂、Cu(NO₃)₂（剩余）。固体乙中无活泼金属，加盐酸无气泡。"},{"id":"hn2013_21","type":"fill","year":"2013","chapter":"历年真题","chapterIdx":-1,"question":"<div class=\"q-img\"><img src=\"images/q/img_85.png\"></div>","parts":[{"question":"（1）复分解反应发生的条件（第三个条件）","answer":["水（或难电离物）"],"acceptable":["水","难电离物","H₂O"]},{"question":"（2）用pH试纸测定反应后溶液酸碱度的操作方法","answer":["用玻璃棒蘸取溶液滴到pH试纸上，把试纸显示的颜色与标准比色卡比较"],"acceptable":["用玻璃棒蘸待测液滴在pH试纸上，与标准比色卡对照"]},{"question":"（2）pH＞7时白色固体成分","answer":["CaCl₂、Ca(OH)₂"],"acceptable":["CaCl2和Ca(OH)2","CaCl₂和Ca(OH)₂"]},{"question":"（3）①蒸发操作中玻璃棒的作用","answer":["用玻璃棒不断搅拌，防止因局部温度过高造成液滴飞溅"],"acceptable":["搅拌防止液体飞溅","搅拌散热防飞溅"]},{"question":"（3）②加入Na₂CO₃溶液的目的","answer":["除去CaCl₂杂质和过量的BaCl₂"],"acceptable":["除去钙离子和过量的钡离子","除Ca²⁺和过量Ba²⁺"]},{"question":"（3）③方案需完善的原因和补充","answer":["过量的NaOH和Na₂CO₃未除去，还应加入适量的盐酸"],"acceptable":["加入适量盐酸除去剩余的NaOH和Na₂CO₃"]},{"question":"（4）至少需要LiOH的质量","answer":["192g"],"acceptable":["192克","192 g","192"]}],"explanation":"（1）复分解反应条件：生成沉淀、气体或水(难电离物)；（2）pH试纸使用方法：玻璃棒蘸液→滴试纸→比色；pH>7说明Ca(OH)₂过量；（3）粗盐提纯：蒸发时玻璃棒搅拌防飞溅；Na₂CO₃除Ca²⁺和过量Ba²⁺；过量NaOH和Na₂CO₃需盐酸中和；（4）2LiOH+CO₂=Li₂CO₃+H₂O，设需LiOH质量x，48/44=x/176g，x=192g。"},{"id":"hn2014_01","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"下列变化过程中，一定发生了化学变化的是","options":["A. 蒸馏","B. 升华","C. 爆炸","D. 燃烧"],"answer":3,"explanation":"燃烧是物质与氧气发生的剧烈氧化反应，一定生成新物质，属于化学变化。蒸馏、升华是物理变化；爆炸可能是物理或化学变化，不一定。"},{"id":"hn2014_02","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"下列物质排放到空气中，不会造成大气污染的是","options":["A. SO₂","B. O₂","C. CO","D. NO₂"],"answer":1,"explanation":"O₂是空气中的正常成分，不会造成大气污染。SO₂、NO₂是酸雨的主要成因，CO是有毒气体，均属于大气污染物。"},{"id":"hn2014_03","type":"choice","year":"2014","chapter":"历年真题","chapterIdx":-1,"question":"发明了\"联合制碱法\"的科学家是","options":["A. 侯德榜","B. 拉瓦锡","C. 门捷列
